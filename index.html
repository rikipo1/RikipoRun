/* ── DIAGNOSTYKA WSTĘPNA: 5–7-dniowy protokół przed planem ──────
   Najpierw pomiar i diagnoza, potem plan — jak u prawdziwego trenera.
   Łączy istniejące moduły (ankieta, pomiary, bateria testów, mobilność)
   z zapisem dni biegowych (bieg bazowy + test 5 km). Dzień 7 = profil + plan. */
function Diagnostyka({ profile, setProfile, history, addHistory, go, startCoach, hr }) {
  const p = profile || {};
  const diag = p.diag || {};
  const steps = diag.steps || {};
  const [run, setRun] = useState(null);       // aktywny bieg na żywo: 'd2'|'d5'
  const [runPhase, setRunPhase] = useState("warmup"); // warmup | run | stretch
  const [analiza, setAnaliza] = useState(null); // wynik właśnie zakończonego biegu
  const startBieg = (key) => { setRunPhase("warmup"); setRun(key); };

  const startedAt = diag.startedAt || null;
  const dniOd = startedAt ? Math.floor((Date.now() - new Date(startedAt)) / 86400000) : 0;

  // statusy (część wykrywana z istniejących danych profilu)
  const status = {
    wywiad: !!p.assessment,
    bieg: !!steps.d2?.done,
    sila: !!p.testyWyniki,
    test5k: !!steps.d5?.done,
  };
  const zrobione = Object.values(status).filter(Boolean).length;
  const wszystkich = 4;
  const gotowyDoRaportu = status.wywiad && status.sila && status.test5k;

  const ensureStart = (patch) => {
    const nd = { ...diag, startedAt: diag.startedAt || new Date().toISOString(), steps: { ...steps, ...patch } };
    setProfile({ ...p, diag: nd });
  };

  // ── KRYTERIUM BIEGU: jasno zadane ile i w jakim tętnie (bez zgadywania) ──
  const age = p.age || 30;
  const Z = hrZones(age, p.restHR);
  const recepta = (key) => key === "d5"
    ? { typ: "bieg", minuty: 45, celKm: 5, hrLo: Z[3].lo, hrHi: Z[4].hi, cel5k: true,
        opis: tx("Test 5 km — kontrolowany maks. Rozłóż siły równo: nie zrywaj od startu, wejdź w mocne równe tempo, ostatni kilometr możesz przyspieszyć. Zatrzymaj bieg po 5 km (licznik dystansu na ekranie).") }
    : { typ: "bieg", minuty: 35, hrLo: Z[1].lo, hrHi: Z[1].hi,
        opis: tx("Bieg bazowy — 35 min CAŁOŚĆ w spokojnej strefie tlenowej. Trzymaj tętno w podanym zakresie; powinieneś dać radę mówić pełnymi zdaniami. Nie przyspieszaj, nawet jeśli czujesz, że możesz.") };

  const zakonczBieg = (key, data) => {
    if (!data || data.skipSave) { setRun(null); return; }
    const samples = data.samples || [];
    const bpms = samples.filter((s) => s.bpm).map((s) => s.bpm);
    const avgHR = bpms.length ? Math.round(bpms.reduce((a, b) => a + b, 0) / bpms.length) : null;
    const maxHR = bpms.length ? Math.max(...bpms) : null;
    const czas = samples.length ? samples[samples.length - 1].t : (data.tempo && data.dystans ? Math.round(data.tempo * data.dystans) : null);
    const inZone = bpms.length ? Math.round((100 * bpms.filter((b) => b >= data.tgtLo && b <= data.tgtHi).length) / bpms.length) : null;
    const wpis = {
      typ: key === "d5" ? tx("Diagnostyka: test 5 km") : tx("Diagnostyka: bieg bazowy"),
      dystans: data.dystans || null, czas, tempo: data.tempo || null,
      tetno: avgHR, hrMax: maxHR, tgtLo: data.tgtLo, tgtHi: data.tgtHi, inZone, diagnostyka: true,
      samples, track: data.track || null,
    };
    addHistory(wpis);
    ensureStart({ [key]: { done: true, at: new Date().toISOString(), data: wpis } });
    setRun(null);
    setAnaliza({ key, ...wpis });
  };

  const raport = () => {
    startCoach(tx("Zakończyłem diagnostykę wstępną. Przeanalizuj wszystkie wyniki — wywiad i pomiary ciała, bieg bazowy, testy siły i stabilizacji oraz test 5 km — i przygotuj profil zawodnika (poziom, mocne i słabe strony, ryzyko kontuzji, strefy treningowe) oraz dopasowany plan treningowy."));
  };

  const DNI = [
    { key: "wywiad", dzien: 1, ikona: "📋", tytul: tx("Wywiad i pomiary"), opis: tx("Cel, historia, sprzęt, czas, sen i regeneracja — oraz waga, wzrost, wiek i tętno spoczynkowe. Wszystko w jednym kroku."), akcja: () => { setProfile({ ...p, diag: { ...diag, startedAt: diag.startedAt || new Date().toISOString(), wrocDoDiag: true } }); go("asystent"); }, cta: tx("Wywiad z trenerem") },
    { key: "bieg", dzien: 2, ikona: "🏃", tytul: tx("Bieg bazowy (spokojny)"), opis: tx("30–45 min spokojnego biegu, monitorowany na żywo. Cel: baza tlenowa i naturalne tempo — w zadanej strefie tętna."), akcja: () => startBieg("d2"), cta: tx("Biegnij na żywo (z prowadzeniem)") },
    { key: "sila", dzien: 3, ikona: "💪", tytul: tx("Testy siły i stabilizacji"), opis: tx("Plank, pompki, przysiady, wykroki, stabilizacja — wykrycie słabych ogniw."), akcja: () => { setProfile({ ...p, diag: { ...diag, startedAt: diag.startedAt || new Date().toISOString(), zTestow: true } }); go("testy"); }, cta: tx("Zrób baterię testów") },
    { key: "test5k", dzien: 5, ikona: "⏱️", tytul: tx("Test 5 km"), opis: tx("Kontrolowany maksymalny wysiłek, monitorowany na żywo, z instrukcją jak go przebiec. Wyznacza formę i strefy."), akcja: () => startBieg("d5"), cta: tx("Biegnij test na żywo") },
  ];

  // ── LIVE BIEG: rozgrzewka → bieg z monitoringiem → rozciąganie → analiza ──
  if (run) {
    const st = recepta(run);
    const naglowek = (
      <div style={{ background: C.surface2, border: `1px solid ${C.accent}55`, borderRadius: 12, padding: "10px 12px", marginBottom: 12 }}>
        <div style={{ fontSize: 10, color: C.accent, fontWeight: 800, letterSpacing: 1 }}>{run === "d5" ? tx("Test 5 km") : tx("Bieg bazowy (spokojny)")} · {runPhase === "warmup" ? tx("ROZGRZEWKA") : runPhase === "stretch" ? tx("ROZCIĄGANIE") : tx("KRYTERIUM")}</div>
        <div style={{ fontSize: 13, color: C.ink, marginTop: 3, lineHeight: 1.45 }}>
          {runPhase === "warmup" ? tx("Najpierw rozgrzewka — przygotuj mięśnie i krążenie przed biegiem.")
            : runPhase === "stretch" ? tx("Na koniec rozciąganie — ochłoń i rozciągnij pracujące mięśnie.")
            : <>{run === "d5" ? tx("5 km, kontrolowany maks") : tx("35 min, całość spokojnie")} · {tx("tętno docelowe")} <strong style={{ color: C.accent }}>{st.hrLo}–{st.hrHi} bpm</strong></>}
        </div>
      </div>
    );
    return (
      <div>
        <button onClick={() => { setRun(null); setRunPhase("warmup"); }} style={{ background: "none", border: "none", color: C.sub, fontSize: 13, cursor: "pointer", marginBottom: 6 }}>← {tx("Anuluj")}</button>
        {naglowek}
        {runPhase === "warmup" && (
          <Sekwencja list={null} mode="warmup" profile={p} go={() => {}} hr={hr} onDone={() => { addHistory({ typ: tx("Rozgrzewka przed biegiem diagnostycznym"), czas: 300 }); setRunPhase("run"); }} />
        )}
        {runPhase === "run" && (
          <KrokBieg step={st} profile={p} hr={hr} onNext={(data) => { window.__diagRunData = data; setRunPhase("stretch"); }} onSaveDemo={() => {}} />
        )}
        {runPhase === "stretch" && (
          <Sekwencja list={STRETCH} mode="stretch" profile={p} go={() => {}} hr={hr} onDone={() => { addHistory({ typ: tx("Rozciąganie po biegu diagnostycznym"), czas: STRETCH.reduce((s, e) => s + e.sec, 0) }); const d = window.__diagRunData; window.__diagRunData = null; zakonczBieg(run, d); setRunPhase("warmup"); }} />
        )}
      </div>
    );
  }

  // ── ANALIZA PO BIEGU ──
  if (analiza) {
    const a = analiza;
    const zoneOK = a.inZone != null && a.inZone >= 70;
    const tempoTxt = a.tempo ? `${fmt(a.tempo)}/km` : "—";
    const verdykt = a.key === "d5"
      ? tx("To Twój punkt odniesienia. Trener wyliczy z niego strefy treningowe i tempa — zobaczysz je w planie po Dniu 7.")
      : (a.inZone == null ? tx("Brak danych tętna — następnym razem połącz pas HR, by ocenić dyscyplinę tempa.")
        : zoneOK ? tx("Dobra dyscyplina tlenowa — większość biegu w zadanej strefie. Tak ma wyglądać spokojny bieg.")
        : tx("Sporo czasu powyżej strefy — spokojny bieg wyszedł za szybko. Następnym razem odpuść tempo i pozwól tętnu zejść niżej."));
    const Stat = ({ etk, val }) => (
      <div style={{ flex: 1, background: C.surface, border: `1px solid ${C.line}`, borderRadius: 12, padding: "10px 8px", textAlign: "center" }}>
        <div style={{ fontSize: 18, fontWeight: 800, color: C.ink, fontVariantNumeric: "tabular-nums" }}>{val}</div>
        <div style={{ fontSize: 10, color: C.sub, marginTop: 2 }}>{etk}</div>
      </div>
    );
    return (
      <div>
        <h2 style={{ fontSize: 20, fontWeight: 800 }}>{tx("Analiza biegu")}</h2>
        <p style={{ fontSize: 13, color: C.sub, margin: "6px 0 14px" }}>{a.key === "d5" ? tx("Test 5 km") : tx("Bieg bazowy (spokojny)")} · {tx("zapisano w diagnostyce")}</p>
        <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
          <Stat etk={tx("Dystans")} val={a.dystans != null ? `${a.dystans} km` : "—"} />
          <Stat etk={tx("Czas")} val={a.czas != null ? fmt(a.czas) : "—"} />
          <Stat etk={tx("Tempo")} val={tempoTxt} />
        </div>
        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          <Stat etk={tx("śr. HR")} val={a.tetno != null ? `${a.tetno}` : "—"} />
          <Stat etk={tx("maks. HR")} val={a.hrMax != null ? `${a.hrMax}` : "—"} />
          <Stat etk={tx("w strefie")} val={a.inZone != null ? `${a.inZone}%` : "—"} />
        </div>
        <div style={{ background: C.surface, border: `1px solid ${(a.key === "d5" || zoneOK) ? "#4FD6A655" : C.warn + "55"}`, borderRadius: 14, padding: 14, marginBottom: 14 }}>
          <div style={{ fontSize: 10, color: C.sub, fontWeight: 800, letterSpacing: 1, marginBottom: 4 }}>{tx("OCENA")}</div>
          {(a.tgtLo || a.tetno) && (
            <div style={{ fontSize: 12, color: C.sub, marginBottom: 6 }}>
              {a.tgtLo ? <>{tx("Strefa docelowa:")} <strong style={{ color: C.ink }}>{a.tgtLo}–{a.tgtHi} bpm</strong> · </> : null}
              {a.tetno ? <>{tx("Twoje średnie:")} <strong style={{ color: C.ink }}>{a.tetno} bpm</strong></> : tx("brak danych tętna")}
              {a.hrMax ? <> · {tx("maks.")} {a.hrMax}</> : null}
            </div>
          )}
          <p style={{ fontSize: 13, color: C.ink, margin: 0, lineHeight: 1.5 }}>{verdykt}</p>
        </div>
        {(() => {
          const sm = a.samples || [];
          const hrV = sm.filter((s) => s.bpm).map((s) => String(s.bpm));
          const kmhV = sm.map((s) => String(s.kmh)).filter((v) => v !== "undefined" && v !== "null");
          const labs = sm.map((s) => fmt(s.t));
          if (!sm.length && !(a.track && a.track.length > 1)) return null;
          return (
            <div style={{ background: C.surface, borderRadius: 14, padding: 12, marginBottom: 14 }}>
              <div style={{ fontSize: 10, color: C.sub, fontWeight: 800, letterSpacing: 1, marginBottom: 8 }}>{tx("PEŁNY ZAPIS BIEGU")}</div>
              {hrV.length > 1 && <><div style={{ fontSize: 12, color: C.sub, marginBottom: 6 }}>{tx("Tętno (HR) w czasie")}</div><MiniChart values={hrV} color={C.warn} labels={labs} unit="bpm" baseline={p?.restHR || null} /></>}
              {kmhV.length > 1 && <><div style={{ fontSize: 12, color: C.sub, margin: "12px 0 6px" }}>{tx("Prędkość (km/h) w czasie")}</div><MiniChart values={kmhV} color={C.cool} labels={labs} unit="km/h" /></>}
              {a.track && a.track.length > 1 && <><div style={{ fontSize: 12, color: C.sub, margin: "12px 0 6px" }}>{tx("Twoja trasa")}</div><RouteMap track={a.track} color={C.accent} /></>}
            </div>
          );
        })()}
        <button onClick={() => setAnaliza(null)} style={primary}>{tx("Wróć do diagnostyki")}</button>
      </div>
    );
  }

  return (
    <div>
      <h2 style={{ fontSize: 20, fontWeight: 800 }}>{tx("Diagnostyka wstępna")}</h2>
      <p style={{ fontSize: 13, color: C.sub, margin: "6px 0 14px", lineHeight: 1.5 }}>
        {tx("Najpierw pomiar i diagnoza, potem plan — jak pracuje trener z zawodnikiem. Rozłóż testy na 5–7 dni; nie rób wszystkiego jednego dnia, by wyniki były wiarygodne, a organizm zdążył reagować.")}
      </p>

      <div style={{ background: C.surface, borderRadius: 14, padding: 14, marginBottom: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: C.sub, marginBottom: 6 }}>
          <span>{tx("Postęp diagnostyki")}</span>
          <span>{zrobione}/{wszystkich}{startedAt ? ` · ${tx("dzień")} ${dniOd + 1}` : ""}</span>
        </div>
        <div style={{ height: 8, borderRadius: 4, background: C.line, overflow: "hidden" }}>
          <div style={{ width: `${(zrobione / wszystkich) * 100}%`, height: "100%", background: C.accent, transition: "width .4s" }} />
        </div>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {DNI.map((d) => {
          const done = status[d.key];
          return (
            <div key={d.key} style={{ background: C.surface, border: `1px solid ${done ? "#4FD6A655" : C.line}`, borderRadius: 14, padding: 14 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ fontSize: 22 }}>{done ? "✅" : d.ikona}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 10, color: C.sub, fontWeight: 700, letterSpacing: 1 }}>{tx("DZIEŃ")} {d.dzien}</div>
                  <div style={{ fontSize: 15, fontWeight: 800 }}>{d.tytul}</div>
                </div>
              </div>
              <p style={{ fontSize: 12, color: C.sub, margin: "8px 0 10px", lineHeight: 1.5 }}>{d.opis}</p>
              <button onClick={() => { if (d.extra) d.extra(); d.akcja(); }}
                style={{ width: "100%", padding: 11, borderRadius: 10, fontWeight: 800, fontSize: 13, cursor: "pointer", border: "none",
                  background: done ? "transparent" : C.accent, color: done ? C.accent : C.bg, ...(done ? { border: `1px solid ${C.accent}` } : {}) }}>
                {done ? tx("Zrobione — powtórz") : d.cta}
              </button>
            </div>
          );
        })}
      </div>

      {/* DZIEŃ 6 — profil + plan */}
      <div style={{ background: `linear-gradient(150deg, ${C.surface2}, ${C.bg})`, border: `1px solid ${gotowyDoRaportu ? C.accent : C.line}`, borderRadius: 16, padding: 16, marginTop: 14 }}>
        <div style={{ fontSize: 10, color: C.accent, fontWeight: 800, letterSpacing: 1 }}>{tx("DZIEŃ")} 6</div>
        <div style={{ fontSize: 16, fontWeight: 800, margin: "2px 0 6px" }}>{tx("Analiza i profil zawodnika")}</div>
        <p style={{ fontSize: 12, color: C.sub, margin: "0 0 12px", lineHeight: 1.5 }}>
          {gotowyDoRaportu
            ? tx("Masz komplet danych. Trener przeanalizuje całą diagnostykę, opisze Twój profil (poziom, mocne i słabe strony, ryzyko kontuzji, strefy) i ułoży dopasowany plan treningowy.")
            : tx("Najpierw ukończ wywiad i pomiary, testy siły i test 5 km. Bieg bazowy jest zalecany, ale nieobowiązkowy.")}
        </p>
        <button onClick={raport} disabled={!gotowyDoRaportu}
          style={{ width: "100%", padding: 15, borderRadius: 14, border: "none", fontWeight: 800, fontSize: 15,
            background: gotowyDoRaportu ? C.accent : C.line, color: gotowyDoRaportu ? C.bg : C.sub, cursor: gotowyDoRaportu ? "pointer" : "default" }}>
          {tx("Wygeneruj profil i plan")}
        </button>
      </div>
    </div>
  );
}

function BateriaTestow({ onDone, go, hr, profile }) {
  const Z = hrZones(profile?.age || 30, profile?.restHR); // strefy tętna do podpowiedzi w teście GPS (fix: Z było niezdefiniowane → crash ekranu testu 6-min)
  const [przedRozgrzewka, setPrzedRozgrzewka] = useState(true); // mała rozgrzewka przed całą baterią
  const [idx, setIdx] = useState(0);
  const [wyniki, setWyniki] = useState({});
  const [wartosc, setWartosc] = useState("");
  const [puls, setPuls] = useState("");
  const [stoperT, setStoperT] = useState(0);
  const [stoperRun, setStoperRun] = useState(false);
  const [odlicz, setOdlicz] = useState(null); // sekundy odliczania dla testów na czas
  const [faza, setFaza] = useState("intro"); // intro | run | wynik
  const [gpsDist, setGpsDist] = useState(0);
  const [gpsOk, setGpsOk] = useState(null);
  const [strona, setStrona] = useState("L"); // test dwustronny: która noga
  const [czasL, setCzasL] = useState(0);
  const [czasR, setCzasR] = useState(0);
  const ref = useRef(null), watchRef = useRef(null), lastPos = useRef(null), lastGpsTime = useRef(null);
  const wake = useWakeLock(); // testy z GPS: ekran nie może zgasnąć, inaczej pomiar zasypia

  const test = TESTY[idx];
  const ostatni = idx === TESTY.length - 1;

  const stopAll = () => {
    clearInterval(ref.current);
    if (watchRef.current != null && navigator.geolocation) gpsClearWatch(watchRef.current);
    watchRef.current = null;
    wake.release();
  };
  useEffect(() => () => stopAll(), []);

  // Tętno automatycznie z pasa w fazie wyniku testu z pomiarem pulsu
  useEffect(() => {
    if (faza === "wynik" && test?.mierzPuls && hr?.connected && hr.bpm && !puls) {
      setPuls(String(hr.bpm));
    }
  }, [faza, test, hr?.connected, hr?.bpm]);

  const start = () => {
    setWartosc(""); setPuls(""); setStoperT(0); setGpsDist(0); setGpsOk(null); setFaza("run");
    if (test.strony) {
      setStrona("L"); setCzasL(0); setCzasR(0); setWartosc(""); setFaza("stronaL");
      if (test.czasNaStrone) { setOdlicz(test.czas); ref.current = setInterval(() => setOdlicz((x) => { const nx = x - 1; if (nx <= 0) { clearInterval(ref.current); speak(tx("Zmień nogę.")); return 0; } if (nx <= 3) speak(String(nx)); return nx; }), 1000); }
      return;
    }
    if (test.stoper) { setStoperRun(true); ref.current = setInterval(() => setStoperT((x) => x + 1), 1000); return; }
    if (test.czas > 0) {
      setOdlicz(test.czas);
      if (test.gps && gpsEnabled() && navigator.geolocation) {
        lastPos.current = null; lastGpsTime.current = null;
        wake.request(); // ekran musi zostać włączony na czas testu z GPS
        watchRef.current = gpsWatch((p) => {
          setGpsOk(true);
          const a = p.coords.accuracy;
          const now = p.timestamp || Date.now();
          const cur = { lat: p.coords.latitude, lng: p.coords.longitude };
          const dt = lastGpsTime.current ? (now - lastGpsTime.current) / 1000 : 0;
          const inc = gpsStep(lastPos.current, cur, a, dt);
          if (inc.inc > 0) setGpsDist((x) => x + inc.inc);
          if (inc.anchor) { lastPos.current = cur; lastGpsTime.current = now; }
        }, () => setGpsOk(false), { enableHighAccuracy: true, maximumAge: 1000, timeout: 8000 });
      }
      ref.current = setInterval(() => setOdlicz((x) => {
        const nx = x - 1;
        if (nx <= 0) { setTimeout(() => { stopAll(); speak(tx("Koniec testu. Zmierz tętno.")); setFaza("wynik"); }, 0); return 0; }
        if (nx <= 3) speak(String(nx));
        return nx;
      }), 1000);
    } else {
      setFaza("wynik");
    }
  };

  const stopStoper = () => { clearInterval(ref.current); setStoperRun(false); setStoperT((v) => { setWartosc(String(v)); return v; }); setFaza("wynik"); };
  const stopGpsEarly = () => { stopAll(); setFaza("wynik"); };

  // ── test dwustronny: licznik powtórzeń na każdą nogę ──
  const dalejPrawa = () => {
    setCzasL(parseInt(wartosc) || 0); setWartosc(""); setStrona("R"); setFaza("stronaR");
    if (test.czasNaStrone) { clearInterval(ref.current); setOdlicz(test.czas); ref.current = setInterval(() => setOdlicz((x) => { const nx = x - 1; if (nx <= 0) { clearInterval(ref.current); speak(tx("Koniec.")); return 0; } if (nx <= 3) speak(String(nx)); return nx; }), 1000); }
  };
  const zakonczStrony = () => { clearInterval(ref.current); setCzasR(parseInt(wartosc) || 0); setFaza("wynik"); };

  const zapiszTest = () => {
    const val = test.strony ? Math.min(czasL, czasR) : test.gps ? Math.round(gpsDist) : test.stoper ? stoperT : (parseInt(wartosc) || 0);
    const w = { ...wyniki, [test.key]: { wartosc: val, ...(test.strony ? { lewa: czasL, prawa: czasR } : {}), puls: puls ? parseInt(puls) : null } };
    setWyniki(w);
    if (ostatni) { onDone(w); return; }
    setIdx((i) => i + 1); setFaza("intro"); setWartosc(""); setPuls(""); setStoperT(0); setOdlicz(null); setStrona("L"); setCzasL(0); setCzasR(0);
  };

  const pomin = () => {
    if (ostatni) { onDone(wyniki); return; }
    setIdx((i) => i + 1); setFaza("intro"); setWartosc(""); setPuls(""); setStoperT(0); setOdlicz(null); setStrona("L"); setCzasL(0); setCzasR(0);
  };

  const cofnij = () => {
    stopAll();
    setIdx((i) => Math.max(0, i - 1));
    setFaza("intro"); setWartosc(""); setPuls(""); setStoperT(0); setStoperRun(false); setOdlicz(null); setStrona("L"); setCzasL(0); setCzasR(0);
  };

  return (
    <div>
      {przedRozgrzewka && (
        <div>
          <h2 style={{ fontSize: 21, fontWeight: 800, margin: "0 0 6px" }}>{tx("Rozgrzewka przed testami")}</h2>
          <p style={{ color: C.sub, fontSize: 14, lineHeight: 1.6, marginBottom: 4 }}>{tx("Krótka rozgrzewka przed baterią testów — rozgrzej mięśnie i stawy, żeby wyniki były wiarygodne i bezpieczne.")}</p>
          <Sekwencja list={null} mode="warmup" profile={profile} go={() => {}} hr={hr} onDone={() => setPrzedRozgrzewka(false)} />
          <button onClick={() => setPrzedRozgrzewka(false)} style={{ ...ghost, marginTop: 10 }}>{tx("Pomiń rozgrzewkę")}</button>
        </div>
      )}
      {!przedRozgrzewka && <>
      <div style={{ display: "flex", gap: 5, marginBottom: 10 }}>
        {TESTY.map((_, i) => <div key={i} style={{ flex: 1, height: 5, borderRadius: 3, background: i < idx ? "#4FD6A6" : i === idx ? C.accent : C.line }} />)}
      </div>
      <div style={{ fontSize: 12, color: C.sub, marginBottom: 4 }}>{tx("Test")} {idx + 1}/{TESTY.length}</div>
      <h2 style={{ fontSize: 21, fontWeight: 800, margin: "0 0 6px" }}>{test.nazwa}</h2>

      {faza === "intro" && (
        <div>
          <p style={{ color: C.sub, fontSize: 14, lineHeight: 1.6 }}>{test.opis}</p>
          <div style={{ background: C.surface, borderRadius: 14, padding: 16, margin: "12px 0", fontSize: 13, color: C.ink, lineHeight: 1.7 }}>
            <div style={{ fontSize: 11, color: C.accent, fontWeight: 800, letterSpacing: 1, marginBottom: 6 }}>{tx("JAK WYKONAĆ")}</div>
            <ol style={{ margin: 0, paddingLeft: 18, display: "flex", flexDirection: "column", gap: 5 }}>
              {test.instrukcja.map((k, i) => <li key={i} style={{ color: C.sub }}>{k}</li>)}
            </ol>
          </div>
          <button onClick={start} style={{ ...primary, marginTop: 0 }}>{test.czas > 0 ? `Start (${test.czas}s)` : test.stoper ? "Start stopera" : "Zaczynam"}</button>
          <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
            {idx > 0 && <button onClick={cofnij} style={{ ...ghost, marginTop: 0, flex: 1 }}>‹ {tx("Cofnij")}</button>}
            <button onClick={pomin} style={{ ...ghost, marginTop: 0, flex: 1 }}>{tx("Pomiń ten test")}</button>
          </div>
        </div>
      )}

      {faza === "run" && (
        <div style={{ textAlign: "center", padding: "10px 0" }}>
          {test.stoper && <>
            <div style={{ fontSize: 13, color: C.sub }}>{tx("STOPER — trzymaj plank")}</div>
            <div style={{ fontSize: 60, fontWeight: 800, color: C.purple, fontVariantNumeric: "tabular-nums" }}>{fmt(stoperT)}</div>
            <button onClick={stopStoper} style={{ ...primary, background: C.warn }}>{tx("Stop — opadam")}</button>
          </>}
          {test.czas > 0 && !test.stoper && <>
            <div style={{ fontSize: 13, color: C.sub }}>{tx("POZOSTAŁO")}</div>
            <div style={{ fontSize: 60, fontWeight: 800, color: C.accent, fontVariantNumeric: "tabular-nums" }}>{fmt(odlicz || 0)}</div>
            {test.gps && (() => {
              const minelo = (test.czas - (odlicz || 0));
              const km = gpsDist / 1000;
              const tempoSek = km > 0.02 ? Math.round(minelo / km) : 0;
              return (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginTop: 12 }}>
                  <div style={{ background: C.surface, borderRadius: 12, padding: "10px 6px" }}>
                    <div style={{ fontSize: 22, fontWeight: 800, color: "#F2B457", fontVariantNumeric: "tabular-nums" }}>{km.toFixed(2)}</div>
                    <div style={{ fontSize: 10, color: C.sub }}>{tx("km")}</div>
                  </div>
                  <div style={{ background: C.surface, borderRadius: 12, padding: "10px 6px" }}>
                    <div style={{ fontSize: 22, fontWeight: 800, color: C.cool, fontVariantNumeric: "tabular-nums" }}>{tempoSek ? fmt(tempoSek) : "—"}</div>
                    <div style={{ fontSize: 10, color: C.sub }}>{tx("/km")}</div>
                  </div>
                  <div style={{ background: C.surface, borderRadius: 12, padding: "10px 6px" }}>
                    <div style={{ fontSize: 22, fontWeight: 800, color: C.warn, fontVariantNumeric: "tabular-nums" }}>{hr?.connected ? (hr.bpm || "—") : "—"}</div>
                    <div style={{ fontSize: 10, color: C.sub }}>{tx("śr.HR")}</div>
                  </div>
                </div>
              );
            })()}
            {test.gps && (() => {
              const z2 = Z[1];
              const w = hr?.connected && hr.bpm ? hr.bpm : null;
              const ponizej = w != null && w < z2.lo;
              const powyzej = w != null && w > z2.hi;
              const wStrefie = w != null && !ponizej && !powyzej;
              return (
                <div style={{ background: z2.c + "1A", border: `1px solid ${z2.c}`, borderRadius: 12, padding: "10px 12px", marginTop: 12, textAlign: "left" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                    <span style={{ fontSize: 12, color: C.sub, fontWeight: 700 }}>{tx("Zalecane tętno:")}</span>
                    <span style={{ fontSize: 16, fontWeight: 800, color: z2.c, fontVariantNumeric: "tabular-nums" }}>{z2.lo}–{z2.hi} {tx("bpm")}</span>
                  </div>
                  <div style={{ fontSize: 11, color: C.sub, marginTop: 3 }}>{z2.name}</div>
                  {w != null && (
                    <div style={{ fontSize: 11, fontWeight: 700, marginTop: 5, color: wStrefie ? "#4FD6A6" : C.warn }}>
                      {wStrefie ? tx("✓ Jesteś w strefie — trzymaj równo.") : ponizej ? tx("Przyspiesz lekko — wejdź w strefę.") : tx("Zwolnij — tętno powyżej strefy.")}
                    </div>
                  )}
                </div>
              );
            })()}
            {test.gps && gpsOk === false && <div style={{ fontSize: 12, color: C.warn, marginTop: 8 }}>{tx("(brak GPS — wpisz ręcznie)")}</div>}
            {test.gps && <button onClick={stopGpsEarly} style={{ ...ghost, marginTop: 12 }}>{tx("Zakończ wcześniej")}</button>}
          </>}
        </div>
      )}

      {(faza === "stronaL" || faza === "stronaR") && (
        <div>
          <div style={{ background: C.surface, borderRadius: 14, padding: 16, margin: "12px 0" }}>
            <div style={{ fontSize: 13, color: C.accent, fontWeight: 800, letterSpacing: 1, marginBottom: 8 }}>
              {faza === "stronaL" ? tx("LEWA NOGA") : tx("PRAWA NOGA")}
            </div>
            {faza === "stronaR" && <div style={{ fontSize: 13, color: C.sub, marginBottom: 8 }}>{tx("Lewa noga:")} <b style={{ color: C.purple }}>{czasL} {test.unit}</b></div>}
            {test.czasNaStrone && <div style={{ textAlign: "center", marginBottom: 10 }}><div style={{ fontSize: 11, color: C.sub }}>{tx("POZOSTAŁO")}</div><div style={{ fontSize: 44, fontWeight: 800, color: (odlicz || 0) > 0 ? C.accent : C.warn, fontVariantNumeric: "tabular-nums" }}>{fmt(odlicz || 0)}</div>{(odlicz || 0) === 0 && <div style={{ fontSize: 12, color: C.warn }}>{tx("Czas minął — wpisz liczbę powtórzeń.")}</div>}</div>}
            <div style={{ fontSize: 13, color: C.sub, marginBottom: 8 }}>{test.czasNaStrone ? tx("Ile pełnych powtórzeń zrobiłeś w tym czasie?") : tx("Ile pełnych powtórzeń zrobiłeś na tej nodze?")}</div>
            <input value={wartosc} onChange={(e) => setWartosc(e.target.value.replace(/\D/g, ""))} inputMode="numeric" placeholder={tx("liczba")} style={inp} />
          </div>
          {faza === "stronaL"
            ? <button onClick={dalejPrawa} disabled={!wartosc} style={{ ...primary, marginTop: 0, opacity: wartosc ? 1 : 0.5 }}>{tx("Dalej → prawa noga ›")}</button>
            : <button onClick={zakonczStrony} disabled={!wartosc} style={{ ...primary, marginTop: 0, opacity: wartosc ? 1 : 0.5 }}>{tx("Zobacz wynik ›")}</button>}
          <button onClick={pomin} style={{ ...ghost, marginTop: 10 }}>{tx("Pomiń ten test")}</button>
        </div>
      )}

      {faza === "wynik" && (
        <div>
          <div style={{ background: C.surface, borderRadius: 14, padding: 16, margin: "10px 0" }}>
            {test.strony ? (
              <div style={{ fontSize: 15, color: C.ink, lineHeight: 1.9 }}>
                {tx("Lewa noga:")} <b style={{ color: C.purple }}>{czasL} {test.unit}</b><br />
                {tx("Prawa noga:")} <b style={{ color: C.purple }}>{czasR} {test.unit}</b>
                {Math.abs(czasL - czasR) >= 3 && <div style={{ fontSize: 12, color: C.warn, marginTop: 8, lineHeight: 1.5 }}>{tx("Wyraźna różnica między nogami — warto wzmocnić słabszą stronę (trener to uwzględni).")}</div>}
              </div>
            ) : test.wybory ? (
              <>
                <div style={{ fontSize: 13, color: C.sub, marginBottom: 8 }}>{tx("Twój wynik:")}</div>
                {test.wybory.map(([v, l]) => (
                  <button key={v} onClick={() => setWartosc(v)} style={{ width: "100%", textAlign: "left", padding: 12, marginBottom: 8, borderRadius: 10, cursor: "pointer",
                    border: `1px solid ${wartosc === v ? C.accent : C.line}`, background: wartosc === v ? C.accent + "18" : C.surface2, color: C.ink, fontWeight: 700, fontSize: 14 }}>{l}</button>
                ))}
              </>
            ) : test.gps ? (
              <>
                <div style={{ fontSize: 13, color: C.sub, marginBottom: 8 }}>{tx("Dystans (m)")}{gpsOk ? tx(" — z GPS, możesz poprawić") : tx(" — wpisz ręcznie")}:</div>
                <input value={wartosc || (gpsOk ? String(Math.round(gpsDist)) : "")} onChange={(e) => setWartosc(e.target.value.replace(/\D/g, ""))} inputMode="numeric" placeholder={tx("np. 800")} style={inp} />
              </>
            ) : test.stoper ? (
              <div style={{ fontSize: 15, color: C.ink }}>{tx("Czas planku:")} <b style={{ color: C.purple }}>{fmt(stoperT)}</b></div>
            ) : (
              <>
                <div style={{ fontSize: 13, color: C.sub, marginBottom: 8 }}>{test.typ === "puls" ? tx("Tętno spoczynkowe (bpm):") : <>{tx("Wynik (")}{test.unit}):</>}</div>
                {test.typ === "puls" && hr?.connected && (
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                    <div style={{ flex: 1, background: "#4FD6A618", border: `1px solid #4FD6A6`, borderRadius: 10, padding: "10px 12px", color: "#4FD6A6", fontWeight: 800, fontSize: 14 }}>{tx("Opaska:")} {hr.bpm || "—"} {tx("bpm")}</div>
                    <button onClick={() => hr.bpm && setWartosc(String(hr.bpm))} style={{ padding: "10px 12px", borderRadius: 10, border: "none", background: "#4FD6A6", color: C.bg, fontWeight: 800, fontSize: 13, cursor: "pointer" }}>{tx("Użyj")}</button>
                  </div>
                )}
                <input value={wartosc} onChange={(e) => setWartosc(e.target.value.replace(/\D/g, ""))} inputMode="numeric" placeholder={test.typ === "puls" ? tx("np. 60") : tx("liczba")} style={inp} />
              </>
            )}
            {test.mierzPuls && (
              <div style={{ marginTop: 12 }}>
                <div style={{ fontSize: 13, color: C.warn, fontWeight: 700, marginBottom: 6 }}>{tx("❤ Tętno teraz (bpm)")}{tx(" — zmierz zaraz po teście")}:</div>
                {hr?.connected && (
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                    <div style={{ flex: 1, background: "#4FD6A618", border: `1px solid #4FD6A6`, borderRadius: 10, padding: "10px 12px", color: "#4FD6A6", fontWeight: 800, fontSize: 14 }}>
                      {tx("Opaska:")} {hr.bpm || "—"} {tx("bpm")}
                    </div>
                    <button onClick={() => hr.bpm && setPuls(String(hr.bpm))} style={{ padding: "10px 12px", borderRadius: 10, border: "none", background: "#4FD6A6", color: C.bg, fontWeight: 800, fontSize: 13, cursor: "pointer" }}>{tx("Użyj")}</button>
                  </div>
                )}
                <input value={puls} onChange={(e) => setPuls(e.target.value.replace(/\D/g, ""))} inputMode="numeric" placeholder={tx("np. 130")} style={inp} />
                <p style={{ fontSize: 11, color: C.sub, marginTop: 6 }}>{hr?.connected ? tx("Możesz pobrać z opaski przyciskiem „Użyj” albo wpisać ręcznie.") : tx("Nie masz opaski? Policz uderzenia przez 15 s i pomnóż ×4 (albo połącz opaskę w Ustawieniach).")}</p>
              </div>
            )}
          </div>
          <button onClick={zapiszTest} style={{ ...primary, marginTop: 0 }}>{ostatni ? tx("Zakończ i przekaż trenerowi") : "Zapisz i dalej"}</button>
          <button onClick={pomin} style={{ ...ghost, marginTop: 10 }}>{tx("Pomiń bez wyniku")}</button>
        </div>
      )}
      </>}
    </div>
  );
}

/* ── ANALIZA TECHNIKI BIEGU Z FILMIKU ─────────────────────────
   Pełna analiza wideo wymaga modelu wideo i backendu. W Artefakcie:
   użytkownik nagrywa/wgrywa krótki filmik z boku, wyciągamy klatkę
   (canvas) i wysyłamy ją do AI z promptem o technice biegu. To daje
   konkretną informację zwrotną na co zwrócić uwagę.
─────────────────────────────────────────────────────────────*/
function AnalizaBiegu({ profile, useCredit, refundCredit, account, go }) {
  const [klatki, setKlatki] = useState([]); // dataURL
  const [analiza, setAnaliza] = useState("");
  const [busy, setBusy] = useState(false);
  const videoRef = useRef(null), fileRef = useRef(null);

  const wczytajVideo = (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    const url = URL.createObjectURL(f);
    const v = videoRef.current; v.src = url; v.load();
  };
  const zlapKlatke = () => {
    const v = videoRef.current; if (!v || !v.videoWidth) { alert(tx("Najpierw wczytaj filmik i przewiń do momentu biegu.")); return; }
    const c = document.createElement("canvas");
    const scale = Math.min(1, 640 / v.videoWidth);
    c.width = v.videoWidth * scale; c.height = v.videoHeight * scale;
    c.getContext("2d").drawImage(v, 0, 0, c.width, c.height);
    const data = c.toDataURL("image/jpeg", 0.7);
    setKlatki((k) => k.length >= 3 ? k : [...k, data]);
  };

  const analizuj = async () => {
    if (!klatki.length) { alert(tx("Złap przynajmniej jedną klatkę z biegu.")); return; }
    if (useCredit && !useCredit("zdjecie")) { setAnaliza(tx("Brak kredytów na analizę zdjęć. Wykup wyższy plan.")); return; }
    setBusy(true);
    const sys = `Jesteś trenerem biegania i analitykiem techniki. Mówisz po polsku, konkretnie. Na podstawie klatek z biegu oceń technikę: lądowanie stopy (pięta/śródstopie), kąt tułowia, praca ramion, kadencja/długość kroku, ustawienie bioder, głowa/wzrok. Podaj 3 najważniejsze rzeczy do poprawy i 1-2 mocne strony. Jeśli klatka jest niewyraźna lub to nie bieg — powiedz, jak nagrać lepiej (z boku, 5-10 m, pełna sylwetka, dobre światło). Maks 6 zdań.`;
    const content = [
      ...klatki.map((d) => ({ type: "image", source: { type: "base64", media_type: "image/jpeg", data: d.split(",")[1] } })),
      { type: "text", text: "Oceń technikę biegu z tych klatek i powiedz, na co mam zwrócić uwagę." },
    ];
    try {
      const txt = await callClaude({ model: "claude-sonnet-4-6", max_tokens: 700, system: sys + langDirective(langOf(profile)), messages: [{ role: "user", content }] });
      setAnaliza(txt); speak(txt);
    } catch (e) { refundCredit && refundCredit("zdjecie"); setAnaliza(aiErr(e)); }
    finally { setBusy(false); }
  };

  return (
    <div>
      <h2 style={{ fontSize: 22, fontWeight: 800 }}>{tx("Analiza techniki biegu")}</h2>
      <div style={{ background: C.surface, borderRadius: 14, padding: 16, margin: "12px 0", fontSize: 13, color: C.sub, lineHeight: 1.7 }}>
        <div style={{ fontSize: 11, color: C.accent, fontWeight: 800, letterSpacing: 1, marginBottom: 6 }}>{tx("JAK NAGRAĆ FILMIK")}</div>
        <ol style={{ margin: 0, paddingLeft: 18, display: "flex", flexDirection: "column", gap: 5 }}>

          <li>{tx("Cała sylwetka w kadrze, dobre światło, tło bez tłumu.")}</li>

      <input ref={fileRef} type="file" accept="video/*" capture="environment" onChange={wczytajVideo} style={{ display: "none" }} />
      <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
        <button onClick={() => fileRef.current?.click()} style={{ flex: 1, padding: 13, borderRadius: 12, border: `1px solid ${C.line}`, background: C.surface2, color: C.ink, fontWeight: 800, cursor: "pointer" }}>{tx("📹 Wczytaj filmik")}</button>
        <button onClick={zlapKlatke} style={{ flex: 1, padding: 13, borderRadius: 12, border: "none", background: C.accent, color: C.bg, fontWeight: 800, cursor: "pointer" }}>{tx("📸 Złap klatkę")}</button>
      </div>

      {klatki.length > 0 && (
        <div style={{ display: "flex", gap: 8, marginTop: 12, overflowX: "auto" }}>
          {klatki.map((k, i) => (
            <div key={i} style={{ position: "relative", flex: "0 0 auto" }}>
              <img src={k} alt={`klatka ${i + 1}`} style={{ height: 90, borderRadius: 8, border: `1px solid ${C.line}` }} />
              <button onClick={() => setKlatki((arr) => arr.filter((_, j) => j !== i))} style={{ position: "absolute", top: 2, right: 2, background: C.warn, color: C.bg, border: "none", borderRadius: 10, width: 20, height: 20, fontWeight: 800, cursor: "pointer" }}>×</button>
            </div>
          ))}
        </div>
      )}

      <button onClick={analizuj} disabled={busy || !klatki.length} style={{ ...primary, opacity: !klatki.length ? 0.5 : 1 }}>{busy ? tx("Analizuję technikę…") : tx("Analizuj technikę biegu")}</button>

      {analiza && (
        <div style={{ background: C.surface2, border: `1px solid ${C.accent}`, borderRadius: 14, padding: 16, marginTop: 14 }}>
          <div style={{ fontSize: 11, color: C.accent, fontWeight: 800, letterSpacing: 1, marginBottom: 6 }}>{tx("OCENA TRENERA")}</div>
          <p style={{ fontSize: 14, lineHeight: 1.6, margin: 0, whiteSpace: "pre-wrap" }}>{analiza}</p>
        </div>
      )}
      <p style={{ fontSize: 11, color: C.sub, marginTop: 12, lineHeight: 1.5 }}>{tx("Analiza opiera się na pojedynczych klatkach. W wersji online można dodać pełne wideo i porównanie w czasie.")}</p>
    </div>
  );
}

/* ── TRASY GPS: nagrywanie, zapis, bieg wg trasy ──────────────
   Mapa kafelkowa wymaga zewnętrznego serwera — w Artefakcie rysujemy
   ślad lokalnie (SVG). Można nagrać trasę (GPS), zapisać ją, a potem
   biec według niej: aplikacja pokazuje postęp i podpowiada (podbieg,
   prosta, ostatni kilometr). Analizę "na żywo" liczymy z nachylenia
   (różnice wysokości GPS) i tempa.
─────────────────────────────────────────────────────────────*/
function RouteMapLive({ track, pos, color = C.accent }) {
  if (!track || track.length < 2) return null;
  const lats = track.map((p) => p.lat), lngs = track.map((p) => p.lng);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLng = Math.min(...lngs), maxLng = Math.max(...lngs);
  const latMid = (minLat + maxLat) / 2, kx = Math.cos((latMid * Math.PI) / 180);
  const spanLat = (maxLat - minLat) || 1e-6, spanLng = ((maxLng - minLng) * kx) || 1e-6;
  const W = 300, H = 200, pad = 16;
  const scale = Math.min((W - 2 * pad) / spanLng, (H - 2 * pad) / spanLat);
  const offX = (W - spanLng * scale) / 2, offY = (H - spanLat * scale) / 2;
  const toXY = (p) => [offX + ((p.lng - minLng) * kx) * scale, H - (offY + (p.lat - minLat) * scale)];
  const pts = track.map(toXY);
  const [fx, fy] = pts[0], [lx, ly] = pts[pts.length - 1];
  const me = pos ? toXY(pos) : null;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{ background: C.surface2, borderRadius: 12 }}>
      <polyline points={pts.map((p) => p.join(",")).join(" ")} fill="none" stroke={color} strokeWidth="3" strokeLinejoin="round" strokeLinecap="round" opacity="0.55" />
      <circle cx={fx} cy={fy} r="5" fill="#4FD6A6" />
      <circle cx={lx} cy={ly} r="5" fill={C.warn} />
      {me && <circle cx={me[0]} cy={me[1]} r="6" fill={C.cool} stroke="#fff" strokeWidth="2" />}
    </svg>
  );
}

function Trasy({ profile, setProfile, go }) {
  const trasy = profile?.trasy || [];
  const [tryb, setTryb] = useState("lista"); // lista | nagrywanie | bieg
  const [rec, setRec] = useState([]);
  const [recOn, setRecOn] = useState(false);
  const [biegTrasa, setBiegTrasa] = useState(null);
  const [pos, setPos] = useState(null);
  const [postep, setPostep] = useState(0);
  const [cue, setCue] = useState("");
  const [biegT, setBiegT] = useState(0);
  const [biegKm, setBiegKm] = useState(0);
  const watchRef = useRef(null), lastCue = useRef(-999), tRef = useRef(0);
  const biegTimer = useRef(null), biegStart = useRef(0), lastBiegPos = useRef(null), lastBiegTime = useRef(null);

  const wake = useWakeLock(); // GPS w przeglądarce zasypia przy zgaszonym ekranie — trzymamy ekran włączony
  const gapT = useRef({ count: 0, sec: 0, lastT: null });
  const stop = () => { if (watchRef.current != null && navigator.geolocation) gpsClearWatch(watchRef.current); watchRef.current = null; wake.release(); };
  useEffect(() => () => { stop(); if (biegTimer.current) clearInterval(biegTimer.current); }, []);

  const dlugosc = (tr) => { let d = 0; for (let i = 1; i < tr.length; i++) d += distM(tr[i - 1], tr[i]); return d; };

  const startNagrywanie = () => {
    stop(); // fix: zamknij ewentualny wcześniejszy watch GPS, żeby nie wyciekał
    setRec([]); setRecOn(true); setTryb("nagrywanie");
    gapT.current = { count: 0, sec: 0, lastT: null };
    wake.request();
    if (gpsEnabled() && navigator.geolocation) watchRef.current = gpsWatch((p) => {
      const a = p.coords.accuracy;
      if (a != null && a > 50) return; // odczyt zbyt słaby, żeby zapisywać go do trasy
      const now = p.timestamp || Date.now();
      const cur = { lat: p.coords.latitude, lng: p.coords.longitude, alt: p.coords.altitude ?? null };
      if (gapT.current.lastT && (now - gapT.current.lastT) / 1000 > 15) { // przerwa — trasa będzie miała dziurę
        gapT.current.count += 1; gapT.current.sec += (now - gapT.current.lastT) / 1000;
        try { navigator.vibrate?.([100, 80, 100]); } catch { /* ignore */ }
      }
      gapT.current.lastT = now;
      setRec((r) => {
        const last = r[r.length - 1];
        if (!last) return [...r, { ...cur, t: now }];
        const d = distM(last, cur);
        if (d < 4) return r; // dryf w miejscu
        if (last.t && (now - last.t) / 1000 > 0 && d / ((now - last.t) / 1000) > 7) return r; // >25 km/h — skok-śmieć
        return [...r, { ...cur, t: now }];
      });
      setPos(cur);
    }, () => {}, { enableHighAccuracy: true, maximumAge: 1000, timeout: 8000 });
  };
  const zapiszTrase = () => {
    stop(); setRecOn(false);
    if (rec.length < 2) { setTryb("lista"); return; }
    if (gapT.current.sec > 30) alert(`${tx("Uwaga: GPS miał przerwy")} (${Math.round(gapT.current.sec)} s) — ${tx("trasa może mieć dziury.")}`);
    const nazwa = `Trasa ${trasy.length + 1} · ${(dlugosc(rec) / 1000).toFixed(2)} km`;
    const nowe = [...trasy, { id: Date.now(), nazwa, track: rec }];
    setProfile({ ...(profile || {}), trasy: nowe });
    setTryb("lista");
  };
  const usun = (id) => setProfile({ ...(profile || {}), trasy: trasy.filter((t) => t.id !== id) });
  const fileRef = useRef(null);
  const importujGPX = (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      const { track, nazwa } = parseGPX(String(reader.result));
      if (track.length < 2) { alert(tx("Nie udało się odczytać trasy z pliku GPX.")); return; }
      const dl = (track.reduce((a, _, i) => i ? a + distM(track[i - 1], track[i]) : 0, 0) / 1000).toFixed(2);
      const nowe = [...trasy, { id: Date.now(), nazwa: nazwa || `Import · ${dl} km`, track, zaimportowana: true }];
      setProfile({ ...(profile || {}), trasy: nowe });
    };
    reader.readAsText(f);
    e.target.value = "";
  };

  // bieg wg trasy: porównuj pozycję do śladu, licz postęp i podpowiadaj
  const startBieg = (tr) => {
    setBiegTrasa(tr); setTryb("bieg"); setPostep(0); setCue(tx("Ruszamy. Trzymaj się trasy.")); tRef.current = 0;
    setBiegT(0); setBiegKm(0); biegStart.current = Date.now(); lastBiegPos.current = null; lastBiegTime.current = null;
    if (biegTimer.current) clearInterval(biegTimer.current);
    biegTimer.current = setInterval(() => setBiegT(Math.round((Date.now() - biegStart.current) / 1000)), 1000);
    speak(tx("Bieg według trasy. Prowadzę Cię."));
    stop(); // fix: zamknij poprzedni watch GPS przed startem nowego (bez tego stary licznik pozycji wyciekał)
    if (gpsEnabled() && navigator.geolocation) watchRef.current = gpsWatch((p) => {
      const cur = { lat: p.coords.latitude, lng: p.coords.longitude, alt: p.coords.altitude ?? null };
      setPos(cur);
      const a = p.coords.accuracy;
      const now = p.timestamp || Date.now();
      const dt = lastBiegTime.current ? (now - lastBiegTime.current) / 1000 : 0;
      const inc = gpsStep(lastBiegPos.current, cur, a, dt);
      if (inc.inc > 0) setBiegKm((x) => x + inc.inc / 1000);
      if (inc.anchor) { lastBiegPos.current = cur; lastBiegTime.current = now; }
      // najbliższy punkt trasy
      let best = 0, bestD = Infinity;
      tr.track.forEach((pt, i) => { const d = distM(pt, cur); if (d < bestD) { bestD = d; best = i; } });
      const frac = best / (tr.track.length - 1);
      setPostep(Math.round(frac * 100));
      const teraz = Date.now();
      if (teraz - lastCue.current > 12000) {
        lastCue.current = teraz;
        let txt = "";
        const a = tr.track[Math.max(0, best - 2)]?.alt, b = tr.track[Math.min(tr.track.length - 1, best + 2)]?.alt;
        if (a != null && b != null) {
          const dz = b - a;
          if (dz > 3) txt = tx("Podbieg — zwolnij, krótszy krok, oszczędzaj siły.");
          else if (dz < -3) txt = tx("Zbieg — luźno, nie hamuj za mocno, kontroluj tempo.");
          else txt = tx("Prosto, nachylenie zerowe — możesz przyspieszyć.");
        }
        if (bestD > 30) txt = tx("Zboczyłeś z trasy — wróć na linię.");
        if (frac > 0.9) txt = tx("Ostatni odcinek do mety — daj z siebie resztę!");
        if (txt) { setCue(txt); speak(txt); }
      }
    }, () => {}, { enableHighAccuracy: true, maximumAge: 1000, timeout: 8000 });
  };
  const konecBieg = () => {
    stop(); if (biegTimer.current) clearInterval(biegTimer.current);
    // zapisz przebieg do trasy (do porównań)
    if (biegTrasa && biegT > 10) {
      const km = +Math.max(biegKm, (biegTrasa.track.reduce((a, _, i) => i ? a + distM(biegTrasa.track[i - 1], biegTrasa.track[i]) : 0, 0)) / 1000).toFixed(2);
      const wpis = { data: new Date().toISOString(), czas: biegT, km: +biegKm.toFixed(2) || km };
      const nowe = trasy.map((t) => t.id === biegTrasa.id ? { ...t, przebiegi: [...(t.przebiegi || []), wpis] } : t);
      setProfile({ ...(profile || {}), trasy: nowe });
    }
    setTryb("lista"); setBiegTrasa(null);
  };

  if (tryb === "nagrywanie") {
    return (
      <div>
        <h2 style={{ fontSize: 21, fontWeight: 800 }}>{tx("Nagrywanie trasy")}</h2>
        <p style={{ color: C.sub, fontSize: 13, lineHeight: 1.5 }}>{tx("Idź lub biegnij całą trasę. Aplikacja zapisuje ślad GPS. Na końcu zapisz, żeby potem biec według niej.")}</p>
        <div style={{ margin: "12px 0" }}>{rec.length > 1 ? <RouteMapLive track={rec} pos={pos} /> : <div style={{ background: C.surface2, borderRadius: 12, padding: 30, textAlign: "center", color: C.sub }}>{tx("Czekam na sygnał GPS… (")}{rec.length} {tx("pkt)")}</div>}</div>
        <div style={{ textAlign: "center", fontSize: 26, fontWeight: 800, color: C.accent }}>{(dlugosc(rec) / 1000).toFixed(2)} {tx("km")}</div>
        <button onClick={zapiszTrase} style={primary}>{tx("Zapisz trasę")}</button>
        <button onClick={() => { stop(); setRecOn(false); setTryb("lista"); }} style={{ ...ghost, marginTop: 10 }}>{tx("Anuluj")}</button>
      </div>
    );
  }
  if (tryb === "bieg" && biegTrasa) {
    return (
      <div>
        <h2 style={{ fontSize: 21, fontWeight: 800 }}>{tx("Bieg wg trasy")}</h2>
        <p style={{ color: C.sub, fontSize: 13 }}>{biegTrasa.nazwa}</p>
        <div style={{ display: "flex", gap: 10, margin: "10px 0" }}>
          <Box val={fmt(biegT)} unit="czas" c={C.accent} />
          <Box val={biegKm.toFixed(2)} unit="km" c="#F2B457" />
          <Box val={biegKm > 0.05 ? fmt(Math.round(biegT / biegKm)) : "—"} unit="/km" c={C.cool} />
        </div>
        <div style={{ margin: "4px 0 12px" }}><RouteMapLive track={biegTrasa.track} pos={pos} color={C.purple} /></div>
        <div style={{ height: 6, background: C.line, borderRadius: 3, margin: "4px 0 14px" }}>
          <div style={{ height: "100%", width: `${postep}%`, background: C.purple, borderRadius: 3, transition: "width .4s" }} />
        </div>
        <div style={{ textAlign: "center", fontSize: 13, color: C.sub }}>{tx("postęp trasy")}</div>
        <div style={{ textAlign: "center", fontSize: 40, fontWeight: 800, color: C.purple }}>{postep}%</div>
        {cue && (
          <div style={{ background: C.surface2, border: `1px solid ${C.cool}`, borderRadius: 12, padding: "12px 14px", margin: "12px 0" }}>
            <div style={{ fontSize: 10, color: C.cool, fontWeight: 800, letterSpacing: 1 }}>{tx("🔊 PROWADZENIE")}</div>
            <div style={{ fontSize: 15, lineHeight: 1.4 }}>{cue}</div>
          </div>
        )}
        <button onClick={konecBieg} style={{ ...primary, background: C.warn }}>{tx("Zakończ bieg")}</button>
      </div>
    );
  }

  return (
    <div>
      <h2 style={{ fontSize: 22, fontWeight: 800 }}>{tx("Moje trasy")}</h2>
      <p style={{ color: C.sub, fontSize: 13, lineHeight: 1.5 }}>{tx("Nagraj lub zaimportuj trasy i biegnij według nich z prowadzeniem głosowym i analizą nachylenia. Powtórne biegi tej samej trasy porównujemy między sobą.")}</p>
      <div style={{ display: "flex", gap: 10 }}>
        <button onClick={startNagrywanie} style={{ ...primary, marginTop: 14 }}>{tx("+ Nagraj trasę (GPS)")}</button>
        <button onClick={() => fileRef.current?.click()} style={{ marginTop: 14, padding: 16, background: C.surface2, color: C.ink, border: `1px solid ${C.line}`, borderRadius: 12, fontWeight: 800, fontSize: 14, cursor: "pointer", whiteSpace: "nowrap" }}>{tx("Import GPX")}</button>
      </div>
      <input ref={fileRef} type="file" accept=".gpx,application/gpx+xml,application/xml,text/xml" onChange={importujGPX} style={{ display: "none" }} />
      <div style={{ marginTop: 16 }}>
        {trasy.length === 0 && <div style={{ background: C.surface, border: `1px dashed ${C.line}`, borderRadius: 14, padding: 20, textAlign: "center", color: C.sub, fontSize: 13 }}>{tx("Brak tras. Nagraj pierwszą lub zaimportuj plik GPX.")}</div>}
        {trasy.map((t) => {
          const pb = t.przebiegi || [];
          const best = pb.length ? pb.reduce((a, b) => (b.czas < a.czas ? b : a)) : null;
          const last = pb.length ? pb[pb.length - 1] : null;
          const delta = best && last && last !== best ? last.czas - best.czas : null;
          return (
            <div key={t.id} style={{ background: C.surface, border: `1px solid ${C.line}`, borderRadius: 14, padding: 14, marginBottom: 10 }}>
              <RouteMap track={t.track} color={C.accent} />
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 8 }}>
                <div style={{ fontSize: 15, fontWeight: 800 }}>{t.nazwa}{t.zaimportowana ? <span style={{ fontSize: 11, color: C.cool, fontWeight: 700 }}> {tx("· GPX")}</span> : null}</div>
                <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                  <button onClick={() => pobierzGPX(t.track, t.nazwa)} style={{ background: "none", border: "none", color: C.cool, fontSize: 13, cursor: "pointer", fontWeight: 700 }}>{tx("GPX")}</button>
                  <button onClick={() => usun(t.id)} style={{ background: "none", border: "none", color: C.warn, fontSize: 13, cursor: "pointer", fontWeight: 700 }}>{tx("Usuń")}</button>
                </div>
              </div>

              {pb.length > 0 && (
                <div style={{ background: C.surface2, borderRadius: 10, padding: 10, marginTop: 8, fontSize: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", color: C.sub, marginBottom: 4 }}>
                    <span>{tx("Przebiegów:")} {pb.length}</span>
                    <span>{tx("🏆 Rekord:")} <b style={{ color: C.accent }}>{fmt(best.czas)}</b></span>
                  </div>
                  {last && (
                    <div style={{ display: "flex", justifyContent: "space-between", color: C.sub }}>
                      <span>{tx("Ostatni:")} {fmt(last.czas)} · {last.km} {tx("km")}</span>
                      {delta != null && <span style={{ color: delta <= 0 ? "#4FD6A6" : C.warn, fontWeight: 700 }}>{delta <= 0 ? `▼ ${fmt(Math.abs(delta))} szybciej` : `▲ ${fmt(delta)} wolniej`}</span>}
                    </div>
                  )}
                </div>
              )}

              <button onClick={() => startBieg(t)} style={{ ...primary, marginTop: 8 }}>{tx("▶ Biegnij wg tej trasy")}</button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── TEST ROZPOZNAWCZY: Cooper 12 min + GPS ───────────────── */
function TestBiegowy({ onDone, go, hr, profile }) {
  const TOTAL = 12 * 60; // sekundy
  const [phase, setPhase] = useState("intro"); // intro | run | done
  const [left, setLeft] = useState(TOTAL);
  const [dist, setDist] = useState(0); // metry
  const [speed, setSpeed] = useState(0); // km/h chwilowa
  const [gpsOk, setGpsOk] = useState(null); // null=nieznane, true/false
  const [gpsErr, setGpsErr] = useState("");
  const [manualDist, setManualDist] = useState(""); // metry, fallback
  const [acc, setAcc] = useState(null); // dokładność GPS (m) na żywo
  const [gpsGapMsg, setGpsGapMsg] = useState(""); // baner po przerwie GPS

  const timerRef = useRef(null);
  const watchRef = useRef(null);
  const lastPos = useRef(null);
  const lastGpsTime = useRef(null);
  const distRef = useRef(0);
  const spdWin = useRef([]); // {t, d} — liczy prędkość z realnego dystansu, nie z zaszumionego p.coords.speed
  const ended = useRef(false);
  const hrSamples = useRef([]);
  const statRef = useRef({ pts: 0, rejAcc: 0, rejNoise: 0, rejTele: 0, gap: 0, gapSec: 0 }); // telemetria GPS — diagnoza „zaniżonego dystansu”
  const gapMsgT = useRef(null);
  const wake = useWakeLock();

  const stopAll = () => {
    clearInterval(timerRef.current); timerRef.current = null;
    if (watchRef.current != null && navigator.geolocation) gpsClearWatch(watchRef.current);
    watchRef.current = null;
    wake.release();
  };
  useEffect(() => () => stopAll(), []);

  const finish = () => {
    if (ended.current) return;
    ended.current = true;
    stopAll();
    setPhase("done");
  };

  const start = () => {
    ended.current = false; hrSamples.current = [];
    setDist(0); setSpeed(0); setLeft(TOTAL); lastPos.current = null; lastGpsTime.current = null; distRef.current = 0; spdWin.current = []; setGpsErr("");
    statRef.current = { pts: 0, rejAcc: 0, rejNoise: 0, rejTele: 0, gap: 0, gapSec: 0 }; setGpsGapMsg(""); setAcc(null);
    wake.request(); // ekran nie może zgasnąć — watchPosition w przeglądarce zasypia bez włączonego ekranu
    setPhase("run");

    // GPS
    if (navigator.geolocation) {
      watchRef.current = gpsWatch(
        (p) => {
          if (ended.current) return;
          setGpsOk(true);
          const a = p.coords.accuracy;
          const now = p.timestamp || Date.now();
          const cur = { lat: p.coords.latitude, lng: p.coords.longitude };
          const dt = lastGpsTime.current ? (now - lastGpsTime.current) / 1000 : 0;
          setAcc(a != null ? Math.round(a) : null);
          const st = statRef.current; st.pts += 1;
          if (dt > 15) { // przerwa w dopływie pozycji (sygnał / system)
            st.gap += 1; st.gapSec += dt;
            try { navigator.vibrate?.([100, 80, 100]); } catch { /* ignore */ }
            setGpsGapMsg(`${tx("GPS miał przerwę")} ${Math.round(dt)} s`);
            clearTimeout(gapMsgT.current); gapMsgT.current = setTimeout(() => setGpsGapMsg(""), 12000);
          }
          const r = gpsStep(lastPos.current, cur, a, dt);
          if (r.why === "acc") st.rejAcc += 1; else if (r.why === "noise") st.rejNoise += 1; else if (r.why === "tele") st.rejTele += 1;
          if (r.inc > 0) setDist((x) => { const nd = x + r.inc; distRef.current = nd; return nd; });
          if (r.anchor) { lastPos.current = cur; lastGpsTime.current = now; }
          spdWin.current.push({ t: now, d: distRef.current });
          while (spdWin.current.length > 1 && now - spdWin.current[0].t > 10000) spdWin.current.shift();
          if (spdWin.current.length >= 2) {
            const win = spdWin.current;
            const dtWin = (win[win.length - 1].t - win[0].t) / 1000;
            const ddWin = win[win.length - 1].d - win[0].d;
            // ddWin < 3 m w całym oknie = stoisz (sam dryf) → prędkość 0, nie mikroszum
            if (dtWin >= 3) setSpeed(ddWin < 3 ? 0 : Math.max(0, (ddWin / dtWin) * 3.6));
          }
        },
        () => { setGpsOk(false); setGpsErr(tx("Brak dostępu do GPS — po teście wpisz dystans ręcznie.")); },
        { enableHighAccuracy: true, maximumAge: 1000, timeout: 8000 }
      );
    } else {
      setGpsOk(false);
      setGpsErr(tx("Ta przeglądarka nie udostępnia GPS — po teście wpisz dystans ręcznie."));
    }

    // odliczanie — side-effecty (stop, zmiana fazy) POZA updaterem stanu
    timerRef.current = setInterval(() => {
      if (hr?.bpm) hrSamples.current.push(hr.bpm);
      setLeft((x) => {
        const nx = x - 1;
        if (nx <= 0) { finish(); return 0; }
        return nx;
      });
    }, 1000);
  };

  const stopEarly = () => finish();

  const finalDist = gpsOk ? Math.round(dist) : (parseInt(manualDist) || 0);
  const vo2 = finalDist ? cooperVO2(finalDist) : 0;
  const avgPace = finalDist ? (12 * 60) / (finalDist / 1000) : 0; // s/km dla przebiegniętego dystansu w 12 min
  const ranSec = TOTAL - left;
  const avgHR = hrSamples.current.length ? Math.round(hrSamples.current.reduce((a, b) => a + b, 0) / hrSamples.current.length) : null;
  const maxHR = hrSamples.current.length ? Math.max(...hrSamples.current) : null;

          GPS zmierzy dystans i prędkość, a aplikacja policzy Twój szacowany VO₂max i tempa treningowe.
        </p>
        <div style={{ background: C.surface, borderRadius: 14, padding: 16, margin: "14px 0", fontSize: 13, color: C.sub, lineHeight: 1.7 }}>

          {tx("• Rozgrzej się (zakładka Rozgrzewka).")}<br />
          {tx("• Wyjdź na otwartą przestrzeń — GPS gubi się w budynkach.")}<br />
          {tx("• Zgódź się na dostęp do lokalizacji, gdy telefon zapyta.")}<br />
          {tx("• Biegnij równo, nie zrywaj się od startu.")}
        </div>
        <button onClick={start} style={{ width: "100%", padding: 16, background: "#F2B457", color: C.bg, border: "none", borderRadius: 12, fontWeight: 800, fontSize: 16, cursor: "pointer" }}>

        <div style={{ height: 6, background: C.line, borderRadius: 3, margin: "10px 0 20px" }}>

          <div style={{ flex: 1, background: C.surface, borderRadius: 14, padding: 16, textAlign: "center" }}>

            <div style={{ fontSize: 11, color: C.sub }}>{hr?.connected ? (strefaHR(hr?.bpm, profile) ? `Z${strefaHR(hr?.bpm, profile).z} · ${tx("tętno")}` : tx("tętno")) : "brak opaski"}</div>

/* ── TĘTNO: Web Bluetooth HR + ręczne + strefy ────────────── */
function Tetno({ profile, setProfile, hr }) {
  const [age, setAge] = useState(profile?.age || 30);
  const [bpmLocal, setBpmLocal] = useState(null);
  const [connectedLocal, setConnectedLocal] = useState(false);
  // preferuj globalną opaskę z Ustawień, jeśli połączona
  const bpm = hr?.connected ? hr.bpm : bpmLocal;
  const connected = hr?.connected || connectedLocal;
  const setBpm = setBpmLocal;
  const setConnected = setConnectedLocal;
  const [err, setErr] = useState("");
  const [manual, setManual] = useState("");

  const connect = async () => {
    setErr("");
    if (!navigator.bluetooth) {
      setErr(tx("Ta przeglądarka nie obsługuje Web Bluetooth. Otwórz aplikację w Chrome na Androidzie."));
      return;
    }
    try {
      const dev = await navigator.bluetooth.requestDevice({
        filters: [{ services: ["heart_rate"] }],
      });
      const srv = await dev.gatt.connect();
      const s = await srv.getPrimaryService("heart_rate");
      const ch = await s.getCharacteristic("heart_rate_measurement");
      await ch.startNotifications();
      ch.addEventListener("characteristicvaluechanged", (e) => {
        const v = e.target.value;
        const flags = v.getUint8(0);
        const hr = flags & 0x01 ? v.getUint16(1, true) : v.getUint8(1);
        setBpm(hr);
      });
      setConnected(true);
    } catch (e) {
      setErr(tx("Nie udało się połączyć. Upewnij się, że pas HR jest włączony i blisko. (Działa z Polar, Wahoo, Coospo, Garmin HRM itp.)"));
    }
  };

  const zones = hrZones(age, profile?.restHR);
  const current = bpm ?? (manual ? parseInt(manual) : null);
  const activeZone = current ? zones.find((z) => current >= z.lo && current <= z.hi) : null;

  return (
    <div>
      <h2 style={{ fontSize: 20, fontWeight: 800 }}>{tx("Tętno i strefy")}</h2>

      <div style={{ background: C.surface, borderRadius: 14, padding: 16, margin: "12px 0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ color: C.sub, fontSize: 14 }}>{tx("Twój wiek")}</span>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <button onClick={() => { const a = Math.max(14, age - 1); setAge(a); setProfile({ ...(profile || {}), age: a }); }} style={stepStyle}>−</button>
          <span style={{ fontWeight: 800, fontSize: 20, minWidth: 40, textAlign: "center" }}>{age}</span>
          <button onClick={() => { const a = age + 1; setAge(a); setProfile({ ...(profile || {}), age: a }); }} style={stepStyle}>+</button>
        </div>
      </div>

      <button onClick={connect} style={{ width: "100%", padding: 15, background: connected ? C.surface2 : C.warn, color: connected ? C.accent : C.bg, border: connected ? `1px solid ${C.accent}` : "none", borderRadius: 12, fontWeight: 800, fontSize: 15, cursor: "pointer", marginBottom: 8 }}>
        {connected ? tx("✓ Pas HR połączony") : tx("Podłącz pas tętna (Bluetooth)")}
      </button>
      {err && <p style={{ color: C.warn, fontSize: 12, lineHeight: 1.5, margin: "0 0 10px" }}>{err}</p>}

      {!connected && (
        <div style={{ display: "flex", gap: 8, marginBottom: 8, alignItems: "center" }}>
          <span style={{ color: C.sub, fontSize: 13 }}>{tx("lub wpisz z zegarka:")}</span>
          <input value={manual} onChange={(e) => setManual(e.target.value.replace(/\D/g, ""))} placeholder={tx("np. 145")} inputMode="numeric"
            style={{ flex: 1, padding: "10px 12px", borderRadius: 10, border: `1px solid ${C.line}`, background: C.surface, color: C.ink, fontSize: 15, outline: "none" }} />
        </div>
      )}

      {current && (
        <div style={{ textAlign: "center", padding: "16px 0" }}>
          <div style={{ fontSize: 52, fontWeight: 800, color: activeZone?.c || C.ink, animation: connected ? "pulse 1s infinite" : "none" }}>{current}</div>
          <div style={{ fontSize: 13, color: C.sub }}>{tx("uderzeń / min")}</div>
          {activeZone && <div style={{ marginTop: 6, fontWeight: 800, color: activeZone.c }}>{activeZone.name}</div>}
        </div>
      )}

      <div style={{ marginTop: 14 }}>
        <div style={{ fontSize: 12, color: C.sub, fontWeight: 700, marginBottom: 8, letterSpacing: 1 }}>{tx("STREFY (HRmax")} {hrMaxTanaka(age)})</div>
        {zones.map((z, i) => {
          const on = activeZone?.name === z.name;
          return (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 12px", borderRadius: 10, marginBottom: 6, background: on ? z.c + "22" : C.surface, border: `1px solid ${on ? z.c : C.line}` }}>
              <span style={{ fontSize: 13, fontWeight: on ? 800 : 600, color: on ? z.c : C.ink }}>{z.name}</span>
              <span style={{ fontSize: 13, color: C.sub, fontVariantNumeric: "tabular-nums" }}>{z.lo}–{z.hi}</span>
            </div>
          );
        })}
      </div>
      <p style={{ fontSize: 12, color: C.sub, lineHeight: 1.6, marginTop: 12 }}>
        {tx("W metodzie 80/20 spokojne biegi trzymaj w Z2, a sesje jakościowe wchodzą w Z4–Z5. Pas piersiowy daje dokładniejszy odczyt niż zegarek z nadgarstka.")}
      </p>
    </div>
  );

/* ── Mowa: synteza (TTS) i dyktowanie (STT) ─────────────────
   voiceReady: niektóre przeglądarki wymagają, żeby pierwszy dźwięk
   poszedł zaraz po kliknięciu użytkownika — inaczej blokują audio.
   primeVoice() wołamy przy starcie biegu (to jest klik), żeby odblokować.
─────────────────────────────────────────────────────────────*/
let voicePrimed = false;
function voiceAvailable() {
  return typeof window !== "undefined" && "speechSynthesis" in window;
}
// Znany błąd Chrome/Android: speechSynthesis sam się "usypia" po ~15 s bezczynności
// i kolejne speak() przepadają bez błędu. Trener mówi rzadko (throttling 15-45 s),
// więc bez tego "szturchania" większość komunikatów w środku treningu nigdy nie
// zabrzmi. Cyklicznie budzimy silnik pause()+resume() co kilka sekund.
let voiceKeepAliveStarted = false;
function startVoiceKeepAlive() {
  if (voiceKeepAliveStarted || !voiceAvailable()) return;
  voiceKeepAliveStarted = true;
  setInterval(() => {
    try {
      window.speechSynthesis.pause();
      window.speechSynthesis.resume();
    } catch { /* ignore */ }
  }, 8000);
}
function primeVoice() {
  // wywołaj w handlerze kliknięcia, żeby odblokować mowę na telefonie
  startVoiceKeepAlive();
  if (!voiceAvailable() || voicePrimed) return;
  try {
    const u = new SpeechSynthesisUtterance(" ");
    u.volume = 0; u.lang = "pl-PL";
    window.speechSynthesis.speak(u);
    voicePrimed = true;
  } catch { /* ignore */ }
}
let lastSpokenText = "", lastSpokenAt = 0;
function speak(text, force = false) {
  if (!voiceAvailable() || !text) return false;
  const now = Date.now();
  // pomiń ten sam komunikat powtórzony w krótkim odstępie — to eliminuje „zacinanie się” głosu
  if (!force && text === lastSpokenText && now - lastSpokenAt < 6000) return false;
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "pl-PL"; u.rate = 1.0; u.pitch = 1.0; u.volume = 1.0;
    // spróbuj wybrać polski głos jeśli jest
    const voices = window.speechSynthesis.getVoices();
    const pl = voices.find((v) => v.lang && v.lang.toLowerCase().startsWith("pl"));
    if (pl) u.voice = pl;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
    lastSpokenText = text; lastSpokenAt = now;
    return true;
  } catch { return false; }
}
function makeRecognizer(onResult) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang = "pl-PL"; r.interimResults = false; r.maxAlternatives = 1;
  r.onresult = (e) => onResult(e.results[0][0].transcript);
  return r;
}

/* ── USTAWIENIA ───────────────────────────────────────────── */
/* ── EKSPORT DANYCH: czytelny raport dla trenera + pełny backup JSON ── */
function pobierzPlik(nazwa, tresc, mime) {
  try {
    const blob = new Blob([tresc], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = nazwa;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);
    return true;
  } catch { return false; }
}

function planDoTekstu(plan) {
  if (!plan) return "  (brak planu)\n";
  let s = `  Tytuł: ${plan.tytul || "—"}\n`;
  if (plan.opis) s += `  Opis: ${plan.opis}\n`;
  const tygodnie = plan.cykl?.length ? plan.cykl : [{ treningi: plan.treningi || [] }];
  tygodnie.forEach((tw, wi) => {
    if (plan.cykl?.length) s += `\n  ── Tydzień ${tw.tydzien || wi + 1}${tw.fokus ? " — " + tw.fokus : ""} ──\n`;
    (tw.treningi || []).forEach((t, ti) => {
      s += `  ${ti + 1}. ${t.nazwa || "Trening"}${t.cel ? " (" + t.cel + ")" : ""}\n`;
      (t.kroki || []).forEach((k) => {
        const det = [k.minuty ? k.minuty + " min" : null, (k.hrLo && k.hrHi) ? `tętno ${k.hrLo}–${k.hrHi}` : null].filter(Boolean).join(", ");
        s += `       • [${k.typ || "?"}] ${k.opis || ""}${det ? " — " + det : ""}\n`;
      });
    });
  });
  return s;
}

ZWRÓĆ WYŁĄCZNIE jeden blok <PLAN> z poprawnym JSON i nic poza nim (żadnego tekstu przed ani po):

<PLAN>{"tytul":"krótka nazwa planu","opis":"1-3 zdania: jaki poziom widzisz, od czego zaczynamy, co najsłabsze, na co uważać; jeśli plan jest powtarzalnym tygodniem — napisz ile tygodni go powtarzać i kiedy zrobić korektę","treningi":[{"nazwa":"Trening 1 — ...","cel":"krótko","kroki":[{"typ":"rozgrzewka","opis":"konkretne ćwiczenia po przecinku, dobrane pod ten trening"},{"typ":"bieg","opis":"...","minuty":30,"hrLo":130,"hrHi":145},{"typ":"rozciaganie","opis":"konkretne ćwiczenia po przecinku"}]}]}</PLAN>

ZASADY FORMATU:
- "typ" kroku to dokładnie jedno z: "rozgrzewka", "bieg", "interwaly", "silowy", "rozciaganie".
- KAŻDY trening biegowy MUSI mieć krok "rozgrzewka" na początku i "rozciaganie" na końcu, z 3-5 konkretnymi ćwiczeniami wypisanymi po przecinku w polu "opis", dobranymi pod ten konkretny trening.
- Dla "bieg" podaj "minuty" oraz "hrLo"/"hrHi" (strefa tętna w bpm).
- Dla "interwaly" rozbij na "segmenty": [{"nazwa":"Mocno 1","sek":60,"hrLo":160,"hrHi":175,"mocno":true},{"nazwa":"Trucht","sek":120,"mocno":false}].
- Liczba treningów = liczba dni treningowych z raportu (pole "dni/tydzień").
- Jeśli plan ma być wielotygodniowy, zamiast "treningi" zwróć "cykl": [{"tydzien":1,"fokus":"...","uwaga":"...","treningi":[...]}].

═══════════════════════════════════════
${raport}
