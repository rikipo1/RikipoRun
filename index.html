/* ── TRENER AI (ocena → plan; check-in → korekty) ─────────── */
/* ── Odporne wyłuskanie planu z odpowiedzi AI ──────────────────
   Łapie plan niezależnie od formy: <PLAN>…</PLAN>, ```json …```,
   albo goły obiekt JSON zawierający "treningi"/"cykl" (gdy model
   zapomni tagów). Zwraca { plan, czysty } — plan lub null oraz
   tekst wiadomości z usuniętym blokiem planu. */
function wyodrebnijPlan(raw) {
  if (!raw || typeof raw !== "string") return { plan: null, czysty: raw };
  let text = raw, jsonStr = null;
  let m = text.match(/<PLAN>([\s\S]*?)<\/PLAN>/);
  if (m) { jsonStr = m[1]; text = text.replace(/<PLAN>[\s\S]*?<\/PLAN>/, "").trim(); }
  if (!jsonStr) {
    const f = text.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (f && /"(treningi|cykl)"\s*:/.test(f[1])) { jsonStr = f[1]; text = text.replace(/```(?:json)?\s*[\s\S]*?```/, "").trim(); }
  }
  if (!jsonStr) {
    const key = text.search(/"(treningi|cykl)"\s*:/);
    if (key >= 0) {
      const start = text.lastIndexOf("{", key);
      if (start >= 0) {
        let depth = 0, end = -1, inStr = false, esc = false;
        for (let i = start; i < text.length; i++) {
          const ch = text[i];
          if (esc) { esc = false; continue; }
          if (ch === "\\") { esc = true; continue; }
          if (ch === '"') { inStr = !inStr; continue; }
          if (inStr) continue;
          if (ch === "{") depth++;
          else if (ch === "}") { depth--; if (depth === 0) { end = i; break; } }
        }
        if (end > start) { jsonStr = text.slice(start, end + 1); text = (text.slice(0, start) + text.slice(end + 1)).trim(); }
      }
    }
  }
  if (!jsonStr) return { plan: null, czysty: raw };
  let plan = null;
  const sprobuj = (s) => { try { return JSON.parse(s); } catch { return null; } };
  plan = sprobuj(jsonStr.trim())
      || sprobuj(jsonStr.trim().replace(/,\s*([}\]])/g, "$1"));
  // ratunek: JSON ucięty przez limit tokenów — domknij otwarte nawiasy/cudzysłów
  if (!plan) {
    let s = jsonStr.trim().replace(/,\s*$/, "");
    const cudz = (s.match(/(?<!\\)"/g) || []).length;
    if (cudz % 2 === 1) s += '"';
    s = s.replace(/,\s*$/, "");
    let ob = 0, sq = 0, inStr = false, esc = false;
    for (let i = 0; i < s.length; i++) {
      const ch = s[i];
      if (esc) { esc = false; continue; }
      if (ch === "\\") { esc = true; continue; }
      if (ch === '"') { inStr = !inStr; continue; }
      if (inStr) continue;
      if (ch === "{") ob++; else if (ch === "}") ob--;
      else if (ch === "[") sq++; else if (ch === "]") sq--;
    }
    while (sq-- > 0) s += "]";
    while (ob-- > 0) s += "}";
    plan = sprobuj(s) || sprobuj(s.replace(/,\s*([}\]])/g, "$1"));
  }
  if (plan && (Array.isArray(plan.treningi) || Array.isArray(plan.cykl))) return { plan, czysty: text };
  return { plan: null, czysty: raw };
}

function Asystent({ profile, history, coachMsgs, saveCoachMsgs, saveProfile, onPlan, mode, go, useCredit, refundCredit, account, autoSend, clearAutoSend }) {
  // start rozmowy zależy od trybu i tego, czy mamy już ocenę/plan
  const firstSetup = !profile?.assessment
    ? tx("Cześć! Zanim ułożę plan, zrobię z Tobą krótką ocenę — chcę poznać Twój cel i stan, żeby trening był naprawdę pod Ciebie. Zacznijmy od najważniejszego: po co chcesz biegać i co chcesz osiągnąć?")
    : tx("Cześć ponownie! Mam Twoją ocenę i aktualny plan. O co chcesz zapytać albo co zmienić?");
  // czy plan/cykl jest ukończony (wszystkie treningi tygodnia zrobione i to ostatni tydzień)
  const planUkonczony = (() => {
    const tr = profile?.plan?.treningi; if (!tr?.length) return false;
    const done = new Set((profile?.progress || []).map((p) => p.i));
    const wszystkie = tr.every((_, i) => done.has(i));
    const cyklKoniec = !profile?.plan?.cykl || (profile.plan.tydzienIdx || 0) >= profile.plan.cykl.length - 1;
    return wszystkie && cyklKoniec;
  })();
  const firstCheckin = !profile?.plan
    ? tx("Najpierw ułóżmy plan w zakładce Trener AI, a potem będę mógł oceniać Twoje treningi i go dostrajać.")
    : planUkonczony
      ? tx("Gratulacje — ukończyłeś plan! Podsumujmy go: napisz krótko, jak Ci szło (samopoczucie 1–10, tętno jeśli mierzyłeś, co było łatwe, co trudne, czy coś bolało). Na tej podstawie ocenię cały blok i zaproponuję, czy zostać przy tym planie, czy go podkręcić/zmienić — decyzję zatwierdzasz Ty.")
      : tx("Jak poszedł ostatni trening? Opisz: co robiłeś, jak się czułeś (1–10), jakie tętno (jeśli mierzyłeś) i czy coś bolało. Na tej podstawie ocenię i — jeśli trzeba — zaproponuję korektę planu.");

  const seed = mode === "checkin" ? firstCheckin : firstSetup;

  // ANKIETA: pokazujemy w trybie setup, gdy nie ma jeszcze oceny LUB gdy wchodzimy z Diagnostyki wstępnej (dzień 1)
  const [pokazAnkiete, setPokazAnkiete] = useState((mode === "setup" && !profile?.assessment && !coachMsgs?.length) || !!profile?.diag?.wrocDoDiag);

  const [msgs, setMsgs] = useState(() => {
    // jedna ciągła pamięć rozmowy z trenerem — w obu trybach wczytujemy zapamiętane
    if (coachMsgs?.length) return coachMsgs;
    return [{ role: "assistant", text: seed }];
  });
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [proposal, setProposal] = useState(null); // {plan, kind:'plan'|'change'}
  const [pokazWlasny, setPokazWlasny] = useState(false); // panel wpisywania własnego planu
  const [wlasnyTekst, setWlasnyTekst] = useState("");
  const [pokazJSON, setPokazJSON] = useState(false); // panel wgrywania gotowego planu (JSON)
  const [jsonTekst, setJsonTekst] = useState("");
  const endRef = useRef(null);
  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs, busy, proposal]);

  // auto-wysłanie wiadomości startowej (np. raport z check-inu po treningu)
  useEffect(() => {
    if (autoSend && !busy) {
      send(autoSend);
      clearAutoSend?.();
    }
    // eslint-disable-next-line
  }, [autoSend]);

  // krótkie podsumowanie ostatnich treningów dla trenera
  const histSummary = history.slice(0, 6).map((h) => {
    const d = new Date(h.data).toLocaleDateString("pl-PL", { day: "numeric", month: "short" });
    let s = `${d}: ${h.typ}`;
    if (h.dystans) s += `, ${h.dystans} km`;
    if (h.czas) s += `, czas ${fmt(h.czas)}`;
    if (h.tempo) s += `, tempo ${fmt(h.tempo)}/km`;
    if (h.vo2max) s += `, VO2max ${h.vo2max}`;
    if (h.samopoczucie) s += `, samopoczucie ${h.samopoczucie}/10`;
    if (h.tetno) s += `, HR ${h.tetno}`;
    if (h.kcal) s += `, ${h.kcal} kcal`;
    // analiza próbek: śr/maks HR, % w strefie, profil HR w czasie (co kilka próbek)
    const sm = h.samples || h.wynik?.samples;
    if (Array.isArray(sm) && sm.length) {
      const hr = sm.filter((x) => x.bpm).map((x) => x.bpm);
      if (hr.length) {
        const avg = Math.round(hr.reduce((a, b) => a + b, 0) / hr.length);
        const max = Math.max(...hr);
        s += `; HR śr ${avg}/maks ${max}`;
        if (h.tgtLo && h.tgtHi) {
          const wzon = hr.filter((b) => b >= h.tgtLo && b <= h.tgtHi).length;
          s += `, w strefie ${Math.round((wzon / hr.length) * 100)}% (cel ${h.tgtLo}-${h.tgtHi})`;
        }
        // skrócony profil HR w czasie: ~8 punktów (start → koniec) dla trenera
        const krok = Math.max(1, Math.floor(sm.length / 8));
        const profil = sm.filter((_, i) => i % krok === 0).map((x) => `${fmt(x.t)}:${x.bpm || "?"}bpm/${x.kmh ?? "?"}kmh`).join(" → ");
        if (profil) s += `; przebieg [${profil}]`;
        if (hr.length >= 2) s += `; HR start ${hr[0]} → koniec ${hr[hr.length - 1]}`;
      }
    }
    // oznaczone słabe momenty + HR w tym momencie
    const mk = h.marks || h.wynik?.marks;
    if (Array.isArray(mk) && mk.length) {
      const det = mk.slice(0, 4).map((m) => {
        const near = (sm || []).reduce((best, x) => (Math.abs(x.t - m.t) < Math.abs((best?.t ?? 1e9) - m.t) ? x : best), null);
        return `${fmt(m.t)} (${m.reason}${near?.bpm ? `, HR ${near.bpm}` : ""})`;
      }).join("; ");
      s += `; słabsze momenty: ${det}`;
    }
    return s;
  }).join("\n") || tx("brak zapisanych treningów");

  // dziennik demo (symulacje) — też do wglądu trenera
  const demoSummary = (profile?.demoLog || []).slice(0, 4).map((d) => {
    let s = `${new Date(d.data).toLocaleDateString("pl-PL", { day: "numeric", month: "short" })} ${d.trening}: ${fmt(d.czas)}, ${d.dystans}km`;
    if (d.avgHR) s += `, HR śr ${d.avgHR}/maks ${d.maxHR || "?"}`;
    if (d.tgtLo) s += `, cel ${d.tgtLo}-${d.tgtHi}`;
    return s;
  }).join("\n");

  // ostatni test rozpoznawczy (Cooper) lub bateria testów
  const lastTest = history.find((h) => h.vo2max);
  const maTesty = !!profile?.testyWyniki || !!lastTest;
  const testInfo = lastTest
    ? `Ostatni test Coopera: ${lastTest.dystans} km w 12 min, VO2max ~${lastTest.vo2max}, tempo testu ${fmt(lastTest.tempo)}/km.`
    : "Test rozpoznawczy jeszcze nie wykonany.";

  const planJson = profile?.plan ? JSON.stringify(profile.plan) : "brak planu";
  const assess = profile?.assessment ? JSON.stringify(profile.assessment) : tx("brak oceny wstępnej");

  // pomiary ciała (waga itd.) z historii pomiarów profilu
  const pomiarySummary = (profile?.measurements || []).slice(-6).map((m) => {
    const d = new Date(m.date).toLocaleDateString("pl-PL", { day: "numeric", month: "short" });
    let s = `${d}:`;
    if (m.weight) s += ` ${m.weight}kg`;
    if (m.waist) s += ` talia ${m.waist}cm`;
    if (m.bodyFat) s += ` BF ${m.bodyFat}%`;
    return s;
  }).join("; ") || tx("brak zapisanych pomiarów");

  const sylwetka = `waga ${profile?.weight || "?"}kg, wzrost ${profile?.height || "?"}cm, wiek ${profile?.age || "?"}, HR spocz. ${profile?.restHR || "?"}`;

  const bateria = profile?.testyWyniki;
  const bateriaInfo = bateria
    ? tx("Bateria testów sprawnościowych: ") + TESTY.filter((t) => bateria[t.key]).map((t) => `${t.nazwa} = ${bateria[t.key].wartosc}${t.unit}${bateria[t.key].puls ? ` (puls ${bateria[t.key].puls})` : ""}`).join("; ")
    : tx("Bateria testów sprawnościowych: nie wykonana");

  // Profil żywieniowy z ankiety dietetycznej (trwale w profilu) — trener zna alergie/preferencje i okno dnia

      const dni = Math.ceil((new Date(assessment.termin) - new Date()) / 86400000);
      const tyg = Math.max(1, Math.round(dni / 7));
      terminInfo = `CEL MA TERMIN: ${assessment.termin} (za ~${dni} dni, czyli ~${tyg} tygodni). Ułóż PEŁNY CYKL na wszystkie ${tyg} tygodni w polu "cykl": tablica obiektów {"tydzien":N,"fokus":"nazwa fazy","uwaga":"na co zwracać uwagę w tym tygodniu i co sprawdzić","treningi":[...]}. Zachowaj progresję faz: budowanie bazy → rozwój → szczyt → tapering przed celem. Każdy tydzień ma ${assessment.dniWTyg} treningów. Nie powtarzaj identycznych tygodni — obciążenie ma rosnąć, a ostatnie 1-2 tygodnie to tapering.`;
    }
    const usr = `Oto ocena z ankiety: ${JSON.stringify(assessment)}. ${testInfo} ${terminInfo} Ułóż plan z dokładnie ${assessment.dniWTyg} treningami w tygodniu (tyle, ile zadeklarowanych dni), każdy inny i konkretny. Zwróć blok <PLAN>.`;
    try {
      // 2 próby: jeśli plan wróci ucięty/nieparsowalny albo trafimy w chwilowy limit, próbujemy jeszcze raz
      let parsed = null, czysty = null, ostatniBlad = null;
      for (let proba = 0; proba < 2; proba++) {
        try {
          const text = await callClaude({ model: "claude-sonnet-4-6", max_tokens: 16000, system: sysSetup + langDirective(langOf(profile)), messages: [{ role: "user", content: usr }] });
          const wynik = wyodrebnijPlan(text);
          if (wynik.plan) { parsed = wynik.plan; czysty = wynik.czysty; break; }
          ostatniBlad = new Error("parse");
        } catch (e) {
          ostatniBlad = e;
        }
        if (proba === 0) await new Promise((r) => setTimeout(r, getProvider() === "gemini" ? 6000 : 1500));
      }
      if (parsed) {
        setProposal({ plan: parsed, kind: "plan" });
        const text = czysty || tx("Przygotowałem plan — sprawdź go niżej i dotknij „Zapisz plan”.");
        setMsgs([{ role: "assistant", text }]); saveCoachMsgs([{ role: "assistant", text }]);
      } else if (ostatniBlad && ostatniBlad.message !== "parse") {
        throw ostatniBlad;
      } else {
        refundCredit && refundCredit("rozmowa");
        const text = tx("Plan się wygenerował, ale nie udało się go poprawnie odczytać (mógł być za długi). Dotknij „Ułóż mój plan” jeszcze raz — zwykle za drugim razem wychodzi.");
        setMsgs([{ role: "assistant", text }]); saveCoachMsgs([{ role: "assistant", text }]);
      }
    } catch (e) {
      refundCredit && refundCredit("rozmowa");
      setMsgs([{ role: "assistant", text: `${aiErr(e)} Dotknij „Ułóż mój plan” ponownie.` }]);
    } finally { setBusy(false); }
  };

  // WGRANIE WŁASNEGO PLANU: użytkownik wkleja swój plan tekstem,
  // AI przepisuje go do struktury aplikacji (do zatwierdzenia jak każda propozycja).
  const parsujWlasnyPlan = async () => {
    const tekst = wlasnyTekst.trim();
    if (!tekst || busy) return;
    if (useCredit && !useCredit("rozmowa")) {
      setMsgs((c) => [...c, { role: "assistant", text: tx("Skończyły się kredyty AI na ten miesiąc. Wykup wyższy plan, żeby wczytać własny plan.") }]);
      return;
    }
    setBusy(true);
    setPokazWlasny(false);
    const sysWlasny = `Jesteś asystentem, który przepisuje GOTOWY plan treningowy użytkownika do ścisłego formatu JSON aplikacji. Mówisz po polsku.
NIE wymyślaj nowego planu i NIE zmieniaj zamysłu autora — tylko uporządkuj i ustrukturyzuj to, co podał. Zachowaj wszystkie treningi, dni, dystanse, czasy, tempa i tętna, jakie wpisał. Jeśli czegoś brak (np. typ kroku), wywnioskuj sensownie z opisu.
Zwróć WYŁĄCZNIE jeden blok <PLAN> z poprawnym JSON, bez nic poza nim:
<PLAN>{"tytul":"krótki tytuł","opis":"1-2 zdania streszczenia planu autora","treningi":[{"nazwa":"...","cel":"krótko","kroki":[{"typ":"rozgrzewka","opis":"..."},{"typ":"bieg","opis":"...","minuty":N,"hrLo":N,"hrHi":N},{"typ":"rozciaganie","opis":"..."}]}]}</PLAN>
Zasady: "typ" to dokładnie jedno z: "rozgrzewka","bieg","interwaly","silowy","rozciaganie". Dla "bieg" dodaj "minuty" oraz (jeśli autor podał lub wynika z intensywności) "hrLo"/"hrHi" w bpm. Dla "interwaly" rozbij na "segmenty": [{"nazwa":"Mocno 1","sek":N,"hrLo":N,"hrHi":N,"mocno":true},{"nazwa":"Trucht","sek":N,"mocno":false}].
Jeśli plan jest wielotygodniowy, zamiast "treningi" zwróć "cykl": [{"tydzien":N,"fokus":"...","uwaga":"...","treningi":[...]}].`;
    try {
      let text = await callClaude({ model: "claude-sonnet-4-6", max_tokens: 8000, system: sysWlasny + langDirective(langOf(profile)), messages: [{ role: "user", content: `Oto mój plan treningowy — przepisz go do formatu aplikacji:\n\n${tekst}` }] });
      const { plan: parsed } = wyodrebnijPlan(text);
      let ok = false;
      if (parsed) { setProposal({ plan: parsed, kind: "plan" }); ok = true; }
      const info = ok
        ? tx("Przepisałem Twój plan do formatu aplikacji — sprawdź go niżej i zapisz. Każdy trening poprowadzę krok po kroku.")
        : tx("Nie udało mi się rozczytać tego planu. Spróbuj wypisać go jaśniej — np. każdy trening w osobnej linii, z dniem, typem (spokojny bieg / interwały / siła) oraz czasem lub dystansem.");
      setMsgs((c) => [...c, { role: "assistant", text: info }]);
      if (!ok) { refundCredit && refundCredit("rozmowa"); }
      else { setWlasnyTekst(""); }
    } catch (e) {
      refundCredit && refundCredit("rozmowa");
      setMsgs((c) => [...c, { role: "assistant", text: aiErr(e) }]);
    } finally { setBusy(false); }
  };

  // Wgranie GOTOWEGO planu (JSON / blok <PLAN>) bez AI — od razu na urządzenie.
  const wgrajGotowyPlan = () => {
    const tekst = (jsonTekst || "").trim();
    if (!tekst) return;
    const { plan: parsed } = wyodrebnijPlan(tekst);
    if (parsed && (Array.isArray(parsed.treningi) || Array.isArray(parsed.cykl))) {
      setProposal({ plan: parsed, kind: "plan" });
      setPokazJSON(false); setJsonTekst("");
      const info = tx("Wczytałem gotowy plan — sprawdź go niżej i dotknij „✓ Wybierz ten plan”, żeby zapisać na urządzeniu.");
      setMsgs((c) => [...c, { role: "assistant", text: info }]); saveCoachMsgs([...(coachMsgs || []), { role: "assistant", text: info }]);
    } else {
      setMsgs((c) => [...c, { role: "assistant", text: tx("To nie wygląda na poprawny plan w formacie aplikacji. Wklej cały blok <PLAN>{…}</PLAN> albo sam JSON z polami \"tytul\", \"opis\" i \"treningi\" (lub \"cykl\").") }]);
    }
  };

  const send = async (forced) => {
    const txt = (typeof forced === "string" ? forced : input).trim();
    if (!txt || busy) return;
    if (useCredit && !useCredit("rozmowa")) {
      setMsgs((cur) => [...cur, { role: "assistant", text: tx("Skończyły się kredyty AI na ten miesiąc 💬 Wykup wyższy plan w zakładce kredytów, żeby dalej rozmawiać z trenerem.") }]);
      return;
    }
    const userMsg = { role: "user", text: txt };
    const conv = [...msgs, userMsg];
    setMsgs(conv); setInput(""); setBusy(true);

    const sys = profile?.plan ? `${sysSetup}\n\n${sysCheckin}` : sysSetup;
    try {
      const apiMsgs = conv.map((m) => ({ role: m.role === "assistant" ? "assistant" : "user", content: m.text }));
      let text = await callClaude({ model: "claude-sonnet-4-6", max_tokens: 2500, system: sys + langDirective(langOf(profile)), messages: apiMsgs });

      // OCENA — zapisz do profilu
      const oc = text.match(/<OCENA>([\s\S]*?)<\/OCENA>/);
      if (oc) {
        try {
          const a = JSON.parse(oc[1].trim());
          saveProfile({ ...(profile || {}), assessment: a, restHR: a.restHR ?? profile?.restHR });
        } catch { /* ignore */ }
        text = text.replace(/<OCENA>[\s\S]*?<\/OCENA>/, "").trim();
      }
      // PLAN lub ZMIANA — pokaż jako propozycję do zatwierdzenia
      const ch = text.match(/<ZMIANA>([\s\S]*?)<\/ZMIANA>/);
      if (ch) {
        try { setProposal({ plan: JSON.parse(ch[1].trim()), kind: "change" }); } catch { /* ignore */ }
        text = text.replace(/<ZMIANA>[\s\S]*?<\/ZMIANA>/, "").trim() || tx("Proponuję korektę planu — zobacz niżej i zdecyduj.");
      } else {
        const { plan: parsed, czysty } = wyodrebnijPlan(text);
        if (parsed) { setProposal({ plan: parsed, kind: "plan" }); text = czysty || tx("Przygotowałem plan — sprawdź go niżej."); }
      }

      const next = [...conv, { role: "assistant", text }];
      setMsgs(next);
      saveCoachMsgs(next); // pamięć rozmowy — zawsze zapamiętujemy
    } catch (e) {
      refundCredit && refundCredit("rozmowa");
      setMsgs((cur) => [...cur, { role: "assistant", text: aiErr(e) }]);
    } finally {
      setBusy(false);
    }
  };

  const acceptProposal = () => {
    // dołącz termin celu z oceny do planu (do kalendarza i licznika)
    const plan = { ...proposal.plan, termin: profile?.assessment?.termin || proposal.plan.termin || null };
    const keepProgress = proposal.kind === "change"; // korekta nie zeruje ukończonych treningów
    onPlan({ ...(profile || {}), plan }, keepProgress);
    setProposal(null);
  };

  // ANKIETA zamiast czatu (oszczędza wywołania AI na etapie oceny)
  if (pokazAnkiete) {
    return <AnkietaWstepna profile={profile} onGotowe={ankietaGotowa} hasTest={!!lastTest} />;
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", minHeight: 420, height: "72vh" }}>
      {mode === "checkin" && !profile?.plan && (
        <div style={{ background: C.surface, border: `1px solid ${C.purple}`, borderRadius: 14, padding: 16, marginBottom: 10 }}>
          <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>{tx("Nie masz jeszcze planu")}</div>
          <p style={{ fontSize: 13, color: C.sub, margin: "0 0 12px", lineHeight: 1.5 }}>{tx("Żeby trener mógł oceniać treningi, najpierw wygeneruj plan w zakładce Trener AI.")}</p>
          <button onClick={() => go("asystent")} style={{ width: "100%", padding: 12, background: C.purple, color: C.bg, border: "none", borderRadius: 12, fontWeight: 800, fontSize: 14, cursor: "pointer" }}>
            {tx("Przejdź do Trenera AI →")}
          </button>
        </div>
      )}
      <div style={{ flex: 1, overflowY: "auto", paddingBottom: 8 }}>
        {msgs.map((m, i) => (
          <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start", marginBottom: 10 }}>
            <div style={{ maxWidth: "82%", padding: "11px 14px", borderRadius: 16,
              background: m.role === "user" ? C.accent : C.surface,
              color: m.role === "user" ? C.bg : C.ink,
              fontSize: 14, lineHeight: 1.5, whiteSpace: "pre-wrap",
              borderBottomRightRadius: m.role === "user" ? 4 : 16,
              borderBottomLeftRadius: m.role === "user" ? 16 : 4 }}>
              {m.text}
            </div>
          </div>
        ))}
        {busy && <div style={{ color: C.sub, fontSize: 13, animation: "pulse 1.2s infinite", padding: "4px 6px" }}>{tx("Trener analizuje…")}</div>}

        {/* WYRAŹNY PRZYCISK: Ułóż plan — gdy jest ocena, jest test, brak planu i brak propozycji */}
        {mode === "setup" && !busy && !proposal && profile?.assessment && maTesty && !profile?.plan && (
          <div style={{ marginTop: 8 }}>
            <button onClick={() => generujPlan()} disabled={busy} style={{ width: "100%", padding: 15, background: C.accent, color: C.bg, border: "none", borderRadius: 14, fontWeight: 800, fontSize: 16, cursor: busy ? "default" : "pointer", opacity: busy ? 0.6 : 1 }}>
              {busy ? tx("Układam plan pod Ciebie…") : tx("⚡ Ułóż mój plan treningowy")}
            </button>
            <p style={{ fontSize: 12, color: C.sub, textAlign: "center", marginTop: 8, lineHeight: 1.5 }}>{tx("Mam ocenę i wyniki testów — gotowe do ułożenia planu.")}</p>
          </div>
        )}
        {/* gdy jest ocena, ale brak jakiegokolwiek testu i brak planu — kieruj na testy */}
        {mode === "setup" && !busy && !proposal && profile?.assessment && !maTesty && !profile?.plan && (
          <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 8 }}>
            <button onClick={() => go("testy")} style={{ width: "100%", padding: 14, background: "#F2B457", color: C.bg, border: "none", borderRadius: 14, fontWeight: 800, fontSize: 15, cursor: "pointer" }}>
              {tx("Zrób testy sprawności (zalecane) →")}
            </button>
            <button onClick={() => go("test")} style={{ width: "100%", padding: 12, background: "transparent", color: C.sub, border: `1px solid ${C.line}`, borderRadius: 14, fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
              {tx("albo sam test Coopera (12 min)")}
            </button>
          </div>
        )}

        {/* WGRANIE WŁASNEGO PLANU — dostępne w trybie setup, gdy nic się nie liczy ani nie ma propozycji */}
        {mode === "setup" && !busy && !proposal && !pokazWlasny && (
          <button onClick={() => setPokazWlasny(true)} style={{ width: "100%", marginTop: 10, padding: 13, background: "transparent", color: C.purple, border: `1px solid ${C.purple}`, borderRadius: 14, fontWeight: 800, fontSize: 14, cursor: "pointer" }}>
            {tx("✍ Mam już swój plan — wpisz go ręcznie")}
          </button>
        )}
        {mode === "setup" && !busy && !proposal && pokazWlasny && (
          <div style={{ background: C.surface2, border: `1px solid ${C.purple}`, borderRadius: 16, padding: 16, marginTop: 10 }}>
            <div style={{ fontSize: 11, color: C.purple, fontWeight: 800, letterSpacing: 1, marginBottom: 6 }}>{tx("WŁASNY PLAN TRENINGOWY")}</div>
            <p style={{ fontSize: 12, color: C.sub, margin: "0 0 10px", lineHeight: 1.5 }}>
              {tx("Wklej swój plan tak, jak go masz wypisany — każdy trening w osobnej linii, z dniem, typem (spokojny bieg / interwały / siła) oraz czasem lub dystansem. Przepiszę go do aplikacji i poprowadzę krok po kroku. Potwierdzasz przed zapisem.")}
            </p>
            <textarea value={wlasnyTekst} onChange={(e) => setWlasnyTekst(e.target.value)} rows={7}
              placeholder={"Np.\nPon — spokojny bieg 30 min, tętno 130–145\nŚr — interwały 6× (1 min mocno / 2 min trucht) + rozgrzewka i wybieg\nPt — siła: przysiady, mostki, plank 20 min\nNd — długie wybieganie 10 km luźno"}
              style={{ width: "100%", padding: "11px 13px", borderRadius: 10, border: `1px solid ${C.line}`, background: C.surface, color: C.ink, fontSize: 13, outline: "none", resize: "vertical", lineHeight: 1.5, fontFamily: "inherit" }} />
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <button onClick={parsujWlasnyPlan} disabled={!wlasnyTekst.trim()}
                style={{ flex: 1, padding: 13, background: wlasnyTekst.trim() ? C.purple : C.line, color: C.bg, border: "none", borderRadius: 12, fontWeight: 800, fontSize: 14, cursor: wlasnyTekst.trim() ? "pointer" : "default" }}>
                {tx("Wczytaj mój plan")}
              </button>
              <button onClick={() => { setPokazWlasny(false); }}
                style={{ padding: "0 18px", background: "transparent", color: C.sub, border: `1px solid ${C.line}`, borderRadius: 12, fontWeight: 700, cursor: "pointer" }}>
                {tx("Anuluj")}
              </button>
            </div>
          </div>
        )}

        {/* WGRANIE GOTOWEGO PLANU (JSON z zewnętrznego AI) — bez kosztu AI */}
        {mode === "setup" && !busy && !proposal && !pokazJSON && !pokazWlasny && (
          <button onClick={() => setPokazJSON(true)} style={{ width: "100%", marginTop: 10, padding: 13, background: "transparent", color: C.cool, border: `1px solid ${C.cool}`, borderRadius: 14, fontWeight: 800, fontSize: 14, cursor: "pointer" }}>
            {tx("📥 Wgraj gotowy plan (JSON)")}
          </button>
        )}
        {mode === "setup" && !busy && !proposal && pokazJSON && (
          <div style={{ background: C.surface2, border: `1px solid ${C.cool}`, borderRadius: 16, padding: 16, marginTop: 10 }}>
            <div style={{ fontSize: 11, color: C.cool, fontWeight: 800, letterSpacing: 1, marginBottom: 6 }}>{tx("WGRAJ GOTOWY PLAN")}</div>
            <p style={{ fontSize: 12, color: C.sub, margin: "0 0 10px", lineHeight: 1.5 }}>
              {tx("Wklej plan w formacie aplikacji (blok <PLAN>{…}</PLAN> lub sam JSON) — np. wygenerowany przez zewnętrzne AI z pliku „Analiza z promptem”. Wgra się od razu na urządzenie, bez łączenia z AI.")}
            </p>
            <textarea value={jsonTekst} onChange={(e) => setJsonTekst(e.target.value)} rows={7}
              placeholder={'<PLAN>{"tytul":"...","opis":"...","treningi":[...]}</PLAN>'}
              style={{ width: "100%", padding: "11px 13px", borderRadius: 10, border: `1px solid ${C.line}`, background: C.surface, color: C.ink, fontSize: 12, outline: "none", resize: "vertical", lineHeight: 1.5, fontFamily: "monospace" }} />
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <button onClick={wgrajGotowyPlan} disabled={!jsonTekst.trim()}
                style={{ flex: 1, padding: 13, background: jsonTekst.trim() ? C.cool : C.line, color: C.bg, border: "none", borderRadius: 12, fontWeight: 800, fontSize: 14, cursor: jsonTekst.trim() ? "pointer" : "default" }}>
                {tx("Wgraj plan")}
              </button>
              <button onClick={() => { setPokazJSON(false); }}
                style={{ padding: "0 18px", background: "transparent", color: C.sub, border: `1px solid ${C.line}`, borderRadius: 12, fontWeight: 700, cursor: "pointer" }}>
                {tx("Anuluj")}
              </button>
            </div>
          </div>
        )}

        {proposal && (
          <div style={{ background: C.surface2, border: `1px solid ${proposal.kind === "change" ? "#F2B457" : C.accent}`, borderRadius: 16, padding: 16, marginTop: 8 }}>
            <div style={{ fontSize: 11, color: proposal.kind === "change" ? "#F2B457" : C.accent, fontWeight: 700, letterSpacing: 1 }}>
              {proposal.kind === "change" ? "PROPOZYCJA KOREKTY PLANU" : "PROPOZYCJA PLANU"}
            </div>
            <div style={{ fontSize: 17, fontWeight: 800, margin: "4px 0 6px" }}>{proposal.plan.tytul}</div>
            <p style={{ fontSize: 13, color: C.sub, margin: "0 0 10px", lineHeight: 1.5 }}>{proposal.plan.opis}</p>
            {proposal.plan.cykl?.length ? (
              <>
                <div style={{ fontSize: 11, color: C.purple, fontWeight: 800, letterSpacing: 1, margin: "2px 0 6px" }}>{tx("CYKL")} {proposal.plan.cykl.length} {tx("TYGODNI")}</div>
                {proposal.plan.cykl.map((tw, i) => (
                  <div key={i} style={{ fontSize: 12, marginBottom: 7, paddingBottom: 7, borderBottom: i < proposal.plan.cykl.length - 1 ? `1px solid ${C.line}` : "none" }}>
                    <b style={{ color: C.accent }}>{tx("Tydz.")} {tw.tydzien || i + 1}: {tw.fokus || ""}</b>
                    <span style={{ color: C.sub }}> · {tw.treningi?.length || 0} {tx("treningów")}</span>
                    {tw.uwaga ? <div style={{ color: C.sub, marginTop: 2, fontSize: 11, lineHeight: 1.4 }}>{tw.uwaga}</div> : null}
                  </div>
                ))}
              </>
            ) : (
              <>
                {proposal.plan.treningi?.map((w, i) => (
                  <div key={i} style={{ fontSize: 12, marginBottom: 6 }}>
                    <b style={{ color: C.accent }}>{w.nazwa}</b>
                    {w.cel ? <span style={{ color: C.sub }}> — {w.cel}</span> : null}
                  </div>
                ))}
                {!proposal.plan.treningi && proposal.plan.tygodnie?.map((w, i) => (
                  <div key={i} style={{ fontSize: 12, marginBottom: 5 }}><b style={{ color: C.accent }}>{tx("Tydz.")} {i + 1}:</b> {w}</div>
                ))}
              </>
            )}
            <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
              <button onClick={acceptProposal}
                style={{ flex: 1, padding: 14, background: C.accent, color: C.bg, border: "none", borderRadius: 12, fontWeight: 800, fontSize: 15, cursor: "pointer", boxShadow: `0 4px 14px ${C.accent}44` }}>
                {proposal.kind === "change" ? tx("Zatwierdź zmianę") : tx("✓ Wybierz ten plan")}
              </button>
              <button onClick={() => setProposal(null)}
                style={{ padding: "0 18px", background: "transparent", color: C.sub, border: `1px solid ${C.line}`, borderRadius: 12, fontWeight: 700, cursor: "pointer" }}>
                {tx("Odrzuć")}
              </button>
            </div>
          </div>
        )}
        <div ref={endRef} />
      </div>

      <div style={{ display: "flex", gap: 8, paddingTop: 10, borderTop: `1px solid ${C.line}` }}>
        <input value={input} onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && send()}
          placeholder={mode === "checkin" ? tx("Opisz, jak poszło…") : "Napisz do trenera…"}
          style={{ flex: 1, padding: "12px 14px", borderRadius: 12, border: `1px solid ${C.line}`, background: C.surface, color: C.ink, fontSize: 14, outline: "none" }} />
        <button onClick={send} disabled={busy}
          style={{ padding: "0 18px", borderRadius: 12, border: "none", background: C.accent, color: C.bg, fontWeight: 800, cursor: "pointer" }}>↑</button>
      </div>
    </div>
  );
}

/* ── SEKWENCJA (rozgrzewka / rozciąganie) z odliczaniem ───── */
function Sekwencja({ list, mode, onDone, go, profile, hr }) {
  const [place, setPlace] = useState(null); // dom | dwor | bieg (tylko warmup)
  const [len, setLen] = useState(mode === "warmup" ? null : "fixed");
  const seq = mode === "warmup"
    ? (place && len ? WARMUP[place][len] : null)
    : list;
  const color = mode === "warmup" ? C.accent : C.cool;

  const [idx, setIdx] = useState(0);
  const [left, setLeft] = useState(0);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const poczatkujacy = /początk|zaczyn/i.test(profile?.assessment?.poziom || "");
  const [opisOtwarty, setOpisOtwarty] = useState(poczatkujacy);
  const ref = useRef(null);
  // próbki tętna z opaski — zbieramy podczas ćwiczenia, dokładamy do wpisu w historii
  const hrSamples = useRef([]);
  // zwraca {avgHr, maxHr} albo {} jeśli brak danych z opaski
  const hrPodsumowanie = () => {
    const s = hrSamples.current;
    if (!s.length) return {};
    return { avgHr: Math.round(s.reduce((a, b) => a + b, 0) / s.length), maxHr: Math.max(...s) };
  };

  useEffect(() => {
    if (seq && left === 0 && !running && !done && idx === 0) setLeft(seq[0].sec);
  }, [seq]);

  useEffect(() => {
    if (running) {
      ref.current = setInterval(() => {
        if (hr?.bpm) hrSamples.current.push(hr.bpm); // zbieramy tętno co sekundę
        setLeft((x) => {
          if (x <= 1) {
            if (idx + 1 < seq.length) { setIdx(idx + 1); setRunning(false); return seq[idx + 1].sec; }
            setRunning(false); setDone(true);
            onDone({ typ: mode === "warmup" ? `Rozgrzewka — ${WARMUP[place].label} (${len})` : tx("Rozciąganie"), czas: seq.reduce((s, e) => s + e.sec, 0), ...hrPodsumowanie() });
            return 0;
          }
          return x - 1;
        });
      }, 1000);
    }
    return () => clearInterval(ref.current);
  }, [running, idx, seq]);

  // KROK 1: gdzie robisz rozgrzewkę?
  if (mode === "warmup" && !place) {
    return (
      <div>
        <h2 style={{ fontSize: 20, fontWeight: 800 }}>{tx("Gdzie się rozgrzewasz?")}</h2>
        <p style={{ color: C.sub, fontSize: 13, lineHeight: 1.5 }}>{tx("Dobiorę ćwiczenia pod miejsce — inne w domu, inne na dworze.")}</p>
        {["dom", "dwor", "bieg"].map((k) => (
          <button key={k} onClick={() => setPlace(k)}
            style={{ width: "100%", textAlign: "left", background: C.surface, border: `1px solid ${C.line}`, borderRadius: 14, padding: 16, marginBottom: 10, cursor: "pointer", color: C.ink }}>
            <div style={{ fontSize: 16, fontWeight: 800 }}>{WARMUP[k].label}</div>
            <div style={{ fontSize: 12, color: C.sub, marginTop: 3, lineHeight: 1.4 }}>{WARMUP[k].desc}</div>
          </button>
        ))}
      </div>
    );
  }

  // KROK 2: jak długa?
  if (mode === "warmup" && !len) {
    const sets = WARMUP[place];
    const opts = [
      ["short", tx("Krótka"), sets.short],
      ["medium", tx("Średnia"), sets.medium],
      ["long", tx("Pełna"), sets.long],
    ];
    return (
      <div>
        <button onClick={() => setPlace(null)} style={{ background: "none", border: "none", color: C.accent, fontSize: 13, cursor: "pointer", padding: 0, marginBottom: 8 }}>‹ {WARMUP[place].label}</button>
        <h2 style={{ fontSize: 20, fontWeight: 800 }}>{tx("Jak długa rozgrzewka?")}</h2>
        <p style={{ color: C.sub, fontSize: 13, lineHeight: 1.5 }}>{tx("Wybierz, ile masz czasu.")}</p>
        {opts.map(([k, t, arr]) => {
          const total = arr.reduce((s, e) => s + e.sec, 0);
          return (
            <button key={k} onClick={() => { setLen(k); setIdx(0); setLeft(arr[0].sec); }}
              style={{ width: "100%", textAlign: "left", background: C.surface, border: `1px solid ${C.line}`, borderRadius: 14, padding: 16, marginBottom: 10, cursor: "pointer", color: C.ink }}>
              <div style={{ fontSize: 16, fontWeight: 800 }}>{t}</div>
              <div style={{ fontSize: 12, color: C.sub, marginTop: 2 }}>~{Math.round(total / 60)} {tx("min ·")} {arr.length} {arr.length < 5 ? tx("ćwiczenia") : tx("ćwiczeń")}</div>
            </button>
          );
        })}
      </div>
    );
  }

  if (done) {
    return (
      <div style={{ textAlign: "center", padding: "40px 16px" }}>
        <div style={{ fontSize: 48 }}>✓</div>
        <h2 style={{ fontSize: 22, fontWeight: 800 }}>{mode === "warmup" ? "Rozgrzane!" : tx("Rozciągnięte!")}</h2>
        <p style={{ color: C.sub, fontSize: 14 }}>{tx("Zapisane w historii.")}</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 10, maxWidth: 280, margin: "16px auto 0" }}>
          <button onClick={() => go("checkin")} style={{ padding: "14px 28px", background: "#4FD6A6", color: C.bg, border: "none", borderRadius: 12, fontWeight: 800, cursor: "pointer" }}>{tx("Check-in u trenera")}</button>
          <button onClick={() => go("home")} style={{ padding: "12px 28px", background: "transparent", color: C.sub, border: `1px solid ${C.line}`, borderRadius: 12, fontWeight: 700, cursor: "pointer" }}>{tx("Wróć")}</button>
        </div>
      </div>
    );
  }

  const ex = seq[idx];
  const pct = ((ex.sec - left) / ex.sec) * 100;

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", color: C.sub, fontSize: 13, marginBottom: 4 }}>
        <span>{tx("Ćwiczenie")} {idx + 1} / {seq.length}</span>
        <span>{mode === "warmup" ? tx("Rozgrzewka") : tx("Rozciąganie")}</span>
      </div>
      <div style={{ height: 4, background: C.line, borderRadius: 2, marginBottom: 18 }}>
        <div style={{ height: "100%", width: `${((idx) / seq.length) * 100}%`, background: color, borderRadius: 2, transition: "width .3s" }} />
      </div>

      <div style={{ background: C.surface, borderRadius: 20, padding: "10px 10px 0", aspectRatio: "1.3", marginBottom: 16, position: "relative" }}>
        <div style={{ width: "100%", height: "100%", transformOrigin: "center bottom", animation: running ? `${ANIM_EX[ex.kind] || "breathe"} ${(["jumpingjacks", "highknees"].includes(ex.kind)) ? "0.7s" : ["march", "step", "stride"].includes(ex.kind) ? "1s" : ["legswing", "swing", "shoulder"].includes(ex.kind) ? "1.4s" : "2.4s"} ease-in-out infinite` : "none" }}>
          <Figure kind={ex.kind} color={color} />
        </div>
        {running && <div style={{ position: "absolute", top: 10, right: 12, fontSize: 10, color: C.sub, fontWeight: 700, letterSpacing: 1, opacity: .7 }}>{tx("● RUCH")}</div>}
      </div>

      <div style={{ margin: "0 0 4px" }}>
        <h2 style={{ fontSize: 22, fontWeight: 800, textAlign: "center", margin: 0 }}>{ex.name}</h2>
      </div>
      <p style={{ color: C.sub, fontSize: 13, textAlign: "center", margin: "0 0 10px" }}>{ex.hint}</p>

      {/* OPIS KROK-PO-KROKU (rozwijany, jak w treningu siłowym) */}
      {INSTRUKCJE[ex.kind] && (
        <div style={{ background: C.surface, border: `1px solid ${C.line}`, borderRadius: 14, marginBottom: 16, overflow: "hidden" }}>
          <button onClick={() => setOpisOtwarty((o) => !o)}
            style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", background: "transparent", border: "none", color: color, padding: "12px 14px", fontWeight: 800, fontSize: 13, cursor: "pointer", letterSpacing: 1 }}>
            <span>{tx("JAK WYKONAĆ POPRAWNIE")}</span>
            <span style={{ fontSize: 16 }}>{opisOtwarty ? "▾" : "▸"}</span>
          </button>
          {opisOtwarty && (
            <div style={{ padding: "0 14px 14px" }}>
              <ol style={{ margin: 0, paddingLeft: 18, display: "flex", flexDirection: "column", gap: 6 }}>
                {INSTRUKCJE[ex.kind].kroki.map((k, i) => <li key={i} style={{ fontSize: 13, lineHeight: 1.5, color: C.ink }}>{k}</li>)}
              </ol>
              {INSTRUKCJE[ex.kind].bled && (
                <div style={{ marginTop: 12, padding: 10, background: C.warn + "18", border: `1px solid ${C.warn}55`, borderRadius: 10 }}>
                  <div style={{ fontSize: 10, color: C.warn, fontWeight: 800, marginBottom: 2 }}>{tx("⚠ UWAGA")}</div>
                  <div style={{ fontSize: 12, color: C.ink, lineHeight: 1.5 }}>{INSTRUKCJE[ex.kind].bled}</div>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {hr?.bpm ? (
        <PulsBadge bpm={hr.bpm} profile={profile} style={{ marginBottom: 2 }} />
      ) : hr?.connect ? (
        <div style={{ textAlign: "center", marginBottom: 6 }}>
          <button onClick={() => hr.connect()} style={{ padding: "6px 14px", borderRadius: 999, border: `1px solid ${C.line}`, background: "transparent", color: C.sub, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>❤ {tx("Podłącz pas tętna (Bluetooth)")}</button>
        </div>
      ) : null}
      <div style={{ textAlign: "center", fontSize: 56, fontWeight: 800, color, fontVariantNumeric: "tabular-nums" }}>{fmt(left)}</div>
      <div style={{ height: 6, background: C.line, borderRadius: 3, margin: "12px 0 20px" }}>
        <div style={{ height: "100%", width: `${pct}%`, background: color, borderRadius: 3, transition: "width 1s linear" }} />
      </div>

      <div style={{ display: "flex", gap: 10 }}>
        <button onClick={() => setRunning(!running)} style={{ flex: 1, padding: 16, background: running ? C.warn : color, color: C.bg, border: "none", borderRadius: 12, fontWeight: 800, fontSize: 16, cursor: "pointer" }}>
          {running ? "Pauza" : (left === ex.sec ? "Start" : tx("Wznów"))}
        </button>
        <button onClick={() => {
          if (idx + 1 < seq.length) { setIdx(idx + 1); setLeft(seq[idx + 1].sec); setRunning(false); }
          else { setRunning(false); setDone(true); onDone({ typ: mode === "warmup" ? `Rozgrzewka (${len})` : tx("Rozciąganie"), czas: seq.reduce((s, e) => s + e.sec, 0), ...hrPodsumowanie() }); }
        }} style={{ padding: "0 18px", background: "transparent", color: C.sub, border: `1px solid ${C.line}`, borderRadius: 12, fontWeight: 700, cursor: "pointer" }}>{tx("Dalej ›")}</button>
      </div>
    </div>
  );
}

/* ── Odległość GPS (Haversine, w metrach) ─────────────────── */
function distM(a, b) {
  const R = 6371000, toRad = (d) => (d * Math.PI) / 180;
  const dLat = toRad(b.lat - a.lat), dLon = toRad(b.lng - a.lng);
  const s = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(s));
}
// VO2max z testu Coopera (dystans w metrach / 12 min)
const cooperVO2 = (m) => Math.max(0, (m - 504.9) / 44.73);

/* ── Wake Lock — ekran nie gaśnie podczas biegu ─────────── */
/* ── Globalne tętno z opaski (Web Bluetooth) ───────────────
   Łączysz raz (w Ustawieniach), a odczyt jest dostępny we wszystkich
   ekranach: trening, test Coopera, baterie testów. Trzyma połączenie,
   dopóki sam nie rozłączysz albo nie zniknie sygnał.
─────────────────────────────────────────────────────────────*/
/* Płynne "dobijanie" liczby do wartości docelowej (requestAnimationFrame).
   Bezpieczny: jeśli wartość nie jest liczbą, zwraca ją bez zmian. */
function useCountUp(target, { dur = 900, decimals = 0 } = {}) {
  const num = typeof target === "number" ? target : parseFloat(target);
  const isNum = isFinite(num);
  const [val, setVal] = useState(isNum ? 0 : target);
  const fromRef = useRef(0);
  useEffect(() => {
    if (!isNum) { setVal(target); return; }
    if (typeof matchMedia === "function" && matchMedia("(prefers-reduced-motion: reduce)").matches) {
      setVal(num); return;
    }
    const from = fromRef.current, start = performance.now();
    let raf;
    const tick = (now) => {
      const t = Math.min(1, (now - start) / dur);
      const eased = 1 - Math.pow(1 - t, 3); // easeOutCubic
      setVal(from + (num - from) * eased);
      if (t < 1) raf = requestAnimationFrame(tick); else fromRef.current = num;
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  if (!isNum) return target;
  return decimals > 0 ? Number(val).toFixed(decimals) : Math.round(val);
}

function useHeartRate() {
  const [bpm, setBpm] = useState(null);
  const [connected, setConnected] = useState(false);
  const [reconnecting, setReconnecting] = useState(false);
  const [deviceName, setDeviceName] = useState("");
  const chRef = useRef(null), devRef = useRef(null);
  const intentRef = useRef(false);   // true = użytkownik sam rozłączył (nie wznawiaj)
  const retryRef = useRef(false);    // czy pętla ponownego łączenia już trwa

  const onVal = (e) => {
    const v = e.target.value, f = v.getUint8(0);
    setBpm(f & 0x01 ? v.getUint16(1, true) : v.getUint8(1));
  };
  // Zestawienie GATT od zera — po każdym (re)połączeniu serwis i charakterystykę
  // trzeba pobrać na nowo (stare referencje po zerwaniu są martwe).
  const setupGatt = async (dev) => {
    const srv = await dev.gatt.connect();
    const s = await srv.getPrimaryService("heart_rate");
    const ch = await s.getCharacteristic("heart_rate_measurement");
    await ch.startNotifications();
    ch.addEventListener("characteristicvaluechanged", onVal);
    chRef.current = ch;
  };
  // Auto-reconnect: BLE potrafi zgubić pas/zegarek na kilka sekund w biegu.
  // gatt.connect() na już wybranym urządzeniu NIE wymaga gestu użytkownika,
  // więc próbujemy sami: 8 prób z rosnącym odstępem 1→8 s (~40 s okna).
  const tryReconnect = async () => {
    const dev = devRef.current;
    if (!dev || intentRef.current || retryRef.current) return;
    retryRef.current = true; setReconnecting(true);
    try { navigator.vibrate?.(200); } catch { /* ignore */ }
    for (let i = 0; i < 8; i++) {
      if (intentRef.current || !devRef.current) break;
      try {
        if (dev && dev.native) await window.hrNative.reconnect(dev.dev, (b) => setBpm(b));
        else await setupGatt(dev);
        setConnected(true); setReconnecting(false); retryRef.current = false;
        try { navigator.vibrate?.([80, 60, 80]); } catch { /* ignore */ }
        return;
      } catch { /* kolejna próba */ }
      await new Promise((r) => setTimeout(r, Math.min(1000 * (i + 1), 8000)));
    }
    retryRef.current = false; setReconnecting(false);
  };
  const disconnect = () => {
    intentRef.current = true;
    if (devRef.current?.native) { try { window.hrNative.disconnect(devRef.current.dev); } catch { /* ignore */ } }
    try { chRef.current?.stopNotifications?.(); chRef.current?.removeEventListener?.("characteristicvaluechanged", onVal); } catch { /* ignore */ }
    try { devRef.current?.gatt?.disconnect?.(); } catch { /* ignore */ }
    chRef.current = null; devRef.current = null;
    setConnected(false); setReconnecting(false); setBpm(null); setDeviceName("");
  };
  const connect = async () => {
    if (window.hrNative?.ok()) { // natywna apka (Capacitor): BLE przez plugin — WebView nie ma Web Bluetooth
      try {
        const dev = await window.hrNative.connect(
          (b) => setBpm(b),
          () => { setConnected(false); setBpm(null); if (!intentRef.current) tryReconnect(); }
        );
        intentRef.current = false;
        devRef.current = { native: true, dev };
        setConnected(true); setDeviceName(dev.name || "Opaska HR");
        return true;
      } catch { alert(tx("Nie udało się połączyć z opaską HR.")); return false; }
    }
    if (!navigator.bluetooth) { alert(tx("Ta przeglądarka nie obsługuje Web Bluetooth. Otwórz aplikację w Chrome na Androidzie.")); return false; }
    try {
      const dev = await navigator.bluetooth.requestDevice({ filters: [{ services: ["heart_rate"] }] });
      intentRef.current = false;
      devRef.current = dev;
      dev.addEventListener("gattserverdisconnected", () => {
        setConnected(false); setBpm(null);
        if (!intentRef.current) tryReconnect();
      });
      await setupGatt(dev);
      setConnected(true); setDeviceName(dev.name || "Opaska HR");
      return true;
    } catch { alert(tx("Nie udało się połączyć z opaską HR.")); return false; }
  };
  useEffect(() => () => { intentRef.current = true; try { chRef.current?.stopNotifications?.(); devRef.current?.gatt?.disconnect?.(); } catch { /* ignore */ } }, []);
  return { bpm, connected, reconnecting, deviceName, connect, disconnect };
}

function useWakeLock() {
  const ref = useRef(null);
  const reacquire = async () => {
    try {
      if (ref.current !== null && document.visibilityState === "visible" && "wakeLock" in navigator)
        ref.current = await navigator.wakeLock.request("screen");
    } catch { /* ignore */ }
  };
  const request = async () => {
    try {
      if ("wakeLock" in navigator) {
        ref.current = await navigator.wakeLock.request("screen");
        document.addEventListener("visibilitychange", reacquire);
      }
    } catch { /* brak wsparcia */ }
  };
  const release = () => {
    try { ref.current?.release?.(); } catch { /* ignore */ }
    ref.current = null;
    document.removeEventListener("visibilitychange", reacquire);
  };
  useEffect(() => () => release(), []);
  return { request, release };
}

/* ── Filtr odczytu GPS (odrzuca szum i nierealne skoki) ────
   Między dwoma odczytami GPS podczas biegu (co ~1-3 s) realny ruch to
   zwykle tylko 3-12 m — próg szumu musi być MAŁY i STAŁY, bo wymaganie
   ruchu większego niż dokładność GPS (10-25 m) odrzuca praktycznie każdy
   krok i zawyża/zaniża dystans o dziesiątki procent. Nierealne skoki
   łapiemy przez sensowną prędkość (m/s), nie przez sztywny limit metrów —
   dzięki temu po chwili słabszego sygnału odczyt "doganiający" liczy się
   poprawnie, a nie wypada jako "zbyt duży skok".                        */
function gpsStep(lastPos, cur, accuracy, dtSec) {
  // Zwraca { inc, anchor, why }: inc — metry do doliczenia; anchor — czy przesunąć
  // punkt odniesienia; why — powód odrzucenia ('acc' | 'noise' | 'tele' | null).
  // KLUCZOWA POPRAWKA: przy szumie (d ≤ 2 m) NIE przesuwamy kotwicy. Android
  // potrafi dawać odczyty częściej niż 1/s — kroki < 2 m były odrzucane, a kotwica
  // i tak szła do przodu, więc dystans kasował się po kawałku (5 km → 0,23 km).
  // Teraz przemieszczenie kumuluje się od ostatniego ZAAKCEPTOWANEGO punktu.
  if (accuracy != null && accuracy > 50) return { inc: 0, anchor: false, why: "acc" }; // odczyt zbyt słaby
  if (!lastPos) return { inc: 0, anchor: true, why: null }; // pierwszy dobry fix — kotwica startowa
  const d = distM(lastPos, cur);
  if (d <= 2) return { inc: 0, anchor: false, why: "noise" }; // dryf/duplikat — kumuluj do progu
  if (dtSec > 0 && d / dtSec > 7) return { inc: 0, anchor: true, why: "tele" }; // >7 m/s (25 km/h) — skok-śmieć; przekotwicz bez liczenia
  return { inc: d, anchor: true, why: null };
}

function pobierzICS({ tytul, opis, start, minuty = 60 }) {
  try {
    const dt = (d) => d.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
    const end = new Date(start.getTime() + minuty * 60000);
    const ics = `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Rikipo Run//PL\nBEGIN:VEVENT\nUID:${Date.now()}@rikipo.run\nDTSTAMP:${dt(new Date())}\nDTSTART:${dt(start)}\nDTEND:${dt(end)}\nSUMMARY:${tytul}\nDESCRIPTION:${(opis || "").replace(/\n/g, " ")}\nBEGIN:VALARM\nTRIGGER:-PT30M\nACTION:DISPLAY\nDESCRIPTION:${tytul}\nEND:VALARM\nEND:VEVENT\nEND:VCALENDAR`;
    const blob = new Blob([ics], { type: "text/calendar" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "trening.ics";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  } catch { alert(tx("Nie udało się utworzyć przypomnienia w tej przeglądarce.")); }
}

/* ── Eksport GPX (do importu w Strava/Garmin/mapach) ──────── */
function trackToGPX(track, nazwa = "Rikipo Run") {
  const teraz = new Date().toISOString();
  const pts = track.map((p) => `<trkpt lat="${p.lat}" lon="${p.lng}">${p.alt != null ? `<ele>${p.alt}</ele>` : ""}</trkpt>`).join("\n");
  return `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="Rikipo Run" xmlns="http://www.topografix.com/GPX/1/1">
<metadata><name>${nazwa}</name><time>${teraz}</time></metadata>
<trk><name>${nazwa}</name><trkseg>
${pts}
</trkseg></trk></gpx>`;
}
function pobierzGPX(track, nazwa = "rikipo-trasa") {
  try {
    const blob = new Blob([trackToGPX(track, nazwa)], { type: "application/gpx+xml" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `${nazwa.replace(/[^\w-]+/g, "_")}.gpx`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  } catch (e) { alert(tx("Nie udało się wyeksportować pliku GPX w tej przeglądarce.")); }
}

/* ── Mapa trasy (bez bibliotek, lokalny układ SVG) ───────── */
function RouteMap({ track, color = C.accent }) {
  if (!track || track.length < 2) return null;
  const lats = track.map((p) => p.lat), lngs = track.map((p) => p.lng);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLng = Math.min(...lngs), maxLng = Math.max(...lngs);
  const latMid = (minLat + maxLat) / 2;
  const kx = Math.cos((latMid * Math.PI) / 180);
  const spanLat = (maxLat - minLat) || 1e-6;
  const spanLng = ((maxLng - minLng) * kx) || 1e-6;
  const W = 300, H = 180, pad = 14;
  const scale = Math.min((W - 2 * pad) / spanLng, (H - 2 * pad) / spanLat);
  const offX = (W - spanLng * scale) / 2;
  const offY = (H - spanLat * scale) / 2;
  const pts = track.map((p) => {
    const x = offX + ((p.lng - minLng) * kx) * scale;
    const y = H - (offY + (p.lat - minLat) * scale);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const first = pts[0].split(","), last = pts[pts.length - 1].split(",");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{ background: C.surface2, borderRadius: 12 }}>
      <polyline points={pts.join(" ")} fill="none" stroke={color} strokeWidth="3" strokeLinejoin="round" strokeLinecap="round" />
      <circle cx={first[0]} cy={first[1]} r="5" fill="#4FD6A6" />
      <circle cx={last[0]} cy={last[1]} r="5" fill={C.warn} />
    </svg>
  );
}

/* ── BATERIA TESTÓW SPRAWNOŚCIOWYCH ───────────────────────────
   Zestaw testów również dla osób słabszych. Każdy mierzy puls

const TESTY = [

    opis: tx("Siła i równowaga każdej nogi osobno — ile powtórzeń w 30 s na każdą nogę. Różnica między stronami zdradza słabsze ogniwo, które łatwo prowadzi do kontuzji."),
    instrukcja: [tx("Usiądź na krześle, jedną stopę oprzyj płasko, drugą lekko unieś."), tx("Wstań na jednej nodze do pełnego wyprostu i usiądź z powrotem — to jedno powtórzenie."), tx("Rób przez 30 s na jednej nodze, potem zmień nogę (drugie 30 s)."), tx("Możesz pomóc sobie rękami albo przytrzymać się dla równowagi.")],
    pole: "powt", unit: "powt.", strony: true, czasNaStrone: true, mierzPuls: true },

    instrukcja: [tx("Wyjdź na zewnątrz, zgódź się na lokalizację (GPS)."), tx("Idź szybko lub biegnij truchtem przez 6 minut — równo, bez zrywów."), "Aplikacja zmierzy dystans.", tx("Zmierz tętno zaraz po zakończeniu.")],

    pole: "poziom", unit: "", wybory: [["podloga", tx("Dotykam podłogi dłońmi")], ["palce", tx("Sięgam palców u stóp")], ["kostki", "Do kostek"], ["lydki", tx("Tylko do łydek")]] },
