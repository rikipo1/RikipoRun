}

function raportTrenera(profile, history) {
  const p = profile || {};
  const L = [];
  L.push("RIKIPO RUN — RAPORT DLA TRENERA");
  L.push("Wygenerowano: " + new Date().toLocaleString("pl-PL"));
  L.push("=".repeat(48));

  L.push("\n# SYLWETKA I POMIARY");
  const body = [
    [tx("Imię"), p.name], [tx("Wiek"), p.age], [tx("Płeć"), p.sex === "f" ? "kobieta" : p.sex === "m" ? tx("mężczyzna") : null],
    [tx("Waga (kg)"), p.weight], [tx("Wzrost (cm)"), p.height],
    [tx("BMI"), (p.weight && p.height) ? (p.weight / ((p.height / 100) ** 2)).toFixed(1) : null],
    [tx("Tętno spoczynkowe"), p.restHR ? p.restHR + " bpm" : null], ["VO₂max", p.vo2max],
  ];
  body.forEach(([k, v]) => { if (v != null && v !== "") L.push(`  ${k}: ${v}`); });

  if (p.assessment && Object.keys(p.assessment).length) {
    L.push("\n# OCENA WSTĘPNA (z ankiety)");
    Object.entries(p.assessment).forEach(([k, v]) => {
      if (v == null || v === "") return;
      L.push(`  ${k}: ${Array.isArray(v) ? v.join(", ") : (typeof v === "object" ? JSON.stringify(v) : v)}`);
    });
  }

  if (p.testyWyniki && Object.keys(p.testyWyniki).length) {
    L.push("\n# TESTY SPRAWNOŚCI");
    Object.entries(p.testyWyniki).forEach(([k, v]) => L.push(`  ${k}: ${typeof v === "object" ? JSON.stringify(v) : v}`));
  }

  L.push("\n# AKTUALNY PLAN TRENINGOWY");
  L.push(planDoTekstu(p.plan));

  const biegi = (history || []).filter((h) => h.dystans);
  if (biegi.length) {
    const najdluzszy = Math.max(...biegi.map((h) => h.dystans));
    const best = (d) => { const c = biegi.filter((h) => h.dystans >= d * 0.95 && h.tempo).sort((a, b) => a.tempo - b.tempo)[0]; return c ? c.tempo : null; };
    L.push("\n# REKORDY / ŻYCIÓWKI");
    L.push(`  Najdłuższy bieg: ${najdluzszy.toFixed(2)} km`);
    [["1 km", 1], ["5 km", 5], ["10 km", 10]].forEach(([n, d]) => { const t = best(d); if (t) L.push(`  ${n}: ~${fmt(t)}/km`); });
  }

  // ── ANALIZA OBCIĄŻENIA I MONITORING (liczone lokalnie; interpretuj wg zasad) ──
  const _raportMon = raportMonitoringu(p, history);
  if (_raportMon) { L.push("\n# RAPORT MONITORINGU ZAWODNIKA (wskaźniki policzone przez aplikację)"); L.push(_raportMon); }

  L.push("\n# HISTORIA TRENINGÓW (ostatnie 40)");
  (history || []).slice(0, 40).forEach((h) => {
    const d = new Date(h.data).toLocaleDateString("pl-PL");
    let s = `  ${d} — ${h.typ || tx("trening")}`;
    if (h.dystans) s += `, ${h.dystans} km`;
    if (h.czas) s += `, ${fmt(h.czas)}`;
    if (h.tempo) s += `, tempo ${fmt(h.tempo)}/km`;
    const sm = h.samples || h.wynik?.samples;
    if (Array.isArray(sm) && sm.length) {
      const hrv = sm.filter((x) => x.bpm).map((x) => x.bpm);
      if (hrv.length) s += `, HR śr ${Math.round(hrv.reduce((a, b) => a + b, 0) / hrv.length)}/maks ${Math.max(...hrv)}`;
    } else if (h.tetno) s += `, HR ${h.tetno}`;
    if (h.samopoczucie) s += `, samopoczucie ${h.samopoczucie}/10`;
    if (h.vo2max) s += `, VO₂max ${h.vo2max}`;
    L.push(s);
  });

  const meas = p.measurements || [];
  if (meas.length) {
    L.push("\n# POMIARY W CZASIE");
    meas.slice(-60).forEach((m) => L.push(`  ${new Date(m.date).toLocaleDateString("pl-PL")} — ${m.key}: ${m.value}`));
  }
  return L.join("\n") + "\n";
}

/* ── GRAFICZNY RAPORT HTML (samodzielny plik) ──────────────────
   Filtruje dane do wybranego okresu i buduje ładny, ciemny raport
   z kafelkami statystyk i wykresami SVG (km, tętno, waga). */
function raportHTML(profile, history, dni) {
  const p = profile || {};
  const now = Date.now();
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  const wszystko = (history || []).filter((h) => h.data);
  const inOkres = dni ? wszystko.filter((h) => (now - new Date(h.data)) <= dni * 86400000) : wszystko;
  const biegi = inOkres.filter((h) => h.dystans).sort((a, b) => new Date(a.data) - new Date(b.data));
  const okresLabel = dni ? `ostatnie ${dni} dni` : "cała historia";

  const sumKm = biegi.reduce((a, h) => a + (h.dystans || 0), 0);
  const sumCzas = biegi.reduce((a, h) => a + (h.czas || 0), 0);
  const tempa = biegi.filter((h) => h.tempo).map((h) => h.tempo);
  const avgTempo = tempa.length ? tempa.reduce((a, b) => a + b, 0) / tempa.length : null;
  const najdl = biegi.length ? Math.max(...biegi.map((h) => h.dystans)) : 0;
  const hrFromRun = (h) => { const sm = h.samples || h.wynik?.samples; if (Array.isArray(sm)) { const v = sm.filter((x) => x.bpm).map((x) => x.bpm); if (v.length) return Math.round(v.reduce((a, b) => a + b, 0) / v.length); } return h.tetno || null; };
  const hrAvgs = biegi.map(hrFromRun).filter(Boolean);
  const avgHR = hrAvgs.length ? Math.round(hrAvgs.reduce((a, b) => a + b, 0) / hrAvgs.length) : null;
  const best = (d) => { const c = biegi.filter((h) => h.dystans >= d * 0.95 && h.tempo).sort((a, b) => a.tempo - b.tempo)[0]; return c ? c.tempo : null; };
  const pb1 = best(1), pb5 = best(5), pb10 = best(10);

  // ── wykres słupkowy: dystans na bieg (ostatnie 20) ──
  const svgBars = (vals, labels, kolor, unitFmt) => {
    if (!vals.length) return `<div class="empty">Brak danych w tym okresie.</div>`;
    const W = 640, H = 180, pad = 28, bw = (W - pad * 2) / vals.length;
    const max = Math.max(...vals, 0.1);
    const bars = vals.map((v, i) => {
      const h = Math.max(2, (v / max) * (H - pad * 2));
      const x = pad + i * bw + bw * 0.15, y = H - pad - h;
      return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${(bw * 0.7).toFixed(1)}" height="${h.toFixed(1)}" rx="3" fill="${kolor}"/>`;
    }).join("");
    const lbls = labels.map((l, i) => i % Math.ceil(labels.length / 8 || 1) === 0 ? `<text x="${(pad + i * bw + bw / 2).toFixed(1)}" y="${H - 8}" fill="#96B2BD" font-size="10" text-anchor="middle">${esc(l)}</text>` : "").join("");
    return `<svg viewBox="0 0 ${W} ${H}" class="chart"><text x="${pad}" y="16" fill="#96B2BD" font-size="11">max ${unitFmt(max)}</text>${bars}${lbls}</svg>`;
  };
  // ── wykres liniowy: trend (tętno/waga) ──
  const svgLine = (vals, labels, kolor, unitFmt) => {
    if (vals.length < 2) return `<div class="empty">Za mało danych na wykres (min. 2 punkty).</div>`;
    const W = 640, H = 180, pad = 32;
    const min = Math.min(...vals), max = Math.max(...vals), span = (max - min) || 1;
    const pts = vals.map((v, i) => {
      const x = pad + (i / (vals.length - 1)) * (W - pad * 2);
      const y = H - pad - ((v - min) / span) * (H - pad * 2);
      return [x, y];
    });
    const line = pts.map((pt, i) => (i ? "L" : "M") + pt[0].toFixed(1) + " " + pt[1].toFixed(1)).join(" ");
    const dots = pts.map((pt) => `<circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="3" fill="${kolor}"/>`).join("");
    const lbls = labels.map((l, i) => i % Math.ceil(labels.length / 6 || 1) === 0 ? `<text x="${pts[i][0].toFixed(1)}" y="${H - 8}" fill="#96B2BD" font-size="10" text-anchor="middle">${esc(l)}</text>` : "").join("");
    return `<svg viewBox="0 0 ${W} ${H}" class="chart"><text x="${pad}" y="16" fill="#96B2BD" font-size="11">${unitFmt(max)}</text><text x="${pad}" y="${H - pad + 4}" fill="#96B2BD" font-size="11">${unitFmt(min)}</text><path d="${line}" fill="none" stroke="${kolor}" stroke-width="2.5"/>${dots}${lbls}</svg>`;
  };

  const dShort = (d) => new Date(d).toLocaleDateString("pl-PL", { day: "2-digit", month: "2-digit" });
  const ostatnie = biegi.slice(-20);
  const kmChart = svgBars(ostatnie.map((h) => +h.dystans.toFixed(2)), ostatnie.map((h) => dShort(h.data)), "#FF8A70", (v) => v.toFixed(1) + " km");
  const hrRuns = biegi.filter((h) => hrFromRun(h));
  const hrChart = svgLine(hrRuns.map(hrFromRun), hrRuns.map((h) => dShort(h.data)), "#FF6E86", (v) => Math.round(v) + " bpm");
  const wagi = (p.measurements || []).filter((m) => m.key === "waga" && (!dni || (now - new Date(m.date)) <= dni * 86400000)).sort((a, b) => new Date(a.date) - new Date(b.date));
  const wagaChart = svgLine(wagi.map((m) => +m.value), wagi.map((m) => dShort(m.date)), "#A48FEE", (v) => v.toFixed(1) + " kg");

  const kafelek = (etk, wart) => `<div class="card"><div class="k-label">${esc(etk)}</div><div class="k-val">${esc(wart)}</div></div>`;
  const kafelki = [
    kafelek("Biegów", biegi.length),
    kafelek("Suma km", sumKm.toFixed(1)),
    kafelek("Suma czasu", sumCzas ? fmt(sumCzas) : "—"),
    kafelek("Śr. tempo", avgTempo ? fmt(avgTempo) + "/km" : "—"),
    kafelek("Śr. tętno", avgHR ? avgHR + " bpm" : "—"),
    kafelek("Najdłuższy", najdl ? najdl.toFixed(2) + " km" : "—"),
  ].join("");
  const pbRow = [["1 km", pb1], ["5 km", pb5], ["10 km", pb10]].filter(([, t]) => t).map(([n, t]) => `<span class="pb">🏆 ${n}: ~${fmt(t)}/km</span>`).join("");

  const wiersze = biegi.slice().reverse().slice(0, 30).map((h) => {
    const hr = hrFromRun(h);
    return `<tr><td>${esc(dShort(h.data))}</td><td>${esc(h.typ || "trening")}</td><td>${h.dystans ? h.dystans.toFixed(2) + " km" : "—"}</td><td>${h.czas ? fmt(h.czas) : "—"}</td><td>${h.tempo ? fmt(h.tempo) + "/km" : "—"}</td><td>${hr ? hr + " bpm" : "—"}</td></tr>`;
  }).join("");

  return `<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<title>Rikipo Run — raport</title><style>
*{box-sizing:border-box}body{margin:0;background:#08202E;color:#F1F7F4;font-family:'Space Grotesk',-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding:20px;max-width:760px;margin:0 auto}
h1{font-size:24px;margin:0 0 4px}.sub{color:#96B2BD;font-size:13px;margin:0 0 18px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.card{background:#0E2C3C;border:1px solid #1E4256;border-radius:14px;padding:14px}
.k-label{color:#96B2BD;font-size:11px;letter-spacing:.5px;text-transform:uppercase}.k-val{font-size:22px;font-weight:800;margin-top:4px}
h2{font-size:14px;color:#FF8A70;letter-spacing:1px;text-transform:uppercase;margin:22px 0 8px}
.panel{background:#0E2C3C;border:1px solid #1E4256;border-radius:14px;padding:14px}
.chart{width:100%;height:auto;display:block}.empty{color:#96B2BD;font-size:13px;padding:12px 0}
.pb{display:inline-block;background:#1E4256;border-radius:999px;padding:6px 12px;font-size:13px;margin:0 8px 8px 0}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:left;padding:8px 6px;border-bottom:1px solid #1E4256}th{color:#96B2BD;font-weight:600}

</style></head><body>
<h1>Rikipo Run — raport biegowy</h1>
<p class="sub">${esc(p.name ? p.name + " · " : "")}${esc(okresLabel)} · wygenerowano ${esc(new Date().toLocaleString("pl-PL"))}</p>
<div class="grid">${kafelki}</div>
${pbRow ? `<h2>Życiówki w okresie</h2><div class="panel">${pbRow}</div>` : ""}
<h2>Dystans na bieg</h2><div class="panel">${kmChart}</div>
<h2>Średnie tętno (trend)</h2><div class="panel">${hrChart}</div>
<h2>Waga (trend)</h2><div class="panel">${wagaChart}</div>
<h2>Historia treningów (${esc(okresLabel)})</h2>
<div class="panel"><table><thead><tr><th>Data</th><th>Typ</th><th>Dystans</th><th>Czas</th><th>Tempo</th><th>Tętno</th></tr></thead><tbody>${wiersze || `<tr><td colspan="6" style="color:#96B2BD">Brak treningów w tym okresie.</td></tr>`}</tbody></table></div>
<p class="foot">Rikipo Run · raport poglądowy do przekazania trenerowi personalnemu</p>
</body></html>`;
}

const inp = { width: "100%", padding: "11px 13px", borderRadius: 10, border: `1px solid ${C.line}`, background: C.surface2, color: C.ink, fontSize: 14, outline: "none" };

/* ── GUIDED: prowadzony trening krok po kroku ─────────────── */
function Guided({ trening, profile, onFinish, go, applyPlanChange, onSaveDemo, hr }) {
  const [stepIdx, setStepIdx] = useState(0);
  const [collected, setCollected] = useState({}); // dystans/tempo z kroku biegowego
  const [marks, setMarks] = useState([]); // oznaczone momenty (spadki) z notatkami

  if (!trening || !trening.kroki?.length) {
    return (
      <div style={{ padding: 20 }}>
        <p style={{ color: C.sub }}>{tx("Brak danych treningu. Wróć i wybierz trening z planu.")}</p>
        <button onClick={() => go("home")} style={primary}>{tx("Wróć")}</button>
      </div>
    );
  }

  const kroki = trening.kroki;
  const step = kroki[stepIdx];
  const last = stepIdx === kroki.length - 1;

  const nextStep = (data) => {
    if (data?.skipSave) { go("home"); return; } // demo: zakończ bez zapisu do planu
    if (data?.hrCheckpoints) {
      // próbki tętna z kroków nie-biegowych (rozgrzewka/siła/rozciąganie) zbieramy łącznie
      setCollected((c) => ({ ...c, hrStepy: [...(c.hrStepy || []), ...data.hrCheckpoints] }));
    }
    if (data) { const { hrCheckpoints, ...rest } = data; if (Object.keys(rest).length) setCollected((c) => ({ ...c, ...rest })); }
    if (data?.marks) setMarks((m) => [...m, ...data.marks]);
    if (last) {
      // przejdź do podsumowania zamiast od razu kończyć
      setStepIdx(kroki.length); // index == length => ekran podsumowania
    } else {
      setStepIdx((i) => i + 1);
    }
  };

  // EKRAN PODSUMOWANIA
  if (stepIdx >= kroki.length) {
    // tętno z kroków nie-biegowych (rozgrzewka/siła/rozciąganie) — używane gdy nie było kroku biegowego z próbkami
    const hrStepy = collected.hrStepy || [];
    const avgHrStep = hrStepy.length ? Math.round(hrStepy.reduce((a, b) => a + b, 0) / hrStepy.length) : null;
    const maxHrStep = hrStepy.length ? Math.max(...hrStepy) : null;
    return <Podsumowanie trening={trening} profile={profile} collected={collected} marks={marks}
      applyPlanChange={applyPlanChange}
      onDone={(extra) => onFinish({ dystans: collected.dystans, tempo: collected.tempo, vo2max: collected.vo2max, kcal: extra?.kcal, track: collected.track || null, samples: collected.samples || null, marks: collected.marks || marks || null, tgtLo: collected.tgtLo, tgtHi: collected.tgtHi, avgHr: avgHrStep, maxHr: maxHrStep, samopoczucie: extra?.samopoczucie || null })} />;
  }

  return (
    <div>
      {/* pasek kroków */}
      <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
        {kroki.map((k, i) => (
          <div key={i} style={{ flex: 1, height: 5, borderRadius: 3, background: i < stepIdx ? "#4FD6A6" : i === stepIdx ? C.accent : C.line }} />
        ))}
      </div>
      <div style={{ fontSize: 12, color: C.sub, marginBottom: 14 }}>{trening.nazwa} {tx("· krok")} {stepIdx + 1}/{kroki.length}</div>

      {step.typ === "rozgrzewka" && <KrokRozgrzewka step={step} hr={hr} profile={profile} onNext={(d) => nextStep(d)} />}
      {step.typ === "rozciaganie" && <KrokRozciaganie step={step} hr={hr} profile={profile} onNext={(d) => nextStep(d)} />}
      {step.typ === "silowy" && <KrokSilowy step={step} hr={hr} profile={profile} onNext={(d) => nextStep(d)} />}
      {(step.typ === "bieg" || step.typ === "interwaly") && (
        <KrokBieg step={step} profile={profile} hr={hr} onNext={(data) => nextStep(data)} onSaveDemo={onSaveDemo} />
      )}
      {!["rozgrzewka", "rozciaganie", "bieg", "interwaly", "silowy"].includes(step.typ) && (
        <KrokInny step={step} hr={hr} profile={profile} onNext={(d) => nextStep(d)} />
      )}

      <MusicBar profile={profile} />
      <button onClick={() => go("home")} style={{ ...ghost, marginTop: 10 }}>{tx("Przerwij trening")}</button>
    </div>
  );
}

const primary = { width: "100%", marginTop: 14, padding: 16, background: C.accent, color: C.bg, border: "none", borderRadius: 12, fontWeight: 800, fontSize: 16, cursor: "pointer" };
const ghost = { width: "100%", padding: 12, background: "transparent", color: C.sub, border: `1px solid ${C.line}`, borderRadius: 12, fontWeight: 700, cursor: "pointer" };
const ctrlBtn = { padding: "6px 10px", borderRadius: 8, border: `1px solid ${C.line}`, background: C.surface2, color: C.ink, fontWeight: 800, fontSize: 13, cursor: "pointer", minWidth: 38 };

// krok dowolnego typu z opcjonalnym odliczaniem (jeśli opis zawiera "N min")
function KrokInny({ step, onNext, hr, profile }) {
  const ma = /(\d+)\s*min/.test(step.opis || "");
  const sek = minutyZOpisu(step.opis, 0);
  const [left, setLeft] = useState(sek);
  const [run, setRun] = useState(ma);
  const ref = useRef(null);
  const hrS = useRef([]);
  const koniec = () => onNext(hrS.current.length ? { hrCheckpoints: hrS.current.slice() } : undefined);
  useEffect(() => {
    if (run && sek > 0) {
      ref.current = setInterval(() => { if (hr?.bpm) hrS.current.push(hr.bpm); setLeft((x) => {
        if (x <= 1) { clearInterval(ref.current); speak(tx("Zakończone, przechodzimy dalej.")); setTimeout(koniec, 600); return 0; }
        return x - 1;
      }); }, 1000);
    }
    return () => clearInterval(ref.current);
  }, [run]);
  return (
    <div style={{ textAlign: "center", padding: "10px 0" }}>
      <h2 style={{ fontSize: 20, fontWeight: 800 }}>{step.opis}</h2>
      {sek > 0 && (hr?.bpm ? <PulsBadge bpm={hr.bpm} profile={profile} style={{ marginTop: 8 }} />
        : hr?.connect ? <button onClick={() => hr.connect()} style={{ marginTop: 8, padding: "6px 14px", borderRadius: 999, border: `1px solid ${C.line}`, background: "transparent", color: C.sub, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>❤ {tx("Podłącz pas tętna (Bluetooth)")}</button> : null)}
      {sek > 0 && <div style={{ fontSize: 48, fontWeight: 800, color: C.accent, fontVariantNumeric: "tabular-nums", margin: "10px 0" }}>{fmt(left)}</div>}
      {sek > 0 && <button onClick={() => setRun((r) => !r)} style={{ ...ghost, marginTop: 6 }}>{run ? "Pauza" : tx("Wznów")}</button>}
      <button onClick={koniec} style={primary}>{sek > 0 ? tx("Pomiń — dalej") : "Dalej"}</button>
    </div>
  );
}

// wyciąga liczbę minut z opisu kroku ("5 min", "30 min ...") → sekundy
function minutyZOpisu(opis, domyslne = 5) {
  const m = String(opis || "").match(/(\d+)\s*min/);
  return (m ? parseInt(m[1], 10) : domyslne) * 60;
}

/* Rozbija opis trenera ("przysiady, wykroki, krążenia bioder") na czytelną
   listę ćwiczeń. Pokazuje listę tylko, gdy widać wyliczenie po przecinkach. */
function CwiczeniaListy({ opis, kolor }) {
  if (!opis || typeof opis !== "string") return null;
  const baza = opis.includes(":") ? opis.split(":").slice(1).join(":") : opis;
  const cwicz = baza.split(/[,;]|\si\s/).map((x) => x.trim()).filter((x) => x.length > 1 && x.length < 60);
  if (cwicz.length < 2) return null;
  return (
    <div style={{ background: C.surface, borderRadius: 12, padding: "10px 14px", margin: "10px 0", textAlign: "left" }}>
      <div style={{ fontSize: 10, color: kolor, fontWeight: 800, letterSpacing: 1, marginBottom: 6 }}>{tx("ĆWICZENIA OD TRENERA")}</div>
      {cwicz.map((c, i) => (
        <div key={i} style={{ fontSize: 13, color: C.ink, padding: "3px 0", display: "flex", gap: 8 }}>
          <span style={{ color: kolor, fontWeight: 800 }}>{i + 1}.</span><span>{c.charAt(0).toUpperCase() + c.slice(1)}</span>
        </div>
      ))}
    </div>
  );
}
