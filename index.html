// Zwięzły opis planu treningowego dla dietetyka (gdy user zgodzi się go uwzględnić)
function treningSummary(p) {
  const tr = p?.plan?.treningi;
  if (!Array.isArray(tr) || !tr.length) return null;
  const typy = {};
  tr.forEach((t) => { const k = t.typ || t.rodzaj || "trening"; typy[k] = (typy[k] || 0) + 1; });
  const opisTypy = Object.entries(typy).map(([k, n]) => `${n}× ${k}`).join(", ");
  return `${tr.length} jednostek/tydzień (${opisTypy})`;
}

function Dieta({ profile, setProfile, history, useCredit, refundCredit, account, go }) {
  const p = profile || {};
  const day = todayKey();
  const meals = (p.meals || []).filter((m) => m.date.slice(0, 10) === day);
  const waterToday = (p.water || []).filter((w) => w.date.slice(0, 10) === day).reduce((a, w) => a + w.ml, 0);
  const trainedToday = (history || []).some((h) => h.data.slice(0, 10) === day && (h.dystans || h.czas));
  const burnedToday = (history || []).filter((h) => h.data.slice(0, 10) === day).reduce((a, h) => a + (h.kcal || 0), 0);

  const kcalGoal = calorieGoal(p, burnedToday);
  const macros = macroGoal(p, kcalGoal);
  const wGoal = waterGoal(p, trainedToday);

  const eaten = meals.reduce((a, m) => a + (m.kcal || 0), 0);
  const eatenP = meals.reduce((a, m) => a + (m.protein || 0), 0);
  const eatenF = meals.reduce((a, m) => a + (m.fat || 0), 0);
  const eatenC = meals.reduce((a, m) => a + (m.carbs || 0), 0);

  // Posiłki odhaczone z jadłospisu (dzisiejszy dzień) też wliczamy do bilansu
  const planToday = (() => {
    const pl = p.mealPlan;
    if (!pl?.dni) return [];
    const dow = (new Date().getDay() + 6) % 7;
    const d = pl.dni.find((x) => x.dzien === dow) || pl.dni[dow] || null;
    return d?.posilki || [];
  })();
  const checksTodayArr = (p.mealChecks || {})[day] || [];
  const planEaten = planToday.reduce((a, po, i) => a + (checksTodayArr[i] ? (po.kcal || 0) : 0), 0);
  const planP = planToday.reduce((a, po, i) => a + (checksTodayArr[i] ? (po.bialko || 0) : 0), 0);
  const planF = planToday.reduce((a, po, i) => a + (checksTodayArr[i] ? (po.tluszcz || 0) : 0), 0);
  const planC = planToday.reduce((a, po, i) => a + (checksTodayArr[i] ? (po.wegle || 0) : 0), 0);

  const totEaten = eaten + planEaten;
  const totP = eatenP + planP, totF = eatenF + planF, totC = eatenC + planC;
  const balance = kcalGoal ? totEaten - kcalGoal : null;

  const [mode, setMode] = useState("text");
  const [text, setText] = useState("");
  const [img, setImg] = useState(null);
  const [busy, setBusy] = useState(false);
  const [advice, setAdvice] = useState("");
  const [recOn, setRecOn] = useState(false);
  const fileRef = useRef(null);

  // ── JADŁOSPIS TYGODNIOWY (dietetyk AI) ──
  const plan = p.mealPlan || null;
  const wakeTime = p.wakeTime || "07:00";
  const sleepTime = p.sleepTime || "22:00";
  const mealsPerDay = p.mealsPerDay || "auto"; // "auto" = AI decyduje, lub liczba 3..6
  const prefs = p.dietPrefs || { unikam: [], kuchnia: [], gotowanie: "srednio", budzet: "sredni", uwagi: "", useTrening: true, gotowe: false };
  const [planBusy, setPlanBusy] = useState(false);
  const [planErr, setPlanErr] = useState("");
  const [ankietaOtw, setAnkietaOtw] = useState(false);
  const [widocznyDzien, setWidocznyDzien] = useState(dowMon0());
  // dni od wygenerowania planu — podpowiedź odświeżenia po 7 dniach
  const planAgeDays = plan?.generatedAt ? Math.floor((Date.now() - new Date(plan.generatedAt).getTime()) / 86400000) : null;
  const planStary = planAgeDays != null && planAgeDays >= 7;

  // ustawienia okna dnia + preferencje
  const setWake = (v) => setProfile({ ...p, wakeTime: v, dietPrefs: { ...prefs, gotowe: false } });
  const setSleep = (v) => setProfile({ ...p, sleepTime: v, dietPrefs: { ...prefs, gotowe: false } });
  const setMeals = (v) => setProfile({ ...p, mealsPerDay: v, dietPrefs: { ...prefs, gotowe: false } });
  const updPrefs = (patch) => setProfile({ ...p, dietPrefs: { ...prefs, ...patch, ...("gotowe" in patch ? {} : { gotowe: false }) } });
  const togglePref = (key, val) => {
    const arr = prefs[key] || [];
    updPrefs({ [key]: arr.includes(val) ? arr.filter((x) => x !== val) : [...arr, val] });
  };

  // odhaczanie posiłków z planu (per dzień)
  const checksToday = (p.mealChecks || {})[day] || [];
  const toggleCheck = (idx) => {
    const all = { ...(p.mealChecks || {}) };
    const arr = [...(all[day] || [])];
    arr[idx] = !arr[idx];
    all[day] = arr;
    setProfile({ ...p, mealChecks: all });

  // ── RĘCZNA EDYCJA POSIŁKU + ROZMOWA Z DIETETYKIEM (per dzień) ──
  const [editIdx, setEditIdx] = useState(null);   // indeks edytowanego posiłku w widocznym dniu
  const [editBuf, setEditBuf] = useState(null);   // bufor edycji {czas,nazwa,opis,kcal,bialko,tluszcz,wegle}
  const [chatOtw, setChatOtw] = useState(false);  // panel rozmowy z dietetykiem

  const [chatBusy, setChatBusy] = useState(false);

  // podmienia posiłki w jednym dniu planu (resztę tygodnia zostawia)
  const zapiszPosilkiDnia = (dzienIdx, posilki) => {
    const pl = p.mealPlan; if (!pl?.dni) return;
    const dni = pl.dni.map((d) => (d.dzien === dzienIdx ? { ...d, posilki } : d));
    if (!dni.some((d) => d.dzien === dzienIdx) && dni[dzienIdx]) dni[dzienIdx] = { ...dni[dzienIdx], posilki };
    setProfile({ ...p, mealPlan: { ...pl, dni } });

  const cancelEdit = () => { setEditIdx(null); setEditBuf(null); };
  const saveEdit = () => {
    const arr = posilkiWidoczne().map((po, i) => (i === editIdx ? {
      czas: String(editBuf.czas || "").slice(0, 5),
      nazwa: String(editBuf.nazwa || tx("Posiłek")),

      kcal: +editBuf.kcal || 0, bialko: +editBuf.bialko || 0, tluszcz: +editBuf.tluszcz || 0, wegle: +editBuf.wegle || 0,
    } : po)).sort((a, b) => (a.czas || "").localeCompare(b.czas || ""));
    zapiszPosilkiDnia(widocznyDzien, arr);

    if (!window.confirm(`${tx("Usunąć ten posiłek?")} (${nazwa})`)) return;
    zapiszPosilkiDnia(widocznyDzien, arr.filter((_, idx) => idx !== i));
    cancelEdit();
  };

  // rozmowa: user pisze co mu nie pasuje, AI poprawia TYLKO ten dzień
  const negocjujDzien = async () => {
    if (chatBusy || !chatText.trim()) return;
    if (useCredit && !useCredit("rozmowa")) {
      setChatMsg({ text: tx("Skończyły się kredyty AI 💬 Wykup wyższy plan, żeby dostać poradę okołotreningową."), err: true });
      return;
    }
    setChatBusy(true); setChatMsg(null);
    const obecne = posilkiWidoczne();
    const celOpis = {
      redukcja: "REDUKCJA masy — deficyt ~400 kcal/dzień, wysokie białko",
      utrzymanie: "UTRZYMANIE masy — kalorie na poziomie zapotrzebowania",
      masa: "BUDOWA masy — nadwyżka ~300 kcal/dzień",
      biegowy: "POD BIEGANIE — energia na treningi, węglowodany okołotreningowo",
    }[plan?.dietMode || p.dietMode || "utrzymanie"];
    const unikam = (prefs.unikam || []).length ? `Bezwzględnie unikaj: ${prefs.unikam.join(", ")}.` : "";
    const sys = `Jesteś dietetykiem sportowym dla biegacza, mówisz po polsku. Użytkownik ma gotowy jadłospis na jeden dzień i prosi o poprawkę (np. inne godziny, mniejsza porcja, zamiana dania, coś czego nie zje). Popraw TYLKO ten dzień zgodnie z prośbą, trzymając dzienne kcal blisko ~${plan?.kcalGoal || kcalGoal || 2200} i sensowny rozkład makro. ${celOpis}. ${unikam} Pobudka ${wakeTime}, sen ${sleepTime}. Potrawy realne, dostępne w PL/DE.
Odpowiedz WYŁĄCZNIE jednym blokiem JSON, bez tekstu poza nim, bez markdown:
<DZIEN>{"posilki":[{"czas":"HH:MM","nazwa":"…","opis":"składniki i porcje","kcal":N,"bialko":N,"tluszcz":N,"wegle":N}]}</DZIEN>`;
    const usr = `Obecny jadłospis na ${DOW_PL[widocznyDzien]}:\n${JSON.stringify(obecne)}\n\nProśba użytkownika: ${chatText.trim()}\n\nZwróć poprawiony cały dzień jako blok <DZIEN>.`;
    try {
      const out = await callClaude({ model: "claude-sonnet-4-6", max_tokens: 1600, system: sys + langDirective(langOf(p)), messages: [{ role: "user", content: usr }] });
      const j = wyciagnijDzien(out);
      const posilki = (j.posilki || []).map((po) => ({
        czas: String(po.czas || "").slice(0, 5), nazwa: String(po.nazwa || "Posiłek"), opis: String(po.opis || ""),
        kcal: +po.kcal || 0, bialko: +po.bialko || 0, tluszcz: +po.tluszcz || 0, wegle: +po.wegle || 0,
      })).sort((a, b) => (a.czas || "").localeCompare(b.czas || ""));
      if (!posilki.length) throw new Error("empty");
      zapiszPosilkiDnia(widocznyDzien, posilki);
      setChatText(""); setChatOtw(false);
      setChatMsg({ text: tx("Dietetyk poprawił ten dzień. Sprawdź zmiany powyżej."), err: false });
    } catch (e) {
      refundCredit && refundCredit("rozmowa");
      setChatMsg({ err: true, text: typeof e?.message === "string" && (e.message === "parse" || e.message === "empty")
        ? tx("Nie udało się poprawić dnia — spróbuj jeszcze raz albo napisz inaczej.") : aiErr(e) });
    } finally { setChatBusy(false); }
  };

  const ulozJadlospis = async () => {
    if (planBusy) return;
    if (useCredit && !useCredit("rozmowa")) {
      setPlanErr(tx("Skończyły się kredyty AI 💬 Wykup wyższy plan, żeby dostać poradę okołotreningową."));
      return;
    }
    setPlanBusy(true); setPlanErr("");
    const celOpis = {
      redukcja: "REDUKCJA masy — deficyt ~400 kcal/dzień, wysokie białko, sycące posiłki o niskiej gęstości energetycznej",
      utrzymanie: "UTRZYMANIE masy — kalorie na poziomie zapotrzebowania",
      masa: "BUDOWA masy/formy — nadwyżka ~300 kcal/dzień, więcej węglowodanów i białka",
      biegowy: "POD BIEGANIE — energia na treningi, węglowodany okołotreningowo, dobre nawodnienie",
    }[p.dietMode || "utrzymanie"];

    // okno dnia → AI samo rozkłada posiłki; liczba: auto albo wybrana
    const ileMin = mealsPerDay === "auto"
      ? `Sam zdecyduj o liczbie posiłków (zwykle 3–5) i porach, równomiernie między pobudką a snem (pierwszy ~30–60 min po pobudce, ostatni ~2 h przed snem). Doradź układ, który będzie najlepszy pod cel i treningi.`
      : `Zaplanuj DOKŁADNIE ${mealsPerDay} posiłków dziennie, sam dobierając godziny równomiernie między pobudką a snem.`;

    // preferencje z ankiety
    const pr = [];
    if (prefs.unikam?.length) pr.push(`NIE UŻYWAJ / unikaj: ${prefs.unikam.join(", ")}.`);
    if (prefs.kuchnia?.length) pr.push(`Preferowana kuchnia: ${prefs.kuchnia.join(", ")}.`);
    const gotMap = { szybko: "mało czasu na gotowanie — proste, szybkie dania (≤15 min)", srednio: "umiarkowany czas na gotowanie", lubie: "lubi gotować — dania mogą być bardziej złożone" };
    pr.push(`Gotowanie: ${gotMap[prefs.gotowanie] || gotMap.srednio}.`);
    const budMap = { niski: "budżet oszczędny — tanie, dostępne składniki", sredni: "budżet średni", dowolny: "budżet bez ograniczeń" };
    pr.push(`Budżet: ${budMap[prefs.budzet] || budMap.sredni}.`);
    if (prefs.uwagi?.trim()) pr.push(`Dodatkowe uwagi użytkownika: ${prefs.uwagi.trim()}.`);
    if (prefs.zdrowie?.trim()) pr.push(`WAŻNE — schorzenia/leki wpływające na dietę: ${prefs.zdrowie.trim()}. Dobierz posiłki bezpiecznie pod ten kontekst (np. niski indeks glikemiczny przy cukrzycy/insulinooporności, łagodne przy refluksie), ale NIE diagnozuj ani nie zalecaj leczenia — przy wątpliwościach odeślij do lekarza/dietetyka.`);
    if (prefs.celWagowy) {
      const celMap = { schudnac: "użytkownik chce schudnąć", utrzymac: "użytkownik chce utrzymać wagę", przytyc: "użytkownik chce przytyć / budować masę" };
      pr.push(`Cel wagowy: ${celMap[prefs.celWagowy]}${prefs.tempoZmiany?.trim() ? `, docelowe tempo: ${prefs.tempoZmiany.trim()}` : ""}. Dobierz bilans kaloryczny i makro pod ten cel (bezpiecznie, bez drastycznych deficytów/nadwyżek).`);
    }

    // plan treningowy — tylko jeśli user się zgodził
    const trSum = prefs.useTrening ? treningSummary(p) : null;
    const trening = trSum
      ? `Uwzględnij plan treningowy: ${trSum}. W dni z mocnym/długim treningiem dołóż węglowodanów i zaplanuj posiłek/przekąskę około treningu.`
      : "Planu treningowego nie uwzględniaj.";

    const baza = `Dane: waga ${p.weight || "?"} kg, wzrost ${p.height || "?"} cm, wiek ${p.age || "?"}, płeć ${p.sex === "k" ? "kobieta" : p.sex === "m" ? "mężczyzna" : "?"}. Cel diety: ${celOpis}. Cel kaloryczny ~${kcalGoal || 2200} kcal/dzień. Pobudka ${wakeTime}, sen ${sleepTime}. ${ileMin} ${pr.join(" ")} ${trening}`;
    const sys = `Jesteś dietetykiem sportowym dla biegacza, mówisz po polsku. Układasz jadłospis dzień po dniu.
Sam dobierasz godziny posiłków w oknie pobudka→sen (pole "czas" w formacie HH:MM). Trzymaj dzienne kcal blisko celu i rozkład makro pod cel diety. Bezwzględnie respektuj listę produktów do unikania. Potrawy realne, dostępne w PL/DE.
Odpowiedz WYŁĄCZNIE jednym blokiem JSON, bez żadnego tekstu poza nim, bez markdown:
<DZIEN>{"posilki":[{"czas":"HH:MM","nazwa":"…","opis":"składniki i porcje","kcal":N,"bialko":N,"tluszcz":N,"wegle":N}]}</DZIEN>`;

    const naGemini = getProvider() === "gemini";
    const dni = [];
    // Wracamy do sprawdzonej wersji: sekwencyjnie, 1 zapytanie na dzień, krótki prompt.
    // Dedupe ograniczamy do 2 ostatnich dni — krótszy prompt = mniej tokenów = mniejsze ryzyko
    // ucięcia i limitu (to było najszybsze i najstabilniejsze, zwłaszcza na darmowym Gemini).
    // Jedyne ulepszenie: 1 powtórka przy błędzie i POMINIĘCIE nieudanego dnia zamiast twardego
    // stopu — żeby jeden feler nie ucinał całego tygodnia. Limit dzienny (rateday) przerywa od razu.
    const ulozDzien = async (d) => {
      const uzyte = dni.slice(-2).flatMap((x) => x.posilki.map((po) => po.nazwa)).join("; ");
      const usr = `${baza}
Ułóż ${DOW_PL[d]} (dzień ${d + 1} z 7).${uzyte ? ` NIE POWTARZAJ tych dań z ostatnich dni: ${uzyte}. Zaproponuj inne potrawy — tydzień ma być urozmaicony.` : ""} Zwróć sam blok <DZIEN>.`;
      let ostatniBlad = null;
      for (let proba = 0; proba < 2; proba++) {
        try {
          const out = await callClaude({ model: "claude-sonnet-4-6", max_tokens: 1200, system: sys + langDirective(langOf(p)), messages: [{ role: "user", content: usr }] });
          const j = wyciagnijDzien(out);
          const posilki = (j.posilki || []).map((po) => ({
            czas: String(po.czas || "").slice(0, 5), nazwa: String(po.nazwa || "Posiłek"), opis: String(po.opis || ""),
            kcal: +po.kcal || 0, bialko: +po.bialko || 0, tluszcz: +po.tluszcz || 0, wegle: +po.wegle || 0,
          })).sort((a, b) => (a.czas || "").localeCompare(b.czas || ""));
          if (!posilki.length) throw new Error("empty");
          return posilki;
        } catch (e) {
          ostatniBlad = e;
          if (e && e.message === "rateday") break; // limit dzienny nie minie
          if (proba === 0) await new Promise((r) => setTimeout(r, naGemini ? 4000 : 1200));
        }
      }
      throw ostatniBlad || new Error("parse");
    };
    let bladDni = null;
    for (let d = 0; d < 7 && !bladDni; d++) {
      setPlanErr(`${tx("Układam jadłospis…")} ${d + 1}/7`);
      try {
        dni.push({ dzien: d, posilki: await ulozDzien(d) });
      } catch (e) {
        // limit dzienny ucina cały proces; pojedynczy parse/rate-fail tylko pomijamy
        if (e && e.message === "rateday") bladDni = e;
      }
    }
    if (!dni.length && !bladDni) bladDni = new Error("parse");
    dni.sort((a, b) => a.dzien - b.dzien);
    if (dni.length === 7 && !bladDni) {
      setProfile({ ...p, mealPlan: { generatedAt: new Date().toISOString(), kcalGoal: kcalGoal || null, dietMode: p.dietMode || "utrzymanie", dni, opis: "" }, mealChecks: {} });
      setPlanErr("");
    } else if (dni.length >= 1) {
      refundCredit && refundCredit("rozmowa");
      setProfile({ ...p, mealPlan: { generatedAt: new Date().toISOString(), kcalGoal: kcalGoal || null, dietMode: p.dietMode || "utrzymanie", dni, opis: "" }, mealChecks: {} });
      const ogon = bladDni && bladDni.message === "rateday" ? " " + aiErr(bladDni) : "";
      setPlanErr(`${tx("Udało się ułożyć")} ${dni.length}/7 ${tx("dni — dotknij „Nowy jadłospis”, by dokończyć resztę.")}${ogon}`);
    } else {
      refundCredit && refundCredit("rozmowa");
      const e = bladDni || new Error("parse");
      setPlanErr(typeof e?.message === "string" && (e.message === "parse" || e.message === "empty") ? tx("Nie udało się ułożyć jadłospisu — spróbuj jeszcze raz.") : aiErr(e));
    }
    setPlanBusy(false);
  };

  const upd = (patch) => setProfile({ ...p, ...patch });

  const dictate = () => {
    const r = makeRecognizer((txt) => setText((t) => (t + " " + txt).trim()));
    if (!r) { alert(tx("Dyktowanie niedostępne w tej przeglądarce. Wpisz ręcznie.")); return; }
    setRecOn(true); r.onend = () => setRecOn(false);
    try { r.start(); } catch { setRecOn(false); }
  };

  const pickPhoto = (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => setImg({ data: String(reader.result).split(",")[1], mime: f.type });
    reader.readAsDataURL(f);
  };

  const analyze = async () => {
    if (busy) return;
    if (mode === "text" && !text.trim()) return;
    if (mode === "photo" && !img) return;

    // 1) TEKST: spróbuj policzyć lokalnie z bazy — bez AI
    if (mode === "text") {
      const lok = liczLokalnie(text);
      if (lok) {
        setProfile({ ...p, meals: [...(p.meals || []), lok.meal] });
        setAdvice(lok.opis);
        setText("");
        return; // gotowe, zero zapytań do AI
      }
    }

    // 2) inaczej (zdjęcie albo nieznany tekst) → AI
    const rodzaj = mode === "photo" ? "zdjecie" : "rozmowa";
    if (useCredit && !useCredit(rodzaj)) {
      setAdvice(mode === "photo"
        ? tx("Skończyły się kredyty na analizę zdjęć 📷 Wykup wyższy plan, żeby analizować posiłki ze zdjęć.")
        : tx("Skończyły się kredyty AI 💬 Możesz wpisać znane produkty (np. 2 jajka, banan) — policzę je bez AI, albo wykup wyższy plan."));
      return;
    }
    setBusy(true);
    const sys = `Jesteś dietetykiem sportowym. Mówisz po polsku. Oszacuj wartości posiłku. Odpowiedz NAJPIERW krótkim zdaniem opisu, a na końcu DOKŁADNIE jeden blok:
<POSILEK>{"nazwa":"krótka nazwa","kcal":N,"bialko":N,"tluszcz":N,"wegle":N}</POSILEK>
Wartości to liczby (gramy makro, kcal całość). Jeśli to zdjęcie — rozpoznaj dania i oszacuj porcje. Zaznacz w opisie, że to szacunek.`;
    const content = [];
    if (mode === "photo" && img) content.push({ type: "image", source: { type: "base64", media_type: img.mime, data: img.data } });
    content.push({ type: "text", text: mode === "photo" ? "Co jest na zdjęciu i ile to ma kcal oraz makro?" : `Posiłek: ${text}` });
    try {
      let out = await callClaude({ model: "claude-sonnet-4-6", max_tokens: 700, system: sys + langDirective(langOf(p)), messages: [{ role: "user", content }] });
      const m = out.match(/<POSILEK>([\s\S]*?)<\/POSILEK>/);
      if (m) {
        try {
          const j = JSON.parse(m[1].trim());
          const meal = { date: new Date().toISOString(), nazwa: j.nazwa || tx("Posiłek"), kcal: +j.kcal || 0, protein: +j.bialko || 0, fat: +j.tluszcz || 0, carbs: +j.wegle || 0 };
          setProfile({ ...p, meals: [...(p.meals || []), meal] });
        } catch { /* ignore */ }
        out = out.replace(/<POSILEK>[\s\S]*?<\/POSILEK>/, "").trim();
      }
      setAdvice(out || tx("Dodano posiłek."));
      setText(""); setImg(null);
    } catch (e) {
      refundCredit && refundCredit(rodzaj);
      setAdvice(aiErr(e));
    } finally { setBusy(false); }
  };

  const addWater = (ml) => setProfile({ ...p, water: [...(p.water || []), { date: new Date().toISOString(), ml }] });
  const delMeal = (idx) => {
    const all = [...(p.meals || [])];
    const target = meals[idx];
    const i = all.findIndex((m) => m.date === target.date && m.nazwa === target.nazwa);
    if (i >= 0) { all.splice(i, 1); setProfile({ ...p, meals: all }); }
  };

  const okolotreningowa = async () => {
    if (useCredit && !useCredit("rozmowa")) {
      setAdvice(tx("Skończyły się kredyty AI 💬 Wykup wyższy plan, żeby dostać poradę okołotreningową."));
      return;
    }
    setBusy(true);
    const planTr = p.plan?.treningi?.length ? `Plan zawiera ${p.plan.treningi.length} treningów.` : "Brak planu.";
    const sys = `Jesteś dietetykiem sportowym, mówisz po polsku, zwięźle (4-6 zdań, bez list). Doradź odżywianie OKOŁOTRENINGOWE.`;
    const usr = `Waga ${p.weight || "?"} kg, cel diety: ${p.dietMode || "utrzymanie"}. Dziś zjedzone ${eaten} kcal z celu ${kcalGoal || "?"}, białko ${eatenP}/${macros?.protein || "?"} g. Trening dziś: ${trainedToday ? "tak, spalone " + burnedToday + " kcal" : "jeszcze nie"}. ${planTr} Co zjeść przed i po treningu, żeby dobrze się odżywić pod bieganie?`;
    try {
      setAdvice(await callClaude({ model: "claude-sonnet-4-6", max_tokens: 500, system: sys + langDirective(langOf(p)), messages: [{ role: "user", content: usr }] }));
    } catch (e) { refundCredit && refundCredit("rozmowa"); setAdvice(aiErr(e)); }
    finally { setBusy(false); }
  };

  const needBody = !p.weight || !p.height || !p.age;

  return (
    <div>
      <h2 style={{ fontSize: 20, fontWeight: 800 }}>{tx("Asystent diety")}</h2>

      {needBody && (
        <div style={{ background: C.surface, border: `1px dashed ${C.line}`, borderRadius: 12, padding: 14, margin: "12px 0", fontSize: 13, color: C.sub, lineHeight: 1.5 }}>
          {tx("Uzupełnij wagę, wzrost i wiek w „Sylwetka i pomiary”, żebym policzył Twoje zapotrzebowanie i deficyt.")}
        </div>
      )}

      {/* ── DIETETYK: JADŁOSPIS NA TYDZIEŃ ── */}
      <div style={{ background: C.surface2, border: `1px solid #FF97AC`, borderRadius: 16, padding: 16, margin: "12px 0" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontSize: 14, fontWeight: 800, color: "#FF97AC" }}>{tx("Jadłospis na tydzień")}</span>
          <button onClick={() => setAnkietaOtw((v) => !v)} style={{ fontSize: 12, fontWeight: 700, color: C.cool, background: "transparent", border: "none", cursor: "pointer" }}>
            {ankietaOtw ? tx("Zamknij") : tx("📋 Ankieta dietetyczna")}
          </button>
        </div>

        {ankietaOtw && (
          <div style={{ marginTop: 10, background: C.surface, borderRadius: 12, padding: 14 }}>
            {/* okno dnia */}
            <div style={{ fontSize: 12, color: C.sub, fontWeight: 700, marginBottom: 6 }}>{tx("Twój dzień")}</div>
            <div style={{ display: "flex", gap: 14, marginBottom: 14 }}>
              <label style={{ fontSize: 13 }}>{tx("Pobudka")}<br /><input type="time" value={wakeTime} onChange={(e) => setWake(e.target.value)} style={{ ...smallInp, width: 120, marginTop: 4 }} /></label>
              <label style={{ fontSize: 13 }}>{tx("Sen")}<br /><input type="time" value={sleepTime} onChange={(e) => setSleep(e.target.value)} style={{ ...smallInp, width: 120, marginTop: 4 }} /></label>
            </div>

            {/* liczba posiłków: auto + wybór */}
            <div style={{ fontSize: 12, color: C.sub, fontWeight: 700, marginBottom: 6 }}>{tx("Liczba posiłków")}</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 14 }}>
              {[["auto", tx("Doradź mi (AI)")], ["3", "3"], ["4", "4"], ["5", "5"], ["6", "6"]].map(([k, l]) => {
                const on = String(mealsPerDay) === k;
                return <button key={k} onClick={() => setMeals(k === "auto" ? "auto" : +k)} style={{ padding: "8px 12px", borderRadius: 20, fontSize: 12, fontWeight: 700, cursor: "pointer", border: `1px solid ${on ? "#FF97AC" : C.line}`, background: on ? "#FF97AC22" : "transparent", color: on ? "#FF97AC" : C.sub }}>{l}</button>;
              })}
            </div>

            {/* czego nie jem */}
            <div style={{ fontSize: 12, color: C.sub, fontWeight: 700, marginBottom: 6 }}>{tx("Czego nie jadasz / alergie")}</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 14 }}>
              {DIET_UNIKAM.map((u) => {
                const on = (prefs.unikam || []).includes(u);
                return <button key={u} onClick={() => togglePref("unikam", u)} style={{ padding: "7px 11px", borderRadius: 20, fontSize: 12, fontWeight: 700, cursor: "pointer", border: `1px solid ${on ? C.warn : C.line}`, background: on ? C.warn + "22" : "transparent", color: on ? C.warn : C.sub }}>{on ? "✕ " : ""}{tx(u)}</button>;
              })}
            </div>

            {/* kuchnia */}
            <div style={{ fontSize: 12, color: C.sub, fontWeight: 700, marginBottom: 6 }}>{tx("Ulubiona kuchnia")}</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 14 }}>
              {DIET_KUCHNIE.map((k) => {
                const on = (prefs.kuchnia || []).includes(k);
                return <button key={k} onClick={() => togglePref("kuchnia", k)} style={{ padding: "7px 11px", borderRadius: 20, fontSize: 12, fontWeight: 700, cursor: "pointer", border: `1px solid ${on ? "#FF97AC" : C.line}`, background: on ? "#FF97AC22" : "transparent", color: on ? "#FF97AC" : C.sub }}>{tx(k)}</button>;
              })}
            </div>

            {/* gotowanie */}
            <div style={{ fontSize: 12, color: C.sub, fontWeight: 700, marginBottom: 6 }}>{tx("Ile czasu na gotowanie")}</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 14 }}>
              {DIET_GOTOWANIE.map(([k, l]) => {
                const on = (prefs.gotowanie || "srednio") === k;
                return <button key={k} onClick={() => updPrefs({ gotowanie: k })} style={{ padding: "7px 11px", borderRadius: 20, fontSize: 12, fontWeight: 700, cursor: "pointer", border: `1px solid ${on ? "#FF97AC" : C.line}`, background: on ? "#FF97AC22" : "transparent", color: on ? "#FF97AC" : C.sub }}>{tx(l)}</button>;
              })}

      </p>
    </div>
  );

const Macro = ({ label, eaten, goal, c }) => (
  <div style={{ flex: 1, background: C.surface, borderRadius: 10, padding: "8px 6px", textAlign: "center" }}>
    <div style={{ fontSize: 14, fontWeight: 800, color: c }}>{eaten}<span style={{ fontSize: 10, color: C.sub, fontWeight: 500 }}>/{goal}{tx("g")}</span></div>
    <div style={{ fontSize: 10, color: C.sub, marginTop: 1 }}>{label}</div>
  </div>
);

/* ── HISTORIA ─────────────────────────────────────────────── */
/* ── Import GPX (wczytanie cudzej/własnej trasy z pliku) ──── */
function parseGPX(text) {
  try {
    const doc = new DOMParser().parseFromString(text, "application/xml");
    const pts = [...doc.getElementsByTagName("trkpt"), ...doc.getElementsByTagName("rtept"), ...doc.getElementsByTagName("wpt")];
    const track = pts.map((p) => ({
      lat: parseFloat(p.getAttribute("lat")),
      lng: parseFloat(p.getAttribute("lon")),
      alt: p.getElementsByTagName("ele")[0] ? parseFloat(p.getElementsByTagName("ele")[0].textContent) : null,
    })).filter((p) => !isNaN(p.lat) && !isNaN(p.lng));
    const nazwa = doc.getElementsByTagName("name")[0]?.textContent?.trim() || null;
    return { track, nazwa };
  } catch { return { track: [], nazwa: null }; }
}

/* ── REKORDY / ŻYCIÓWKI ───────────────────────────────────────
   Liczone z historii biegów. Dystansowe PR (1/5/10 km, półmaraton)
   szacujemy z najlepszego tempa wśród biegów, które osiągnęły dany
   dystans (dokładny split nie zawsze jest zapisany — oznaczamy "~").
─────────────────────────────────────────────────────────────*/
// ── WYNIK FORMY 0–100 ──────────────────────────────────────
// Algorytm: VO₂max 30% · tętno spocz. 25% · regularność 25% · realizacja planu 20%.
// Komponenty bez danych są pomijane, a wagi pozostałych proporcjonalnie skalowane.
/* ══════════════════════════════════════════════════════════════════════════
   SILNIK ANALIZY OBCIĄŻENIA TRENINGOWEGO I ADAPTACJI
   Zgodny ze specyfikacją "ANALIZA OBCIĄŻENIA TRENINGOWEGO".
   Kod liczy twarde wskaźniki lokalnie; AI dostaje je gotowe i interpretuje.
   Zasady: nie oceniaj pojedynczego treningu; patrz na trendy 7 / 28–42 dni;
   nie diagnozuj chorób; priorytet danych = wyniki > tempo > HR z pasa > historia.
   ══════════════════════════════════════════════════════════════════════════ */

// — pomocnicze —
function _dni(h) { return h.data ? (Date.now() - new Date(h.data).getTime()) / 86400000 : 1e9; }
function _min(h) { return h.czas ? h.czas / 60 : (h.minuty || (h.dystans ? h.dystans * 6 : 0)); }
function _clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

/* TRIMP (Banister, wariant wykładniczy Edwardsa/Morton).
   Wymaga avgHR + restHR + HRmax. Gdy brak HR → fallback na RPE×czas (sesyjny TL).
   Zwraca obciążenie pojedynczej jednostki. */
function trimpSesji(h, restHR, hrMax, sex) {
  const min = _min(h);
  if (!min) return 0;
  if (h.avgHR && restHR && hrMax && hrMax > restHR) {
    const hrr = _clamp((h.avgHR - restHR) / (hrMax - restHR), 0, 1);
    const k = sex === "k" ? 1.67 : 1.92;
    return Math.round(min * hrr * 0.64 * Math.exp(k * hrr));
  }
  // fallback: sesyjny RPE (1–10). samopoczucie nie jest RPE, więc szacujemy
  // wysiłek z typu jednostki, gdy brak realnego RPE.
  const rpe = h.rpe || (/(interwa|mocno|tempo|prog)/i.test(h.typ || "") ? 7 : /(siłow|silow)/i.test(h.typ || "") ? 6 : 4);
  return Math.round(min * rpe);
}

/* CTL / ATL / TSB — model PMC (Performance Management Chart).
   CTL = średnia wykładnicza obciążenia z 42 dni (chroniczne; "forma bazowa"),
   ATL = z 7 dni (ostre; "zmęczenie"), TSB = CTL−ATL (gotowość/świeżość). */
function liczPMC(history, restHR, hrMax, sex) {
  if (!history.length) return { ctl: 0, atl: 0, tsb: 0, seria: [] };
  const dni = {};
  history.forEach((h) => {
    if (!h.data) return;
    const key = Math.floor(_dni(h));
    dni[key] = (dni[key] || 0) + trimpSesji(h, restHR, hrMax, sex);
  });
  const kCtl = 2 / (42 + 1), kAtl = 2 / (7 + 1);
  let ctl = 0, atl = 0; const seria = [];
  for (let d = 60; d >= 0; d--) {
    const load = dni[d] || 0;
    ctl = ctl + (load - ctl) * kCtl;
    atl = atl + (load - atl) * kAtl;
    if (d <= 28) seria.push({ d, ctl: Math.round(ctl), atl: Math.round(atl), tsb: Math.round(ctl - atl) });
  }
  return { ctl: Math.round(ctl), atl: Math.round(atl), tsb: Math.round(ctl - atl), seria };
}

/* ACWR — Acute:Chronic Workload Ratio (okno 7d / średnia 28d).
   Strefa bezpieczna 0.8–1.3; >1.5 = wyraźnie podwyższone ryzyko kontuzji. */
function liczACWR(history, restHR, hrMax, sex) {
  let ostre = 0, chron = 0;
  history.forEach((h) => {
    const d = _dni(h), tl = trimpSesji(h, restHR, hrMax, sex);
    if (d < 7) ostre += tl;
    if (d < 28) chron += tl;
  });
  const chronTyg = chron / 4;
  const acwr = chronTyg > 0 ? ostre / chronTyg : null;
  return { acwr: acwr != null ? +acwr.toFixed(2) : null, ostre: Math.round(ostre), chronTyg: Math.round(chronTyg) };
}

/* Monotonia i Strain (Foster). Monotonia = średnie dzienne obciążenie / odch.std
   (z 7 dni). Wysoka monotonia + duży strain = ryzyko przeciążenia. */
function liczMonotonia(history, restHR, hrMax, sex) {
  const dni = [0, 0, 0, 0, 0, 0, 0];
  history.forEach((h) => { const d = Math.floor(_dni(h)); if (d < 7) dni[d] += trimpSesji(h, restHR, hrMax, sex); });
  const sredn = dni.reduce((a, b) => a + b, 0) / 7;
  if (sredn === 0) return { monotonia: null, strain: null };
  const war = dni.reduce((a, b) => a + (b - sredn) ** 2, 0) / 7;
  const sd = Math.sqrt(war) || 0.0001;
  const monotonia = +(sredn / sd).toFixed(2);
  const tyg = dni.reduce((a, b) => a + b, 0);
  return { monotonia, strain: Math.round(tyg * monotonia) };
}

/* Ekonomia biegu — porównanie dwóch okresów: tempo przy zbliżonym HR.
   Szybciej przy tym samym HR (lub to samo tempo przy niższym HR) = poprawa. */
function liczEkonomia(history) {
  const biegi = history.filter((h) => h.tempo && h.avgHR && h.dystans >= 2).sort((a, b) => _dni(a) - _dni(b));
  if (biegi.length < 4) return { kierunek: null, opis: "za mało danych (potrzeba ≥4 biegi z HR)" };
  const teraz = biegi.filter((h) => _dni(h) <= 28), wcze = biegi.filter((h) => _dni(h) > 28 && _dni(h) <= 56);
  if (teraz.length < 2 || wcze.length < 2) return { kierunek: null, opis: "za krótka historia (potrzeba 2 okresów po ≥2 biegi)" };
  const sr = (arr, f) => arr.reduce((a, b) => a + f(b), 0) / arr.length;
  const tNow = sr(teraz, (h) => h.tempo), hrNow = sr(teraz, (h) => h.avgHR);
  const tOld = sr(wcze, (h) => h.tempo), hrOld = sr(wcze, (h) => h.avgHR);
  // indeks ekonomii: m/uderzenie ~ (1/tempo)/HR; rośnie = lepiej
  const ekoNow = (1 / tNow) / hrNow, ekoOld = (1 / tOld) / hrOld;
  const zmiana = ((ekoNow - ekoOld) / ekoOld) * 100;
  let kierunek = "stabilna";
  if (zmiana > 3) kierunek = "poprawa";
  else if (zmiana < -3) kierunek = "spadek";
  return { kierunek, zmianaPct: +zmiana.toFixed(1), tempoNow: tNow, tempoOld: tOld, hrNow: Math.round(hrNow), hrOld: Math.round(hrOld) };
}

/* Rozkład stref (80/20) — udział łatwych jednostek (Z1–Z2) vs jakościowych.
   Bazuje na avgHR względem progu ~80% HRmax, a gdy brak HR — na typie. */
function liczRozkladStref(history, hrMax) {
  const ost = history.filter((h) => _dni(h) <= 28);
  if (!ost.length) return { latwe: null, jakosc: null, udzialLatwych: null };
  let latwe = 0, jakosc = 0;
  ost.forEach((h) => {
    let twarde;
    if (h.avgHR && hrMax) twarde = h.avgHR >= 0.81 * hrMax;
    else twarde = /(interwa|mocno|tempo|prog|5\s?km|cooper)/i.test(h.typ || "");
    if (twarde) jakosc++; else latwe++;
  });
  const total = latwe + jakosc;
  return { latwe, jakosc, udzialLatwych: total ? Math.round((latwe / total) * 100) : null };
}

/* Trend wydolności: ostatnie 28 dni vs poprzednie 28 — km, tempo, HR, TRIMP. */
function liczTrend28(history, restHR, hrMax, sex) {
  const okno = (od, doD) => history.filter((h) => { const d = _dni(h); return d >= od && d < doD; });
  const A = okno(0, 28), B = okno(28, 56);
  const sum = (arr, f) => arr.reduce((a, h) => a + (f(h) || 0), 0);
  const sr = (arr, f) => { const v = arr.filter((h) => f(h)); return v.length ? sum(v, f) / v.length : null; };
  const kmA = sum(A, (h) => h.dystans), kmB = sum(B, (h) => h.dystans);
  const tlA = sum(A, (h) => trimpSesji(h, restHR, hrMax, sex)), tlB = sum(B, (h) => trimpSesji(h, restHR, hrMax, sex));
  const tempoA = sr(A, (h) => h.tempo), tempoB = sr(B, (h) => h.tempo);
  let kierunek = "🟡 stabilizacja";
  const lepszeTempo = tempoA && tempoB && tempoA < tempoB - 2;
  const gorszeTempo = tempoA && tempoB && tempoA > tempoB + 4;
  if ((kmA > kmB * 1.05 || lepszeTempo) && !gorszeTempo) kierunek = "🟢 rozwój formy";
  else if (gorszeTempo || kmA < kmB * 0.8) kierunek = "🔴 spadek wydolności";
  return { kierunek, kmA: Math.round(kmA), kmB: Math.round(kmB), tlA: Math.round(tlA), tlB: Math.round(tlB), tempoA, tempoB };
}

/* Gotowość — z danych regeneracyjnych: TSB, trend HR spocz., samopoczucie, sen.
   Nie decyduj na podstawie jednego parametru — wymagamy zbieżności kilku. */
function liczGotowosc(profile, pmc, restTrend) {
  const sygnaly = [];
  if (pmc.tsb <= -20) sygnaly.push("duże zmęczenie (TSB " + pmc.tsb + ")");
  else if (pmc.tsb >= 10) sygnaly.push("świeżość (TSB +" + pmc.tsb + ")");
  if (restTrend === "up") sygnaly.push("tętno spoczynkowe rośnie");
  const m = (profile?.measurements || []);
  const ostMood = profile?.assessment?.samopoczucie;
  let poziom = "🟡 trening kontrolowany";
  if (pmc.tsb >= 5 && restTrend !== "up") poziom = "🟢 gotowy do mocnego bodźca";
  else if (pmc.tsb <= -25 || (pmc.tsb <= -15 && restTrend === "up")) poziom = "🔴 priorytet regeneracji";
  return { poziom, sygnaly };
}

/* Ryzyko kontuzji — łączy ACWR, monotonię, skok km, udział jakości. */
function liczRyzyko(acwr, mono, trend, rozklad) {
  let pkt = 0; const why = [];
  if (acwr.acwr != null) { if (acwr.acwr > 1.5) { pkt += 2; why.push("ACWR " + acwr.acwr + " (skok obciążenia)"); } else if (acwr.acwr > 1.3) { pkt += 1; why.push("ACWR " + acwr.acwr + " — górna granica"); } }
  if (mono.monotonia != null && mono.monotonia > 2) { pkt += 1; why.push("wysoka monotonia " + mono.monotonia); }
  if (trend.kmB > 0 && trend.kmA > trend.kmB * 1.3) { pkt += 1; why.push("km +" + Math.round((trend.kmA / trend.kmB - 1) * 100) + "% m/m"); }
  if (rozklad.udzialLatwych != null && rozklad.udzialLatwych < 60) { pkt += 1; why.push("za mało spokojnych biegów (" + rozklad.udzialLatwych + "% łatwych)"); }
  const poziom = pkt >= 3 ? "🔴 wysokie" : pkt >= 1 ? "🟡 podwyższone" : "🟢 niskie";
  return { poziom, pkt, why };
}

/* Prognoza wyników z najlepszego realnego tempa (Riegel, wykł. 1.06). */
function liczPrognoze(history) {
  const zTempem = history.filter((h) => h.tempo && h.dystans >= 1.5);
  if (!zTempem.length) return null;
  const ref = zTempem.reduce((a, b) => (b.tempo < a.tempo ? b : a));
  const tSek = ref.tempo * ref.dystans, dRef = ref.dystans;
  const riegel = (cel) => { const t = tSek * Math.pow(cel / dRef, 1.06); return Math.round(t); };
  return { ref: { dystans: dRef, tempo: ref.tempo }, p5: riegel(5), p10: riegel(10), pHM: riegel(21.097), pM: riegel(42.195) };
}

/* GŁÓWNA funkcja — zachowuje stare pola (score/trend/hasData/km7/km14/
   przemeczenie…) dla zgodności UI, i dokłada pełną analizę .analiza. */
function liczForma(profile, history) {
  const p = profile || {};
  const teraz = Date.now();
  const clamp = (v) => Math.max(0, Math.min(100, v));
  const hist = (history || []).filter(Boolean);

  // dane referencyjne
  const restPom = (p.measurements || []).filter((m) => m.restHR);
  const rest = restPom.length ? restPom[restPom.length - 1].restHR : (p.restHR || null);
  const age = p.age || p.assessment?.wiek || 30;
  const hrMax = Math.round(208 - 0.7 * age);
  const sex = p.sex === "k" ? "k" : "m";

  // ── wskaźniki obciążenia ──
  const pmc = liczPMC(hist, rest, hrMax, sex);
  const acwr = liczACWR(hist, rest, hrMax, sex);
  const mono = liczMonotonia(hist, rest, hrMax, sex);
  const eko = liczEkonomia(hist);
  const rozklad = liczRozkladStref(hist, hrMax);
  const trend28 = liczTrend28(hist, rest, hrMax, sex);
  const prognoza = liczPrognoze(hist);

  // trend tętna spoczynkowego (ostatni vs poprzedni)
  let restTrend = "flat", restJump = null;
  if (restPom.length >= 2) {
    const a = restPom[restPom.length - 2].restHR, b = restPom[restPom.length - 1].restHR;
    if (a > 0) restJump = (b - a) / a;
    if (b > a + 2) restTrend = "up"; else if (b < a - 2) restTrend = "down";
  }
  const gotowosc = liczGotowosc(p, pmc, restTrend);
  const ryzyko = liczRyzyko(acwr, mono, trend28, rozklad);

  // ── kompozyt "formy" 0–100 (zachowany dla widżetu), teraz z rozbiciem ──
  const komp = [];
  if (p.vo2max) komp.push({ k: "VO₂max", w: 30, v: clamp(((p.vo2max - 30) / 30) * 100) });
  if (rest) komp.push({ k: "Tętno spocz.", w: 25, v: clamp(((80 - rest) / 40) * 100) });
  const sesje14 = hist.filter((h) => _dni(h) < 14 && (h.dystans != null || /Trening/i.test(h.typ || ""))).length;
  const cel14 = Math.max(2, (p.assessment?.dniWTyg || 4) * 2);
  komp.push({ k: "Regularność", w: 25, v: clamp((sesje14 / cel14) * 100) });
  const tr = p.plan?.treningi;
  if (tr?.length) { const done = new Set((p.progress || []).map((x) => x.i)).size; komp.push({ k: "Realizacja planu", w: 20, v: clamp((done / tr.length) * 100) }); }
  const sumaW = komp.reduce((a, c) => a + c.w, 0) || 1;
  const score = Math.round(komp.reduce((a, c) => a + c.v * c.w, 0) / sumaW);
  const rozbicie = komp.map((c) => ({ k: c.k, v: Math.round(c.v), w: c.w }));

  const hasData = !!(p.vo2max || rest || hist.some((h) => h.dystans != null || /Trening/i.test(h.typ || "")));

  // stare pola (km7/km14/trend/przemeczenie) — zgodność wsteczna z UI
  const km7 = hist.filter((h) => _dni(h) < 7).reduce((a, h) => a + (h.dystans || 0), 0);
  const km14 = hist.filter((h) => { const d = _dni(h); return d >= 7 && d < 14; }).reduce((a, h) => a + (h.dystans || 0), 0);
  let trend = "→";
  if (km7 > km14 + 1 && restTrend !== "up") trend = "↑";
  else if (km7 < km14 - 2 || restTrend === "up") trend = "↓";
  const volJump = km14 > 0 ? (km7 - km14) / km14 : null;
  const przemeczenie = (restJump != null && restJump > 0.08) || (volJump != null && volJump > 0.15) || pmc.tsb <= -25;

  return {
    score, trend, hasData, km7, km14, kmDelta: km7 - km14, rest,
    przemeczenie, restJumpPct: restJump != null ? Math.round(restJump * 100) : null,
    volJumpPct: volJump != null ? Math.round(volJump * 100) : null,
    rozbicie,
    // pełna analiza zgodna z dokumentem (kod liczy → AI interpretuje)
    analiza: { pmc, acwr, mono, eko, rozklad, trend28, gotowosc, ryzyko, prognoza, hrMax, rest, restTrend, sex, age },
  };
}

/* Raport monitoringu (15 punktów) — gotowy tekst dla AI i dla ekranu Postęp.
   Buduje sekcje wyłącznie z policzonych wskaźników; nic nie zmyśla. */
function raportMonitoringu(profile, history) {
  const f = liczForma(profile, history);
  if (!f.hasData) return null;
  const a = f.analiza;
  const fmtT = (s) => s == null ? "—" : `${Math.floor(s / 60)}:${String(Math.round(s % 60)).padStart(2, "0")}`;
  const L = [];
  L.push(`1. Poziom formy: ${f.score}/100 (CTL ${a.pmc.ctl}).`);
  L.push(`2. Trend wydolności (28d vs 28d): ${a.trend28.kierunek}.`);
  L.push(`3. Trend tempa: ${a.trend28.tempoA ? fmtT(a.trend28.tempoA) + "/km" : "—"} vs ${a.trend28.tempoB ? fmtT(a.trend28.tempoB) + "/km" : "—"}.`);
  L.push(`4. Trend tętna spocz.: ${a.rest || "—"} bpm (${a.restTrend === "up" ? "rośnie ⚠" : a.restTrend === "down" ? "spada 🟢" : "stabilne"}).`);
  L.push(`5. Ekonomia biegu: ${a.eko.kierunek || "—"}${a.eko.zmianaPct != null ? ` (${a.eko.zmianaPct > 0 ? "+" : ""}${a.eko.zmianaPct}%)` : ` — ${a.eko.opis}`}.`);
  L.push(`6. Obciążenie (CTL/ATL/TSB): ${a.pmc.ctl}/${a.pmc.atl}/${a.pmc.tsb > 0 ? "+" : ""}${a.pmc.tsb}.`);
  L.push(`7. Krótkoterminowe (7d, ostre): ${a.acwr.ostre} TRIMP.`);
  L.push(`8. Długoterminowe (28d/tydz): ${a.acwr.chronTyg} TRIMP.`);
  L.push(`9. Ryzyko przeciążenia: ACWR ${a.acwr.acwr ?? "—"}, monotonia ${a.mono.monotonia ?? "—"}, strain ${a.mono.strain ?? "—"}.`);
  L.push(`10. Gotowość: ${a.gotowosc.poziom}${a.gotowosc.sygnaly.length ? " — " + a.gotowosc.sygnaly.join(", ") : ""}.`);
  L.push(`11. Regeneracja: TSB ${a.pmc.tsb > 0 ? "+" : ""}${a.pmc.tsb} (${a.pmc.tsb >= 5 ? "wypoczęty" : a.pmc.tsb <= -20 ? "głębokie zmęczenie" : "umiarkowane"}).`);
  L.push(`12. Wpływ masy ciała: ${profile?.weight ? profile.weight + " kg (uwzględnione w kcal i prognozie)" : "brak danych wagi"}.`);
  L.push(`13. Ryzyko kontuzji: ${a.ryzyko.poziom}${a.ryzyko.why.length ? " — " + a.ryzyko.why.join("; ") : ""}.`);
  L.push(`14. Rozkład 80/20: ${a.rozklad.udzialLatwych != null ? a.rozklad.udzialLatwych + "% łatwych / " + (100 - a.rozklad.udzialLatwych) + "% jakości" : "—"}.`);
  if (a.prognoza) L.push(`15. Prognoza: 5k ${fmtT(a.prognoza.p5)}, 10k ${fmtT(a.prognoza.p10)}, HM ${fmtT(a.prognoza.pHM)}, M ${fmtT(a.prognoza.pM)}.`);
  else L.push(`15. Prognoza: za mało danych biegowych.`);
  return L.join("\n");
}

/* Odznaki za kamienie milowe — liczone z historii i profilu. */
function liczOdznaki(history, profile) {
  const biegi = (history || []).filter((h) => h.dystans != null || /Trening|Diagnostyka|bieg/i.test(h.typ || ""));
  const liczBiegow = biegi.length;
  const kmRazem = (history || []).reduce((a, h) => a + (h.dystans || 0), 0);
  const maCooper = (history || []).some((h) => h.vo2max);
  const maTesty = !!profile?.testyWyniki;
  const maPlan = !!profile?.plan;
  const najdluzszy = Math.max(0, ...(history || []).map((h) => h.dystans || 0));
  const dni = new Set((history || []).filter((h) => h.dystans != null || /Trening/i.test(h.typ || "")).map((h) => new Date(h.data).toDateString()));
  let streak = 0; for (let i = 0; i < 60; i++) { const d = new Date(); d.setDate(d.getDate() - i); if (dni.has(d.toDateString())) streak++; else if (i > 0) break; }

  return [
    { ikona: "👟", nazwa: tx("Pierwszy bieg"), opis: tx("Zapisz swój pierwszy bieg"), zdobyta: liczBiegow >= 1, postep: `${Math.min(liczBiegow, 1)}/1` },
    { ikona: "🏅", nazwa: tx("5 biegów"), opis: tx("Ukończ 5 treningów"), zdobyta: liczBiegow >= 5, postep: `${Math.min(liczBiegow, 5)}/5` },
    { ikona: "🎖️", nazwa: tx("20 biegów"), opis: tx("Ukończ 20 treningów"), zdobyta: liczBiegow >= 20, postep: `${Math.min(liczBiegow, 20)}/20` },
    { ikona: "🛣️", nazwa: tx("50 km łącznie"), opis: tx("Przebiegnij 50 km w sumie"), zdobyta: kmRazem >= 50, postep: `${Math.min(Math.round(kmRazem), 50)}/50 km` },
    { ikona: "🗺️", nazwa: tx("200 km łącznie"), opis: tx("Przebiegnij 200 km w sumie"), zdobyta: kmRazem >= 200, postep: `${Math.min(Math.round(kmRazem), 200)}/200 km` },
    { ikona: "📏", nazwa: tx("Dystans 10 km"), opis: tx("Pojedynczy bieg min. 10 km"), zdobyta: najdluzszy >= 10, postep: `${najdluzszy.toFixed(1)}/10 km` },
    { ikona: "🔥", nazwa: tx("Seria 3 dni"), opis: tx("Trenuj 3 dni z rzędu"), zdobyta: streak >= 3, postep: `${Math.min(streak, 3)}/3` },
    { ikona: "⚡", nazwa: tx("Seria 7 dni"), opis: tx("Trenuj 7 dni z rzędu"), zdobyta: streak >= 7, postep: `${Math.min(streak, 7)}/7` },
    { ikona: "💪", nazwa: tx("Testy sprawności"), opis: tx("Zrób baterię testów siły"), zdobyta: maTesty, postep: maTesty ? "1/1" : "0/1" },
    { ikona: "⏱️", nazwa: tx("Test Coopera"), opis: tx("Wykonaj test Coopera"), zdobyta: maCooper, postep: maCooper ? "1/1" : "0/1" },
    { ikona: "📋", nazwa: tx("Plan gotowy"), opis: tx("Miej aktywny plan treningowy"), zdobyta: maPlan, postep: maPlan ? "1/1" : "0/1" },
  ];
}

function liczRekordy(history) {
  const biegi = history.filter((h) => h.dystans && h.dystans > 0);
  const r = {};
  // najszybsze tempo (s/km) — najlepsza "życiówka na kilometr"
  const zTempem = biegi.filter((h) => h.tempo && h.tempo > 0);
  if (zTempem.length) {
    const best = zTempem.reduce((a, b) => (b.tempo < a.tempo ? b : a));
    r.tempo = { val: fmt(best.tempo) + "/km", data: best.data, sub: `na ${best.dystans} km` };
  }
  // PR na dystans: najlepszy szacowany czas = tempo * dystansCelu, wśród biegów ≥ dystans
  const distPR = (km, label) => {
    const kand = zTempem.filter((h) => h.dystans >= km - 0.05);
    if (!kand.length) return;
    const best = kand.reduce((a, b) => (b.tempo < a.tempo ? b : a));
    const czas = Math.round(best.tempo * km);
    r[label] = { val: "~" + fmt(czas), data: best.data, sub: `tempo ${fmt(best.tempo)}/km` };
  };
  distPR(1, "1km"); distPR(5, "5km"); distPR(10, "10km"); distPR(21.097, "polmaraton");
  // najdłuższy bieg
  const najdluzszy = biegi.reduce((a, b) => (b.dystans > a.dystans ? b : a), biegi[0] || { dystans: 0 });
  if (najdluzszy?.dystans) r.dystans = { val: najdluzszy.dystans + " km", data: najdluzszy.data, sub: najdluzszy.czas ? fmt(najdluzszy.czas) : "" };
  // najdłuższy czas pojedynczego biegu
  const najdluzszyCzas = biegi.filter((h) => h.czas).reduce((a, b) => (!a || b.czas > a.czas ? b : a), null);
  if (najdluzszyCzas) r.czas = { val: fmt(najdluzszyCzas.czas), data: najdluzszyCzas.data, sub: `${najdluzszyCzas.dystans} km` };
  // najlepsze VO2max
  const zVO2 = history.filter((h) => h.vo2max);
  if (zVO2.length) { const best = zVO2.reduce((a, b) => (b.vo2max > a.vo2max ? b : a)); r.vo2 = { val: best.vo2max, data: best.data, sub: "VO₂max" }; }
  return r;
}
function Rekordy({ history, profile }) {
  const r = useMemo(() => liczRekordy(history), [history]);
  // najniższe tętno spoczynkowe z pomiarów
  const pomiary = (profile?.measurements || []).filter((m) => m.restHR);
  const minRest = pomiary.length ? pomiary.reduce((a, b) => (b.restHR < a.restHR ? b : a)) : (profile?.restHR ? { restHR: profile.restHR, date: null } : null);

  const karty = [
    { key: "tempo", ikona: "⚡", label: "Najszybsze tempo", c: C.accent },
    { key: "1km", ikona: "🥇", label: tx("Życiówka 1 km"), c: "#F2B457" },
    { key: "5km", ikona: "5️⃣", label: tx("Życiówka 5 km"), c: C.cool },
    { key: "10km", ikona: "🔟", label: tx("Życiówka 10 km"), c: C.purple },
    { key: "polmaraton", ikona: "🏅", label: tx("Półmaraton"), c: "#FF97AC" },
    { key: "dystans", ikona: "📏", label: tx("Najdłuższy bieg"), c: "#4FD6A6" },
    { key: "czas", ikona: "⏱️", label: tx("Najdłuższy czas"), c: C.cool },
    { key: "vo2", ikona: "🫁", label: "Najlepsze VO₂max", c: C.accent },
  ];
  const maRekordy = Object.keys(r).length > 0 || minRest;

  return (
    <div>
      <h2 style={{ fontSize: 22, fontWeight: 800 }}>{tx("Rekordy i życiówki")}</h2>
      <p style={{ color: C.sub, fontSize: 13, lineHeight: 1.5 }}>{tx("Twoje najlepsze wyniki z zapisanych biegów. PR na dystans szacujemy z najlepszego tempa (~), gdy nie ma dokładnego splitu.")}</p>

      {!maRekordy ? (
        <div style={{ background: C.surface, border: `1px dashed ${C.line}`, borderRadius: 14, padding: 22, textAlign: "center", color: C.sub, fontSize: 13, marginTop: 16 }}>
          {tx("Brak rekordów. Ukończ pierwszy bieg z GPS, a życiówki pojawią się tutaj automatycznie.")}
        </div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 14 }}>
          {karty.filter((k) => r[k.key]).map((k) => (
            <div key={k.key} style={{ background: `linear-gradient(150deg, ${C.surface}, ${C.bg})`, border: `1px solid ${k.c}44`, borderRadius: 16, padding: 14 }}>
              <div style={{ fontSize: 20 }}>{k.ikona}</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: k.c, fontVariantNumeric: "tabular-nums", marginTop: 4 }}>{r[k.key].val}</div>
              <div style={{ fontSize: 12, fontWeight: 700, marginTop: 2 }}>{k.label}</div>
              <div style={{ fontSize: 11, color: C.sub, marginTop: 2 }}>
                {r[k.key].sub}{r[k.key].data ? ` · ${new Date(r[k.key].data).toLocaleDateString("pl-PL", { day: "numeric", month: "short", year: "2-digit" })}` : ""}
              </div>
            </div>
          ))}
          {minRest && (
            <div style={{ background: `linear-gradient(150deg, ${C.surface}, ${C.bg})`, border: `1px solid ${C.warn}44`, borderRadius: 16, padding: 14 }}>
              <div style={{ fontSize: 20 }}>❤️</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: C.warn, fontVariantNumeric: "tabular-nums", marginTop: 4 }}>{minRest.restHR}</div>
              <div style={{ fontSize: 12, fontWeight: 700, marginTop: 2 }}>{tx("Najniższe tętno spocz.")}</div>
              <div style={{ fontSize: 11, color: C.sub, marginTop: 2 }}>{tx("bpm")}{minRest.date ? ` · ${new Date(minRest.date).toLocaleDateString("pl-PL", { day: "numeric", month: "short" })}` : ""}</div>
            </div>
          )}
        </div>
      )}
      <p style={{ fontSize: 11, color: C.sub, marginTop: 14, lineHeight: 1.5 }}>{tx("Im niższe tętno spoczynkowe i lepsze VO₂max, tym wyższa forma. Dystansowe życiówki rosną, gdy biegasz dłużej i szybciej.")}</p>
    </div>
  );
}

function Historia({ history, removeHistory }) {
  const [openId, setOpenId] = useState(null);
  const [confirmId, setConfirmId] = useState(null); // id wpisu czekającego na potwierdzenie usunięcia
  if (!history.length)
    return <div style={{ textAlign: "center", padding: "50px 20px", color: C.sub }}>
      <div style={{ fontSize: 15, fontWeight: 700, color: C.ink }}>{tx("Pusto na razie")}</div>
      <p style={{ fontSize: 13, lineHeight: 1.6, marginTop: 8 }}>{tx("Ukończone rozgrzewki, rozciągania i testy pojawią się tutaj.")}</p>
    </div>;
  const totalKm = history.reduce((a, h) => a + (h.dystans || 0), 0);
  const runs = history.filter((h) => h.dystans).length;
  return (
    <div>
      <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
        <Box val={runs} unit="biegów z GPS" c={C.accent} />
        <Box val={totalKm.toFixed(1)} unit="km łącznie" c="#F2B457" />
        <Box val={history.length} unit="wszystkich sesji" c={C.cool} />
      </div>
      {history.map((h) => {
        const d = new Date(h.data);
        const hasTrack = h.track && h.track.length > 1;
        const open = openId === h.id;
        return (
          <div key={h.id} style={{ background: C.surface, border: `1px solid ${C.line}`, borderRadius: 12, padding: 14, marginBottom: 10 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div onClick={() => hasTrack && setOpenId(open ? null : h.id)} style={{ cursor: hasTrack ? "pointer" : "default", flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 15 }}>{h.typ}{hasTrack ? <span style={{ color: C.accent, fontSize: 12 }}> {tx("· mapa")} {open ? "▾" : "▸"}</span> : null}</div>
                <div style={{ fontSize: 12, color: C.sub, marginTop: 2 }}>
                  {d.toLocaleDateString("pl-PL", { day: "numeric", month: "short" })} · {d.toLocaleTimeString("pl-PL", { hour: "2-digit", minute: "2-digit" })}
                  {h.dystans ? ` · ${h.dystans} km` : ""}
                  {h.tempo ? ` · ${fmt(h.tempo)}/km` : ""}
                  {h.tetno ? ` · ${h.tetno} bpm` : ""}
                  {h.kcal ? ` · ${h.kcal} kcal` : ""}
                </div>
              </div>
              <span style={{ fontWeight: 800, fontSize: 16, color: C.accent, fontVariantNumeric: "tabular-nums", marginRight: 10 }}>{h.czas ? fmt(h.czas) : ""}</span>
              {removeHistory && (confirmId === h.id ? (
                <div style={{ display: "flex", gap: 6 }}>
                  <button onClick={() => { removeHistory(h.id); setConfirmId(null); }} style={{ padding: "6px 10px", borderRadius: 8, border: "none", background: C.warn, color: C.bg, fontWeight: 800, fontSize: 12, cursor: "pointer" }}>Usuń</button>
                  <button onClick={() => setConfirmId(null)} style={{ padding: "6px 10px", borderRadius: 8, border: `1px solid ${C.line}`, background: "transparent", color: C.sub, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Anuluj</button>
                </div>
              ) : (
                <button onClick={() => setConfirmId(h.id)} title="Usuń ten wpis — nie będzie brany pod uwagę przez trenera"
                  style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${C.line}`, background: "transparent", color: C.sub, fontSize: 14, cursor: "pointer", flexShrink: 0 }}>🗑</button>
              ))}
            </div>
            {open && hasTrack && (
              <div style={{ marginTop: 10 }}>
                <RouteMap track={h.track} color={C.accent} />
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

_root.render(React.createElement(AppWrapped));
