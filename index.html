/* ── KROK SIŁOWY: wybór miejsca → ćwiczenia z seriami ─────── */
function KrokSilowy({ step, onNext, hr, profile }) {
  const [place, setPlace] = useState(null);
  const [exIdx, setExIdx] = useState(0);
  const [setNo, setSetNo] = useState(1);
  const [resting, setResting] = useState(false);
  const [rest, setRest] = useState(0);
  const [pokazInst, setPokazInst] = useState(false);
  const restRef = useRef(null);
  const hrS = useRef([]);
  const sampleRef = useRef(null);
  const koniec = () => onNext(hrS.current.length ? { hrCheckpoints: hrS.current.slice() } : undefined);

  // próbkujemy tętno przez cały czas trwania części siłowej (gdy pas połączony)
  useEffect(() => {
    if (place) {
      sampleRef.current = setInterval(() => { if (hr?.bpm) hrS.current.push(hr.bpm); }, 1000);
    }
    return () => clearInterval(sampleRef.current);
  }, [place, hr]);

  useEffect(() => {
    if (resting) {
      restRef.current = setInterval(() => setRest((x) => { if (x <= 1) { clearInterval(restRef.current); setResting(false); speak("Koniec przerwy, kolejna seria."); return 0; } return x - 1; }), 1000);
    }
    return () => clearInterval(restRef.current);
  }, [resting]);

  // wybór miejsca
  if (!place) {
    return (
      <div>
        <div style={{ width: 30, height: 4, background: C.purple, borderRadius: 2, marginBottom: 12 }} />
        <h2 style={{ fontSize: 20, fontWeight: 800 }}>{tx("Trening siłowy — gdzie ćwiczysz?")}</h2>
        <p style={{ color: C.sub, fontSize: 13, lineHeight: 1.5 }}>{step.opis}</p>
        {Object.keys(SILA).map((k) => (
          <button key={k} onClick={() => setPlace(k)}
            style={{ width: "100%", textAlign: "left", background: C.surface, border: `1px solid ${C.line}`, borderRadius: 14, padding: 16, marginTop: 10, cursor: "pointer", color: C.ink }}>
            <div style={{ fontSize: 16, fontWeight: 800 }}>{SILA[k].label}</div>
            <div style={{ fontSize: 12, color: C.sub, marginTop: 3 }}>{SILA[k].desc}</div>
          </button>
        ))}
        <button onClick={koniec} style={{ ...ghost, marginTop: 12 }}>{tx("Pomiń część siłową")}</button>
      </div>
    );
  }

  const lista = SILA[place].cwiczenia;
  const ex = lista[exIdx];
  const lastEx = exIdx === lista.length - 1;
  const lastSet = setNo >= ex.serie;

  const doneSet = () => {
    if (lastSet) {
      if (lastEx) { koniec(); return; }
      setExIdx((i) => i + 1); setSetNo(1);
    } else {
      setSetNo((s) => s + 1);
    }
    setRest(60); setResting(true);
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
        {lista.map((_, i) => (
          <div key={i} style={{ flex: 1, height: 5, borderRadius: 3, background: i < exIdx ? "#4FD6A6" : i === exIdx ? C.purple : C.line }} />
        ))}
      </div>
      <div style={{ fontSize: 12, color: C.sub, marginBottom: 10 }}>{SILA[place].label} {tx("· ćwiczenie")} {exIdx + 1}/{lista.length}</div>

      <div style={{ background: C.surface, borderRadius: 20, padding: 10, aspectRatio: "1.4", marginBottom: 12, position: "relative" }}>
        <div style={{ width: "100%", height: "100%", transformOrigin: "center bottom", animation: !resting ? `${ANIM_EX[ex.kind] || "bob"} 1.6s ease-in-out infinite` : "none" }}>
          <Figure kind={ex.kind} color={C.purple} />
        </div>
        {!resting && <div style={{ position: "absolute", top: 10, right: 12, fontSize: 10, color: C.sub, fontWeight: 700, letterSpacing: 1, opacity: .7 }}>{tx("● RUCH")}</div>}
      </div>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, margin: "0 0 4px" }}>
        <h2 style={{ fontSize: 22, fontWeight: 800, textAlign: "center", margin: 0 }}>{ex.name}</h2>
        {INSTRUKCJE[ex.kind] && (
          <button onClick={() => setPokazInst(true)} title={tx("Jak wykonać")}
            style={{ width: 26, height: 26, borderRadius: 13, border: `1px solid ${C.accent}`, background: "transparent", color: C.accent, fontWeight: 800, fontSize: 14, cursor: "pointer", flexShrink: 0 }}>?</button>
        )}
      </div>
      <p style={{ color: C.sub, fontSize: 13, textAlign: "center", margin: "0 0 12px" }}>{ex.hint}</p>
      {pokazInst && <InstrukcjaModal inst={INSTRUKCJE[ex.kind]} onClose={() => setPokazInst(false)} />}

      <div style={{ textAlign: "center", marginBottom: 14 }}>
        <span style={{ fontSize: 28, fontWeight: 800, color: C.purple }}>
          {ex.czas ? `${ex.czas}s` : `${ex.powt} powt.`}
        </span>
        <div style={{ fontSize: 13, color: C.sub, marginTop: 2 }}>{tx("Seria")} {setNo} {tx("z")} {ex.serie}</div>
        {hr?.bpm ? <PulsBadge bpm={hr.bpm} profile={profile} style={{ marginTop: 6 }} />
          : hr?.connect ? <div style={{ marginTop: 6 }}><button onClick={() => hr.connect()} style={{ padding: "6px 14px", borderRadius: 999, border: `1px solid ${C.line}`, background: "transparent", color: C.sub, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>❤ {tx("Podłącz pas tętna (Bluetooth)")}</button></div> : null}
      </div>

      {resting ? (
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 13, color: C.sub }}>{tx("Przerwa")}</div>
          <div style={{ fontSize: 40, fontWeight: 800, color: C.cool, fontVariantNumeric: "tabular-nums" }}>{fmt(rest)}</div>
          <button onClick={() => { clearInterval(restRef.current); setResting(false); setRest(0); }} style={{ ...ghost, marginTop: 8 }}>{tx("Pomiń przerwę")}</button>
        </div>
      ) : (
        <button onClick={doneSet} style={{ ...primary, background: C.purple }}>
          {lastSet && lastEx ? tx("Zakończ siłowy") : lastSet ? tx("Następne ćwiczenie") : "Seria zrobiona"}
        </button>
      )}
      <button onClick={koniec} style={{ ...ghost, marginTop: 10 }}>{tx("Zakończ część siłową")}</button>
    </div>
  );
}

/* ── KROK BIEGOWY z rejestracją tętna + prędkości ───────────
   Nowości:
   • Strefa docelowa tętna (z planu treningu lub z wieku) — trener pilnuje
     w OBIE strony: za wysoko → "zwolnij", za nisko → "możesz przyspieszyć".
   • TRYB DEMO (symulacja) — odtwarza bieg bez GPS i pasa HR, żeby
     przetestować całość: tętno i tempo zmieniają się same, czas leci
     szybciej, trener reaguje na żywo. Idealne do prób.
   • Głos: primeVoice() przy starcie (klik) odblokowuje mowę na telefonie,
     a panel "GŁOS TRENERA" pokazuje ostatni komunikat także tekstem.
─────────────────────────────────────────────────────────────*/
function KrokBieg({ step, profile, onNext, onSaveDemo, hr }) {
  const targetSec = (step.minuty || 20) * 60;
  const recEvery = profile?.recInterval || 15;

  // strefa docelowa tętna dla TEGO biegu:
  // 1) jeśli krok ma hrLo/hrHi → użyj; 2) jeśli ma hrTarget → ±8; 3) z wieku (Z2-Z3)
  const age = profile?.age || 30;
  const zoneFromAge = (() => {
    const z = hrZones(age, profile?.restHR);
    return { lo: z[1].lo, hi: z[2].hi }; // od dołu Z2 do góry Z3
  })();
  const tgtLo = step.hrLo != null ? step.hrLo : (step.hrTarget != null ? step.hrTarget - 8 : zoneFromAge.lo);
  const tgtHi = step.hrHi != null ? step.hrHi : (step.hrTarget != null ? step.hrTarget + 8 : zoneFromAge.hi);

  // ── INTERWAŁY: budujemy listę segmentów {nazwa, sek, lo, hi, mocno} ──
  // Źródło 1: step.segmenty (z planu AI). Źródło 2: domyślny szablon, gdy typ=interwaly.
  const isInterval = step.typ === "interwaly";
  const segmenty = (() => {
    if (Array.isArray(step.segmenty) && step.segmenty.length) {
      return step.segmenty.map((s) => ({
        nazwa: s.nazwa || (s.mocno ? "Mocno" : "Spokojnie"),
        sek: (s.sek != null ? s.sek : (s.minuty || 1) * 60),
        lo: s.hrLo != null ? s.hrLo : (s.mocno ? hrZones(age, profile?.restHR)[3].lo : zoneFromAge.lo),
        hi: s.hrHi != null ? s.hrHi : (s.mocno ? hrZones(age, profile?.restHR)[4].hi : zoneFromAge.lo + 12),
        mocno: !!s.mocno,
      }));
    }
    if (!isInterval) return null;
    // domyślny szablon 5× (1 min mocno / 2 min spokojnie) + rozbieg/wybieg
    const z = hrZones(age, profile?.restHR);
    const powt = step.powt || 5;
    const work = (step.workMin || 1) * 60;
    const rest = (step.restMin || 2) * 60;
    const segs = [{ nazwa: "Rozbieg", sek: 180, lo: zoneFromAge.lo, hi: zoneFromAge.lo + 10, mocno: false }];
    for (let i = 0; i < powt; i++) {
      segs.push({ nazwa: `Mocno ${i + 1}/${powt}`, sek: work, lo: z[3].lo, hi: z[4].hi, mocno: true });
      if (i < powt - 1) segs.push({ nazwa: `Trucht ${i + 1}`, sek: rest, lo: z[1].lo, hi: z[2].hi, mocno: false });
    }
    segs.push({ nazwa: "Wybieg", sek: 180, lo: z[1].lo, hi: z[2].hi, mocno: false });
    return segs;
  })();
  // łączny czas: dla interwałów suma segmentów, inaczej step.minuty
  const segTotal = segmenty ? segmenty.reduce((a, s) => a + s.sek, 0) : null;
  const targetSecEff = segTotal || targetSec;
  // segment aktywny w sekundzie nt
  const segAt = (nt) => {
    if (!segmenty) return null;
    let acc2 = 0;
    for (let i = 0; i < segmenty.length; i++) {
      if (nt < acc2 + segmenty[i].sek) return { idx: i, seg: segmenty[i], left: acc2 + segmenty[i].sek - nt, start: acc2 };
      acc2 += segmenty[i].sek;
    }
    const lastI = segmenty.length - 1;
    return { idx: lastI, seg: segmenty[lastI], left: 0, start: acc2 - segmenty[lastI].sek };
  };
  const [curSeg, setCurSeg] = useState(null); // {idx, seg, left}
  const [pokazTech, setPokazTech] = useState(false); // modal techniki biegu

  const [phase, setPhase] = useState("ready"); // ready | run | done
  const [demo, setDemo] = useState(false);      // czy to symulacja
  const [t, setT] = useState(0);
  const [dist, setDist] = useState(0);
  const [speed, setSpeed] = useState(0);
  const [acc, setAcc] = useState(null);         // dokładność GPS (m)
  const [bpmDemo, setBpmDemo] = useState(null);  // tętno symulowane w demo
  const hrConn = !!hr?.connected;                  // połączenie z opaską (globalne)
  const bpm = demo ? bpmDemo : (hr?.bpm ?? null);  // efektywne tętno
  const setBpm = setBpmDemo;                        // demo zapisuje do bpmDemo
  const [samples, setSamples] = useState([]);   // {t, bpm, kmh}
  const [marks, setMarks] = useState([]);        // {t, reason}
  const [voiceOn, setVoiceOn] = useState(!!profile?.liveVoice); // przełącznik głosu
  const [lastCoach, setLastCoach] = useState(""); // ostatni komunikat trenera (tekst)
  const [hrStatus, setHrStatus] = useState("ok"); // ok | high | low
  const [demoBpm, setDemoBpm] = useState(Math.round((tgtLo + tgtHi) / 2)); // suwak tętna w demo
  const [demoKmh, setDemoKmh] = useState(10); // suwak prędkości w demo
  const [demoSpeedMult, setDemoSpeedMult] = useState(4); // przyspieszenie czasu w demo (×)
  const [demoFatigue, setDemoFatigue] = useState(0); // 0 świeży · 1 zmęczony · 2 przemęczony
  const [alert, setAlert] = useState(null); // {tytul, opis, krytyczne} — kontrola bezpieczeństwa
  const [savedDemo, setSavedDemo] = useState(false); // czy demo zapisane do dziennika
  const [locked, setLocked] = useState(false); // blokada ekranu — chroni przed przypadkowym dotknięciem
  const [unlockHold, setUnlockHold] = useState(0); // postęp przytrzymania, by odblokować (0–100)
  const unlockTimer = useRef(null);
  const hrMax = hrMaxTanaka(profile?.age || 30); // Tanaka (helper)
  const highSince = useRef(null);  // od kiedy tętno krytycznie wysokie
  const stillSince = useRef(null); // od kiedy brak ruchu przy wysokim tętnie
  const alertRef = useRef(false);  // czy alert jest aktywny — czytane w pętli (stan w domknięciu bywa nieaktualny)

  const timerRef = useRef(null), watchRef = useRef(null), lastPos = useRef(null), lastTime = useRef(null);
  const distRef = useRef(0); // bieżący dystans (m) dostępny w pętli — do finiszu po kilometrach
  const celM = step.celKm ? step.celKm * 1000 : null; // cel dystansowy (m); gdy ustawiony, bieg kończy się po dystansie
  const lastSample = useRef(0), lastVoice = useRef(-999);
  const track = useRef([]); // ślad GPS [{lat, lng}]
  const statRef = useRef({ pts: 0, rejAcc: 0, rejNoise: 0, rejTele: 0, gap: 0, gapSec: 0 }); // telemetria GPS — diagnoza dystansu
  const spdWin = useRef([]); // {t (ms), d (m)} okno ~10 s do liczenia płynnej prędkości z dystansu — pole speed z GPS bywa niedostępne/zaszumione
  const sRef = useRef({ speed: 0, bpm: null });
  const demoRef = useRef({ bpm: 95, kmh: 9, drift: 0 }); // stan symulacji
  const wake = useWakeLock();

  useEffect(() => { sRef.current = { speed, bpm }; }, [speed, bpm]);

  const stopAll = () => {
    clearInterval(timerRef.current);
    if (watchRef.current != null && navigator.geolocation) gpsClearWatch(watchRef.current);
    watchRef.current = null;
    clearInterval(unlockTimer.current);
    wake.release();
  };
  useEffect(() => () => stopAll(), []);

  // trener mówi + zapisuje tekst na ekran (z throttlingiem przez lastVoice)
  const coach = (txt, nt, minGap = 25) => {
    if (nt - lastVoice.current < minGap) return;
    lastVoice.current = nt;
    setLastCoach(txt);
    if (voiceOn) speak(txt);
  };

  // tętno pochodzi z globalnego połączenia (Ustawienia) — brak lokalnego łączenia tutaj

  // wspólna pętla próbkowania + reakcji trenera (działa i dla biegu, i dla demo)
  const onTick = (nt, isDemo) => {
    // w demo bierzemy tętno/tempo ze sterowania ręcznego (demoRef),
    // z lekkim "oddechem" (±1), żeby liczby żyły, ale słuchały suwaków
    if (isDemo) {
      const d = demoRef.current;
      // zmęczenie: stały offset + dryf rosnący z czasem biegu
      const fat = d.fatigue || 0;
      const offset = fat * 9 + (fat > 0 ? Math.min(15, nt / 30 * fat) : 0); // przemęczenie → wyraźny wzrost HR
      const bpmShown = Math.round(Math.max(60, Math.min(215, d.bpm + offset + (Math.random() - 0.5) * 2)));
      const kmhShown = +Math.max(0, Math.min(25, d.kmh + (Math.random() - 0.5) * 0.3)).toFixed(1);
      setBpm(bpmShown);
      setSpeed(kmhShown);
      setDist((x) => { const nd = x + kmhShown / 3.6; distRef.current = nd; return nd; }); // metry/sek
      sRef.current = { speed: kmhShown, bpm: bpmShown };
    }

    const curBpm = sRef.current.bpm;
    const curKmh = sRef.current.speed;

    // ── INTERWAŁY: ustal aktywny segment i jego strefę ──
    let zoneLo = tgtLo, zoneHi = tgtHi;
    if (segmenty) {
      const at = segAt(nt);
      zoneLo = at.seg.lo; zoneHi = at.seg.hi;
      // przejście do nowego segmentu → zapowiedź
      if (!curSeg || curSeg.idx !== at.idx) {
        setCurSeg(at);
        const nast = at.seg.mocno
          ? `${at.seg.nazwa}! Przyspiesz, tętno ${at.seg.lo} do ${at.seg.hi}.`
          : `${at.seg.nazwa}. Zwolnij, złap oddech, tętno ${at.seg.lo} do ${at.seg.hi}.`;
        coach(nast, nt, 0);
      } else {
        setCurSeg(at);
        // odliczanie ostatnich 3 s segmentu głosem
        if (at.left <= 3 && at.left >= 1) coach(`${at.left}`, nt, 0);
      }
    }

    // ── REAKCJA TRENERA NA STREFĘ TĘTNA (w obie strony) ──
    if (curBpm) {
      if (curBpm > zoneHi + 4) {
        if (hrStatus !== "high") setHrStatus("high");
        coach(`Tętno ${curBpm}, za wysoko. Cel do ${zoneHi}. Zwolnij, oddychaj spokojnie.`, nt);
      } else if (curBpm < zoneLo - 4) {
        if (hrStatus !== "low") setHrStatus("low");
        coach(`Tętno ${curBpm}, za nisko. Cel od ${zoneLo}. Możesz przyspieszyć.`, nt);
      } else {
        if (hrStatus !== "ok") { setHrStatus("ok"); coach(`Dobrze, jesteś w strefie. Trzymaj to tempo.`, nt, 15); }
      }
    }

    // ── KONTROLA BEZPIECZEŃSTWA ──
    // 1) tętno ≥ 95% HRmax utrzymane > 25 s  2) bardzo wysokie tętno przy braku ruchu (ryzyko zasłabnięcia)
    if (curBpm && !alertRef.current) {
      const krytyczne = curBpm >= Math.round(hrMax * 0.95);
      const bardzoWysokie = curBpm >= Math.round(hrMax * 0.9);
      if (krytyczne) {
        if (highSince.current == null) highSince.current = nt;
        if (nt - highSince.current >= 25) {
          alertRef.current = true;
          setAlert({ tytul: tx("Tętno krytycznie wysokie"), opis: `Tętno ${curBpm} (≈${Math.round((curBpm / hrMax) * 100)}% maksymalnego) trzyma się zbyt długo. Zatrzymaj się, zejdź do marszu i oddychaj spokojnie. Jeśli czujesz ból w klatce, zawroty głowy lub duszność — przerwij i w razie potrzeby wezwij pomoc.`, krytyczne: true });
          coach(tx("Stop. Tętno za wysokie — przejdź do marszu i odpocznij."), nt, 0);
        }
      } else { highSince.current = null; }
      // brak ruchu (≤1 km/h) przy wysokim tętnie przez >20 s — możliwy problem
      if (bardzoWysokie && curKmh <= 1) {
        if (stillSince.current == null) stillSince.current = nt;
        if (nt - stillSince.current >= 20) {
          alertRef.current = true;
          setAlert({ tytul: tx("Zatrzymałeś się z wysokim tętnem"), opis: `Nie wykrywam ruchu, a tętno jest wysokie (${curBpm}). Wszystko w porządku? Jeśli źle się czujesz — przerwij trening i odpocznij. Jeśli to tylko przerwa — możesz kontynuować.`, krytyczne: false });
          coach(tx("Zatrzymałeś się, a tętno wysokie. Wszystko gra?"), nt, 0);
        }
      } else { stillSince.current = null; }
    }

    // ── REAKCJA NA ZMĘCZENIE (demo) ──
    if (isDemo && (demoRef.current.fatigue || 0) > 0 && curBpm) {
      if (demoRef.current.fatigue === 2) {
        coach(tx("Widzę oznaki przemęczenia — tętno rośnie mimo tempa. Zwolnij wyraźnie albo zakończ na dziś."), nt, 35);
      } else if (curBpm > zoneHi) {
        coach(tx("Zmęczenie daje o sobie znać — tętno pełznie w górę. Odpuść trochę tempo."), nt, 35);
      }
    }

    if (nt - lastSample.current >= recEvery) {
      lastSample.current = nt;
      const snap = { t: nt, bpm: curBpm, kmh: +(+curKmh).toFixed(1) };
      setSamples((arr) => {
        const prev = arr[arr.length - 1];
        // wykrycie słabości: tętno ↑ i tempo ↓ jednocześnie
        if (prev && snap.bpm && prev.bpm && snap.bpm - prev.bpm >= 6 && snap.kmh < prev.kmh - 0.6) {
          setMarks((m) => [...m, { t: nt, reason: tx("tętno ↑ / tempo ↓") }]);
          coach(tx("Tętno skacze, a tempo siada. Spokojnie — zapytam o to po biegu."), nt, 45);
        }
        return [...arr, snap];
      });
    }
  };

  const startCommon = (isDemo) => {
    primeVoice(); // KLIK — odblokuj mowę
    setPhase("run"); setDemo(isDemo);
    setT(0); setDist(0); setAcc(null); setSamples([]); setMarks([]); setLastCoach(""); setHrStatus("ok");
    lastPos.current = null; lastTime.current = null; track.current = []; spdWin.current = [];
    lastSample.current = 0; lastVoice.current = -999;
    highSince.current = null; stillSince.current = null; alertRef.current = false; setAlert(null); setSavedDemo(false);
    const startBpm = Math.round((tgtLo + tgtHi) / 2);
    demoRef.current = { bpm: startBpm, kmh: 10, fatigue: demoFatigue };
    setDemoBpm(startBpm); setDemoKmh(10);
    statRef.current = { pts: 0, rejAcc: 0, rejNoise: 0, rejTele: 0, gap: 0, gapSec: 0 };
    if (!isDemo) wake.request();
    coach(isDemo ? tx("Tryb demo. Symuluję bieg — posłuchaj, jak reaguję.") : "Zaczynamy. Powodzenia!", 0, 0);

    if (!isDemo && navigator.geolocation) {
      watchRef.current = gpsWatch((p) => {
        const a = p.coords.accuracy;
        setAcc(a != null ? Math.round(a) : null);
        const now = p.timestamp || Date.now();
        const cur = { lat: p.coords.latitude, lng: p.coords.longitude };
        const dt = lastTime.current ? (now - lastTime.current) / 1000 : 0;
        const st = statRef.current; st.pts += 1;
        if (dt > 15) { // przerwa w dopływie pozycji
          st.gap += 1; st.gapSec += dt;
          try { navigator.vibrate?.([100, 80, 100]); } catch { /* ignore */ }
          coach(`${tx("GPS wrócił po przerwie")} ${Math.round(dt)} s.`, 0, 0);
        }
        const r = gpsStep(lastPos.current, cur, a, dt);
        if (r.why === "acc") st.rejAcc += 1; else if (r.why === "noise") st.rejNoise += 1; else if (r.why === "tele") st.rejTele += 1;
        if (r.inc > 0) { setDist((x) => { const nd = x + r.inc; distRef.current = nd; return nd; }); track.current.push({ ...cur }); }
        if (r.anchor) { lastPos.current = cur; lastTime.current = now; }
        // Prędkość liczona z realnie przebytego dystansu w ostatnich ~10 s —
        // p.coords.speed bywa null albo bardzo zaszumiony i psuje "czas na 1 km" na żywo.
        spdWin.current.push({ t: now, d: distRef.current });
        while (spdWin.current.length > 1 && now - spdWin.current[0].t > 10000) spdWin.current.shift();
        if (spdWin.current.length >= 2) {
          const win = spdWin.current;
          const dtWin = (win[win.length - 1].t - win[0].t) / 1000;
          const ddWin = win[win.length - 1].d - win[0].d;
          // ddWin < 3 m w całym oknie = stoisz (sam dryf) → prędkość 0
          if (dtWin >= 3) setSpeed(ddWin < 3 ? 0 : Math.max(0, (ddWin / dtWin) * 3.6));
        }
      }, () => {}, { enableHighAccuracy: true, maximumAge: 1000, timeout: 8000 });
    }

    // w demo czas leci szybciej (regulowane suwakiem demoSpeedMult)
    const tickMs = isDemo ? Math.round(1000 / demoSpeedMult) : 1000;
    timerRef.current = setInterval(() => {
      setT((x) => {
        const nt = x + 1;
        onTick(nt, isDemo);
        if ((celM && distRef.current >= celM) || nt >= targetSecEff) { stopAll(); setPhase("done"); coach(tx("Koniec biegu. Świetna robota!"), nt, 0); }
        return nt;
      });
    }, tickMs);
  };

  const start = () => startCommon(false);
  const startDemo = () => startCommon(true);
  const stopEarly = () => { stopAll(); setPhase("done"); };

  // ── ręczne sterowanie w demo ──
  const bumpBpm = (delta) => {
    setDemoBpm((v) => {
      const nv = Math.max(60, Math.min(210, v + delta));
      demoRef.current.bpm = nv;
      return nv;
    });
  };
  const bumpKmh = (delta) => {
    setDemoKmh((v) => {
      const nv = +Math.max(0, Math.min(25, v + delta)).toFixed(1);
      demoRef.current.kmh = nv;
      return nv;
    });
  };

  const zmienDemoSpeed = (m) => {
    setDemoSpeedMult(m);
    if (phase === "run" && demo && timerRef.current) {
      clearInterval(timerRef.current);
      timerRef.current = setInterval(() => {
        setT((x) => {
          const nt = x + 1;
          onTick(nt, true);
          if ((celM && distRef.current >= celM) || nt >= targetSecEff) { stopAll(); setPhase("done"); coach(tx("Koniec biegu. Świetna robota!"), nt, 0); }
          return nt;
        });
      }, Math.round(1000 / m));
    }
  };

  const zoneColor = hrStatus === "high" ? C.warn : hrStatus === "low" ? C.cool : "#4FD6A6";

  if (phase === "ready") {
    return (
      <div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <h2 style={{ fontSize: 22, fontWeight: 800, margin: 0 }}>{step.typ === "interwaly" ? tx("Interwały") : "Bieg"}</h2>
          <button onClick={() => setPokazTech(true)} title={tx("Jak wykonać")}
            style={{ width: 26, height: 26, borderRadius: 13, border: `1px solid ${C.accent}`, background: "transparent", color: C.accent, fontWeight: 800, fontSize: 14, cursor: "pointer" }}>?</button>
        </div>
        <p style={{ color: C.sub, fontSize: 14, lineHeight: 1.6 }}>{step.opis}</p>
        {pokazTech && <InstrukcjaModal inst={isInterval ? INTERW_INSTR : BIEG_INSTR} onClose={() => setPokazTech(false)} />}

        <div style={{ background: C.surface, borderRadius: 14, padding: 14, margin: "12px 0", fontSize: 13, color: C.sub, lineHeight: 1.6 }}>
          {celM ? <><strong style={{ color: C.ink }}>{tx("Cel:")} {step.celKm} km</strong> · {tx("zatrzyma się po")} {step.celKm} km{tx(" (czas leci, ale liczy się dystans)")}</> : <>{tx("Cel: ~")}{Math.round(targetSecEff / 60)} {tx("min. Zapis co")} {recEvery}{tx("s.")}</>}<br />
          {segmenty
            ? <><strong style={{ color: C.ink }}>{tx("Interwały —")} {segmenty.length} {tx("odcinków:")}</strong><br />
                {segmenty.map((s, i) => (
                  <span key={i} style={{ color: s.mocno ? C.warn : C.cool }}>{s.nazwa} {fmt(s.sek)} ({s.lo}–{s.hi})<br /></span>
                ))}
                {tx("Trener odlicza każdy odcinek i mówi, kiedy przyspieszyć i zwolnić.")}</>
            : <><strong style={{ color: C.ink }}>{tx("Zalecane tętno:")} {tgtLo}–{tgtHi} {tx("bpm.")}</strong> {tx("Trener pilnuje na żywo i poprawia, gdy wyjdziesz poza strefę.")}</>}
          <br />{tx("Wyjdź na zewnątrz dla GPS, albo użyj Trybu demo do testu.")}
        </div>

        {/* przełącznik głosu */}
        <button onClick={() => { primeVoice(); setVoiceOn((v) => !v); if (!voiceOn) speak(tx("Głos trenera włączony.")); }}
          style={{ width: "100%", padding: 12, borderRadius: 12, fontWeight: 700, fontSize: 14, cursor: "pointer", marginBottom: 8,
            border: `1px solid ${voiceOn ? C.accent : C.line}`, background: voiceOn ? "#FF8A7018" : "transparent", color: voiceOn ? C.accent : C.sub }}>
          {voiceOn ? tx("🔊 Głos trenera: WŁĄCZONY (kliknij, by sprawdzić)") : tx("🔇 Głos trenera: wyłączony")}
        </button>
        {!voiceAvailable() && <p style={{ fontSize: 11, color: C.warn, margin: "0 0 8px" }}>{tx("Ta przeglądarka nie wspiera mowy — komunikaty trenera zobaczysz tekstem na ekranie.")}</p>}

        <div style={{ width: "100%", padding: 12, borderRadius: 12, marginBottom: 8, textAlign: "center", fontSize: 13, fontWeight: 700,
          border: `1px solid ${hrConn ? "#4FD6A6" : C.line}`, background: hrConn ? "#4FD6A618" : C.surface, color: hrConn ? "#4FD6A6" : C.sub }}>
          {hrConn ? `✓ Opaska połączona${hr?.bpm ? ` · ${hr.bpm} bpm` : ""}` : tx("Opaska niepołączona — połącz ją w Ustawieniach, żeby tętno działało wszędzie")}
        </div>

        <button onClick={start} style={primary}>{tx("Start biegu")}</button>
        <button onClick={startDemo} style={{ ...ghost, marginTop: 10, borderColor: C.purple, color: C.purple }}>{tx("▶ Tryb demo (symulacja — przetestuj wszystko)")}</button>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10, justifyContent: "center" }}>
          <span style={{ fontSize: 12, color: C.sub }}>{tx("Przyspieszenie demo:")}</span>
          {[2, 4, 8, 16, 30].map((m) => (
            <button key={m} onClick={() => setDemoSpeedMult(m)} style={{ padding: "5px 10px", borderRadius: 8, fontWeight: 800, fontSize: 12, cursor: "pointer",
              border: `1px solid ${demoSpeedMult === m ? C.purple : C.line}`, background: demoSpeedMult === m ? C.purple + "22" : "transparent", color: demoSpeedMult === m ? C.purple : C.sub }}>×{m}</button>
          ))}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 8, justifyContent: "center" }}>
          <span style={{ fontSize: 12, color: C.sub }}>{tx("Zmęczenie w demo:")}</span>
          {[[0, tx("Świeży")], [1, tx("Zmęczony")], [2, tx("Przemęczony")]].map(([v, l]) => (
            <button key={v} onClick={() => setDemoFatigue(v)} style={{ padding: "5px 10px", borderRadius: 8, fontWeight: 800, fontSize: 12, cursor: "pointer",
              border: `1px solid ${demoFatigue === v ? C.purple : C.line}`, background: demoFatigue === v ? C.purple + "22" : "transparent", color: demoFatigue === v ? C.purple : C.sub }}>{l}</button>
          ))}
        </div>
      </div>
    );
  }

  if (phase === "run") {
    const MOVING = 1.4; // km/h — poniżej tego to stanie/dryf GPS, nie bieg → tempo „—"
    const pace = speed > MOVING ? 60 / speed : 0;
    const inZone = bpm && bpm >= tgtLo && bpm <= tgtHi;
    return (
      <div>
        {/* KONTROLA BEZPIECZEŃSTWA — nakładka */}
        {alert && (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.82)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 22 }}>
            <div style={{ background: C.surface2, border: `2px solid ${alert.krytyczne ? C.warn : "#F2B457"}`, borderRadius: 20, padding: 22, maxWidth: 440, width: "100%" }}>
              <div style={{ fontSize: 34, textAlign: "center" }}>{alert.krytyczne ? "🛑" : "⚠️"}</div>
              <h2 style={{ fontSize: 20, fontWeight: 800, textAlign: "center", margin: "6px 0 10px", color: alert.krytyczne ? C.warn : "#F2B457" }}>{alert.tytul}</h2>
              <p style={{ fontSize: 14, lineHeight: 1.6, color: C.ink, margin: "0 0 18px" }}>{alert.opis}</p>
              <button onClick={() => { alertRef.current = false; setAlert(null); stopEarly(); }} style={{ width: "100%", padding: 15, background: C.warn, color: C.bg, border: "none", borderRadius: 12, fontWeight: 800, fontSize: 15, cursor: "pointer", marginBottom: 10 }}>
                {tx("Przerwij trening i odpocznij")}
              </button>
              <button onClick={() => { highSince.current = null; stillSince.current = null; alertRef.current = false; setAlert(null); }} style={{ width: "100%", padding: 13, background: "transparent", color: C.sub, border: `1px solid ${C.line}`, borderRadius: 12, fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
                {tx("Czuję się dobrze — kontynuuj")}
              </button>
              <p style={{ fontSize: 11, color: C.sub, textAlign: "center", marginTop: 12, lineHeight: 1.5 }}>{tx("To automatyczne ostrzeżenie aplikacji, nie diagnoza. Przy bólu w klatce, omdleniu lub duszności wezwij pomoc (112).")}</p>
            </div>
          </div>
        )}
        {demo && <div style={{ textAlign: "center", fontSize: 11, color: C.purple, fontWeight: 800, letterSpacing: 1, marginBottom: 4 }}>{tx("● TRYB DEMO — SYMULACJA ×")}{demoSpeedMult}</div>}
        <div style={{ textAlign: "center", fontSize: 13, color: C.sub, letterSpacing: 1 }}>{tx("CZAS CAŁOŚCI")}</div>
        <div style={{ textAlign: "center", fontSize: 54, fontWeight: 800, color: C.accent, fontVariantNumeric: "tabular-nums" }}>{fmt(t)}<span style={{ fontSize: 18, color: C.sub }}> / {fmt(targetSecEff)}</span></div>
        <div style={{ height: 5, background: C.line, borderRadius: 3, margin: "8px 0 16px" }}>
          <div style={{ height: "100%", width: `${Math.min(100, (t / targetSecEff) * 100)}%`, background: C.accent, borderRadius: 3, transition: "width .25s linear" }} />
        </div>

        {/* BANER SEGMENTU INTERWAŁU — duże odliczanie i zalecane tętno */}
        {segmenty && curSeg && (
          <div style={{ background: curSeg.seg.mocno ? C.warn + "22" : C.cool + "18", border: `2px solid ${curSeg.seg.mocno ? C.warn : C.cool}`, borderRadius: 16, padding: "12px 14px", marginBottom: 12, textAlign: "center" }}>
            <div style={{ fontSize: 12, fontWeight: 800, letterSpacing: 1, color: curSeg.seg.mocno ? C.warn : C.cool }}>
              {curSeg.seg.mocno ? "🔥 MOCNO" : "🌿 SPOKOJNIE"} · {curSeg.seg.nazwa} {tx("· odcinek")} {curSeg.idx + 1}/{segmenty.length}
            </div>
            <div style={{ fontSize: 46, fontWeight: 800, color: curSeg.seg.mocno ? C.warn : C.cool, fontVariantNumeric: "tabular-nums", lineHeight: 1.1 }}>{fmt(curSeg.left)}</div>
            <div style={{ fontSize: 12, color: C.sub }}>{tx("do końca odcinka · zalecane tętno")} {curSeg.seg.lo}–{curSeg.seg.hi}</div>
          </div>
        )}

        {/* pasek strefy tętna — zalecane vs obecne */}
        {(() => {
          const zLo = segmenty && curSeg ? curSeg.seg.lo : tgtLo;
          const zHi = segmenty && curSeg ? curSeg.seg.hi : tgtHi;
          const within = bpm && bpm >= zLo && bpm <= zHi;
          return (
            <div style={{ background: C.surface, border: `1px solid ${zoneColor}`, borderRadius: 14, padding: "10px 14px", marginBottom: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 12, color: C.sub, fontWeight: 700 }}>{tx("ZALECANE")} {zLo}–{zHi} {tx("· OBECNE")} {bpm || "—"}</span>
                <span style={{ fontSize: 13, fontWeight: 800, color: within ? "#4FD6A6" : zoneColor }}>
                  {!bpm ? "brak HR" : hrStatus === "high" ? "ZA WYSOKO ↓ zwolnij" : hrStatus === "low" ? "ZA NISKO ↑ przyspiesz" : "W STREFIE ✓"}
                </span>
              </div>
            </div>
          );
        })()}

        <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
          <Box val={(dist / 1000).toFixed(2)} unit="km" c="#F2B457" />
          <Box val={pace > 0 ? `${Math.floor(pace)}:${String(Math.round((pace % 1) * 60)).padStart(2, "0")}` : "—"} unit="/km" c={C.cool} />
          <Box val={bpm || "—"} unit="HR" c={inZone ? "#4FD6A6" : C.warn} />
        </div>

        {/* panel głosu trenera (tekst ostatniego komunikatu) */}
        {lastCoach && (
          <div style={{ background: C.surface2, border: `1px solid ${C.accent}`, borderRadius: 12, padding: "10px 14px", marginBottom: 12 }}>
            <div style={{ fontSize: 10, color: C.accent, fontWeight: 800, letterSpacing: 1, marginBottom: 3 }}>{tx("🔊 TRENER")}</div>
            <div style={{ fontSize: 14, lineHeight: 1.4 }}>{lastCoach}</div>
          </div>
        )}

        {marks.length > 0 && <div style={{ fontSize: 12, color: "#F2B457", marginBottom: 10 }}>{tx("Oznaczono")} {marks.length} {tx("słabszych momentów — zapytam o nie po biegu.")}</div>}
        {!demo && acc != null && (
          <p style={{ fontSize: 11, color: acc <= 15 ? "#4FD6A6" : acc <= 25 ? "#F2B457" : C.warn, margin: "0 0 8px", fontWeight: 600 }}>
            {tx("GPS ±")}{acc} m · {statRef.current.pts} pkt · odrzucone {statRef.current.rejAcc}/{statRef.current.rejNoise}/{statRef.current.rejTele} (sygnał/szum/skok){acc > 25 ? tx(" — słaby sygnał") : ""}
          </p>
        )}

        {/* PANEL STEROWANIA — tylko w demo */}
        {demo && (
          <div style={{ background: C.surface, border: `1px solid ${C.purple}`, borderRadius: 14, padding: 14, marginBottom: 12 }}>
            <div style={{ fontSize: 11, color: C.purple, fontWeight: 800, letterSpacing: 1, marginBottom: 10 }}>{tx("STEROWANIE DEMO — podkręć i posłuchaj trenera")}</div>

            {/* tętno */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span style={{ fontSize: 13, color: C.sub, fontWeight: 700, width: 70 }}>{tx("Tętno")}</span>
              <button onClick={() => bumpBpm(-10)} style={ctrlBtn}>−10</button>
              <button onClick={() => bumpBpm(-3)} style={ctrlBtn}>−3</button>
              <span style={{ fontSize: 20, fontWeight: 800, color: C.warn, minWidth: 56, textAlign: "center", fontVariantNumeric: "tabular-nums" }}>{demoBpm}</span>
              <button onClick={() => bumpBpm(3)} style={ctrlBtn}>+3</button>
              <button onClick={() => bumpBpm(10)} style={ctrlBtn}>+10</button>
            </div>
            <input type="range" min="60" max="200" value={demoBpm}
              onChange={(e) => { const nv = +e.target.value; setDemoBpm(nv); demoRef.current.bpm = nv; }}
              style={{ width: "100%", accentColor: C.warn, marginBottom: 14 }} />

            {/* prędkość */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span style={{ fontSize: 13, color: C.sub, fontWeight: 700, width: 70 }}>{tx("Prędkość")}</span>
              <button onClick={() => bumpKmh(-2)} style={ctrlBtn}>−2</button>
              <button onClick={() => bumpKmh(-0.5)} style={ctrlBtn}>−½</button>
              <span style={{ fontSize: 20, fontWeight: 800, color: C.cool, minWidth: 70, textAlign: "center", fontVariantNumeric: "tabular-nums" }}>{demoKmh} <span style={{ fontSize: 11, color: C.sub }}>{tx("km/h")}</span></span>
              <button onClick={() => bumpKmh(0.5)} style={ctrlBtn}>+½</button>
              <button onClick={() => bumpKmh(2)} style={ctrlBtn}>+2</button>
            </div>
            <input type="range" min="0" max="22" step="0.5" value={demoKmh}
              onChange={(e) => { const nv = +e.target.value; setDemoKmh(nv); demoRef.current.kmh = nv; }}
              style={{ width: "100%", accentColor: C.cool }} />

            {/* przyspieszenie czasu w trakcie */}
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 12, justifyContent: "center", flexWrap: "wrap" }}>
              <span style={{ fontSize: 12, color: C.sub, fontWeight: 700 }}>{tx("Przyspieszenie czasu:")}</span>
              {[1, 2, 4, 8, 16, 30].map((m) => (
                <button key={m} onClick={() => zmienDemoSpeed(m)} style={{ padding: "5px 11px", borderRadius: 8, fontWeight: 800, fontSize: 12, cursor: "pointer",
                  border: `1px solid ${demoSpeedMult === m ? C.purple : C.line}`, background: demoSpeedMult === m ? C.purple + "22" : "transparent", color: demoSpeedMult === m ? C.purple : C.sub }}>×{m}</button>
              ))}
            </div>

            {/* poziom zmęczenia — wpływa na tętno przy tym samym tempie */}
            <div style={{ marginTop: 12 }}>
              <div style={{ fontSize: 12, color: C.sub, fontWeight: 700, marginBottom: 6 }}>{tx("Zmęczenie (podbija tętno przy tym samym tempie):")}</div>
              <div style={{ display: "flex", gap: 8 }}>
                {[[0, tx("Świeży"), "#4FD6A6"], [1, tx("Zmęczony"), "#F2B457"], [2, tx("Przemęczony"), C.warn]].map(([v, l, c]) => (
                  <button key={v} onClick={() => { setDemoFatigue(v); demoRef.current.fatigue = v; }}
                    style={{ flex: 1, padding: "8px 6px", borderRadius: 10, fontWeight: 800, fontSize: 12, cursor: "pointer",
                      border: `1px solid ${demoFatigue === v ? c : C.line}`, background: demoFatigue === v ? c + "22" : "transparent", color: demoFatigue === v ? c : C.sub }}>{l}</button>
                ))}
              </div>
            </div>

            <p style={{ fontSize: 11, color: C.sub, marginTop: 10, lineHeight: 1.4 }}>
              {tx("Podnieś tętno powyżej")} {tgtHi} {tx("→ trener każe zwolnić. Zejdź poniżej")} {tgtLo} {tx("→ każe przyspieszyć.")}
            </p>
          </div>
        )}

        <MusicBar profile={profile} />
        <button onClick={stopEarly} style={{ ...primary, background: C.warn }}>{tx("Zakończ")} {demo ? "demo" : "bieg"}</button>
        <button onClick={() => setLocked(true)} style={{ ...ghost, marginTop: 10, borderColor: C.cool, color: C.cool }}>
          {tx("🔒 Zablokuj ekran (chroni przed dotknięciem)")}
        </button>

        {/* NAKŁADKA BLOKADY — przykrywa cały ekran; dane biegną dalej, ale dotyk nic nie klika.
            Odblokowanie: przytrzymaj kłódkę ~1,2 s. */}
        {locked && (
          <div
            onClick={(e) => { e.stopPropagation(); }}
            onTouchMove={(e) => { e.preventDefault(); }}
            style={{ position: "fixed", inset: 0, background: "rgba(7,11,20,.92)", zIndex: 300, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, touchAction: "none", userSelect: "none" }}>
            <div style={{ fontSize: 13, color: C.sub, letterSpacing: 1, marginBottom: 6 }}>{tx("CZAS")}</div>
            <div style={{ fontSize: 56, fontWeight: 800, color: C.accent, fontVariantNumeric: "tabular-nums" }}>{fmt(t)}</div>
            <div style={{ display: "flex", gap: 18, margin: "10px 0 36px", color: C.ink, fontSize: 16, fontWeight: 700 }}>
              <span>{(dist / 1000).toFixed(2)} km</span>
              {bpm ? <span style={{ color: C.warn }}>❤ {bpm}</span> : null}
            </div>
            {/* przycisk-kłódka: przytrzymaj, by odblokować */}
            <button
              onPointerDown={(e) => {
                e.preventDefault();
                const startT = Date.now();
                clearInterval(unlockTimer.current);
                unlockTimer.current = setInterval(() => {
                  const prog = Math.min(100, ((Date.now() - startT) / 1200) * 100);
                  setUnlockHold(prog);
                  if (prog >= 100) { clearInterval(unlockTimer.current); setLocked(false); setUnlockHold(0); }
                }, 30);
              }}
              onPointerUp={() => { clearInterval(unlockTimer.current); setUnlockHold(0); }}
              onPointerLeave={() => { clearInterval(unlockTimer.current); setUnlockHold(0); }}
              style={{ position: "relative", width: 120, height: 120, borderRadius: 60, border: `3px solid ${C.cool}`, background: "transparent", color: C.cool, fontSize: 40, cursor: "pointer", overflow: "hidden" }}>
              <div style={{ position: "absolute", left: 0, bottom: 0, width: "100%", height: `${unlockHold}%`, background: C.cool + "44", transition: "height .05s linear" }} />
              <span style={{ position: "relative" }}>🔒</span>
            </button>
            <div style={{ fontSize: 13, color: C.sub, marginTop: 18, textAlign: "center", lineHeight: 1.5 }}>
              {tx("Ekran zablokowany — dotyk nic nie zmieni.")}<br />{tx("Przytrzymaj kłódkę, aby odblokować.")}
            </div>
          </div>
        )}
      </div>
    );
  }

  // done -> przekaż dane wyżej (z próbkami, oznaczeniami i strefą docelową)
  const km = dist / 1000;
  const tempo = km > 0 ? Math.round(t / km) : 0;
  const avgHRd = samples.filter((s) => s.bpm).length ? Math.round(samples.filter((s) => s.bpm).reduce((a, s) => a + s.bpm, 0) / samples.filter((s) => s.bpm).length) : null;
  const dane = { dystans: +km.toFixed(2), tempo, samples, marks, demo, tgtLo, tgtHi, track: track.current.length > 1 ? track.current : null };
  return (
    <div style={{ textAlign: "center", padding: "10px 0" }}>
      <div style={{ fontSize: 40 }}>✓</div>
      <h2 style={{ fontSize: 22, fontWeight: 800 }}>{demo ? tx("Demo zakończone") : tx("Bieg zakończony")}</h2>
      {demo && <p style={{ fontSize: 12, color: C.purple }}>{tx("Symulacja ×")}{demoSpeedMult}{tx(". Możesz ją zapisać do dziennika, a potem dokończyć trening, żeby zaliczył się do planu.")}</p>}
      <div style={{ display: "flex", gap: 10, margin: "14px 0" }}>
        <Box val={km.toFixed(2)} unit="km" c="#F2B457" />
        <Box val={tempo ? fmt(tempo) : "—"} unit="/km" c={C.cool} />
        <Box val={avgHRd || "—"} unit="śr. HR" c={C.warn} />
      </div>

      {demo && onSaveDemo && (
        <button onClick={() => {
          onSaveDemo({ data: new Date().toISOString(), trening: step.opis || (step.typ === "interwaly" ? tx("Interwały") : "Bieg"), czas: t, dystans: +km.toFixed(2), tempo, avgHR: avgHRd, maxHR: samples.filter((s) => s.bpm).length ? Math.max(...samples.filter((s) => s.bpm).map((s) => s.bpm)) : null, tgtLo, tgtHi, mult: demoSpeedMult, samples, marks, interwaly: !!segmenty });
          setSavedDemo(true);
        }} disabled={savedDemo}
          style={{ ...primary, background: savedDemo ? C.surface2 : C.purple, color: savedDemo ? C.sub : C.bg, marginBottom: 10 }}>
          {savedDemo ? "✓ Zapisano do dziennika demo" : "Zapisz to demo do dziennika"}
        </button>
      )}

      {/* DOKOŃCZ TRENING — przejście do podsumowania; trening zaliczy się do planu */}
      <button onClick={() => onNext(dane)} style={primary}>{tx("Dokończ trening")}{demo ? " (zalicz do planu)" : ""}</button>

      {demo && (
        <button onClick={() => onNext({ ...dane, skipSave: true })} style={{ ...ghost, marginTop: 10 }}>
          {tx("Zakończ bez zaliczania do planu")}
        </button>
      )}
    </div>
  );
}

/* ── PODSUMOWANIE: wykresy + pytania o momenty + analiza AI ── */
function Podsumowanie({ trening, profile, collected, marks, onDone, applyPlanChange }) {
  const samples = collected.samples || [];
  const allMarks = collected.marks || marks || [];
  const [answers, setAnswers] = useState({}); // {markT: tekst}
  const [analiza, setAnaliza] = useState("");
  const [busy, setBusy] = useState(false);
  const [recId, setRecId] = useState(null); // który mark słuchamy
  const [propozycja, setPropozycja] = useState(null); // { opis, zmiana, plan } — zmiana planu do potwierdzenia
  const [planZmieniony, setPlanZmieniony] = useState(false);
  const [trudnosc, setTrudnosc] = useState(null); // "za łatwy" | "w sam raz" | "za trudny"

  const dictate = (key) => {
    const r = makeRecognizer((txt) => setAnswers((a) => ({ ...a, [key]: ((a[key] || "") + " " + txt).trim() })));
    if (!r) { alert(tx("Dyktowanie niedostępne w tej przeglądarce. Wpisz odpowiedź ręcznie.")); return; }
    setRecId(key);
    r.onend = () => setRecId(null);
    try { r.start(); } catch { setRecId(null); }
  };

  const analizuj = async () => {
    setBusy(true);
    const hrVals = samples.filter((s) => s.bpm).map((s) => s.bpm);
    const avgHR = hrVals.length ? Math.round(hrVals.reduce((a, b) => a + b, 0) / hrVals.length) : null;
    const maxHR = hrVals.length ? Math.max(...hrVals) : null;
    const momenty = allMarks.map((m) => `${fmt(m.t)} (${m.reason})${answers[m.t] ? `: ${answers[m.t]}` : ""}`).join("; ") || "brak";

    // czy trzymał się strefy docelowej?
    const tgtLo = collected.tgtLo, tgtHi = collected.tgtHi;
    let strefaInfo = tx("brak danych tętna");
    if (avgHR && tgtLo && tgtHi) {
      const ileWStrefie = hrVals.filter((b) => b >= tgtLo && b <= tgtHi).length;
      const proc = Math.round((ileWStrefie / hrVals.length) * 100);
      strefaInfo = `cel ${tgtLo}-${tgtHi} bpm, w strefie był ${proc}% czasu, średnio ${avgHR}`;
    }

    const sys = `Jesteś trenerem biegania, mówisz po polsku, zwięźle i konkretnie. Stosujesz progresywne obciążenie.
Przeanalizuj ukończony trening na tle danych biegacza. Oceń, czy obciążenie było trafione:
- jeśli trening był ZA ŁATWY (tętno znacznie poniżej strefy, łatwo utrzymane tempo) → zaproponuj MOCNIEJSZY następny krok (dłużej / szybciej / dodać interwały) — rób progresję, nie stój w miejscu.
- jeśli był ZA TRUDNY (tętno wyżej niż cel, spadki tempa, złe samopoczucie) → odciąż.
- jeśli był w sam raz → utrzymaj kierunek i lekko podnieś poprzeczkę zgodnie z planem.
Aktualny plan biegacza (treningi): ${profile?.plan ? JSON.stringify(profile.plan) : "brak"}.
Odpowiedz WYŁĄCZNIE czystym JSON, bez markdown:
{"podsumowanie":"4-5 zdań: ocena + czy był za łatwy/trudny/trafiony + następny krok","slabosc":"jedno zdanie albo null","zmiana_planu":"konkretna zmiana/progresja w 1-2 zdaniach albo null","nowy_plan": null lub PEŁNY zmodyfikowany plan w formacie {"tytul":"...","opis":"co zmieniłem i dlaczego","treningi":[{"nazwa":"...","cel":"...","kroki":[{"typ":"rozgrzewka","opis":"5 min"},{"typ":"bieg","opis":"...","minuty":20,"hrLo":130,"hrHi":145},{"typ":"rozciaganie","opis":"5 min"}]}]}}
WAŻNE: gdy proponujesz zmianę, ZAWSZE wypełnij "nowy_plan" pełnym planem (zmodyfikuj istniejący, zachowując treningi, których nie zmieniasz). Typy kroków: rozgrzewka, bieg, interwaly, silowy, rozciaganie. Dla bieg/interwaly dodaj minuty oraz hrLo/hrHi.`;
    const ocenaTrudn = trudnosc ? `Biegacz ocenił trening jako: ${trudnosc}.` : "";
    const usr = `Trening: ${trening.nazwa}. Dystans ${collected.dystans || "?"} km, tempo ${collected.tempo ? fmt(collected.tempo) : "?"}/km. Tętno średnie ${avgHR ?? "?"}, maks ${maxHR ?? "?"}. Strefa: ${strefaInfo}. ${ocenaTrudn} Słabsze momenty: ${momenty}.`;
    try {
      const raw = (await callClaude({ model: "claude-sonnet-4-6", max_tokens: 600, system: sys + langDirective(langOf(profile)), messages: [{ role: "user", content: usr }] })).replace(/```json|```/g, "").trim();
      let parsed;
      try { parsed = JSON.parse(raw); } catch { parsed = { podsumowanie: raw, slabosc: null, zmiana_planu: null }; }
      setAnaliza(parsed.podsumowanie || raw);
      speak(parsed.podsumowanie || raw);
      if (parsed.zmiana_planu && parsed.zmiana_planu !== "null") {
        setPropozycja({ opis: parsed.slabosc, zmiana: parsed.zmiana_planu, plan: parsed.nowy_plan && parsed.nowy_plan !== "null" ? parsed.nowy_plan : null });
      }
    } catch (e) {
      setAnaliza(`${aiErr(e)} Zapisz trening — dane są zachowane.`);
    } finally { setBusy(false); }
  };

  const hrSeries = samples.filter((s) => s.bpm).map((s) => String(s.bpm));
  const kmhSeries = samples.map((s) => String(s.kmh));
  const labels = samples.map((s) => fmt(s.t));

  // kalorie — najdokładniejsza dostępna metoda
  const avgHRnum = hrSeries.length ? Math.round(hrSeries.reduce((a, b) => a + +b, 0) / hrSeries.length) : null;
  const minutes = samples.length ? Math.round(samples[samples.length - 1].t / 60) : (collected.minuty || null);
  const lastVO2 = profile?.testyWyniki?.marsz6 ? null : null; // (rezerwa na przyszłość)
  const vo2max = (() => { const h = (profile?.history || []); return profile?.vo2max || null; })();
  const { kcal, metoda: kcalMetoda } = kcalDokladnie({
    avgHR: avgHRnum, weight: profile?.weight, age: profile?.age, sex: profile?.sex, minutes,
    vo2max: collected.vo2max || vo2max || profile?.vo2max, restHR: profile?.restHR, km: collected.dystans,
  });

  return (
    <div>
      <h2 style={{ fontSize: 22, fontWeight: 800 }}>{tx("Podsumowanie")}</h2>
      <p style={{ color: C.sub, fontSize: 13 }}>{trening.nazwa}</p>

      <div style={{ display: "flex", gap: 10, margin: "12px 0" }}>
        <Box val={collected.dystans ?? "—"} unit="km" c="#F2B457" />
        <Box val={collected.tempo ? fmt(collected.tempo) : "—"} unit="/km" c={C.cool} />
        <Box val={kcal ?? "—"} unit="kcal" c="#4FD6A6" />
        <Box val={avgHRnum ?? "—"} unit="śr.HR" c={C.warn} />
      </div>
      {kcalMetoda && (
        <p style={{ fontSize: 11, color: C.sub, marginTop: -4, marginBottom: 10 }}>{tx("Kalorie liczone metodą:")} {kcalMetoda}.{!profile?.restHR && tx(" Podaj tętno spoczynkowe w „Sylwetka”, by liczyć jeszcze dokładniej.")}</p>
      )}
      {!profile?.weight && (
        <p style={{ fontSize: 11, color: C.sub, marginTop: -4, marginBottom: 10 }}>{tx("Podaj wagę w „Sylwetka i pomiary”, żeby liczyć kalorie dokładniej.")}</p>
      )}


      {collected.track && collected.track.length > 1 && (
        <div style={{ marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
            <div style={{ fontSize: 12, color: C.sub }}>{tx("Twoja trasa")}</div>
            <button onClick={() => pobierzGPX(collected.track, `${trening.nazwa} ${new Date().toLocaleDateString("pl-PL")}`)} style={{ background: "none", border: `1px solid ${C.cool}`, color: C.cool, fontSize: 12, fontWeight: 700, borderRadius: 8, padding: "4px 10px", cursor: "pointer" }}>{tx("Eksport GPX")}</button>
          </div>
          <RouteMap track={collected.track} color={C.accent} />
        </div>
      )}
      {samples.length > 1 && (
        <div style={{ background: C.surface, borderRadius: 14, padding: 12, marginBottom: 14 }}>
          <div style={{ fontSize: 12, color: C.sub, marginBottom: 6 }}>{tx("Tętno (HR) w czasie")}</div>
          {hrSeries.length > 1
            ? <MiniChart values={hrSeries} color={C.warn} labels={labels} unit="bpm" baseline={profile?.restHR || null} />
            : <div style={{ fontSize: 12, color: C.sub }}>{tx("Brak danych tętna (pas nie był połączony).")}</div>}
          <div style={{ fontSize: 12, color: C.sub, margin: "12px 0 6px" }}>{tx("Prędkość (km/h) w czasie")}</div>
          <MiniChart values={kmhSeries} color={C.cool} labels={labels} unit="km/h" />
        </div>
      )}

      {allMarks.length > 0 && (
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 8 }}>{tx("Co się działo w słabszych momentach?")}</div>
          {allMarks.map((m) => (
            <div key={m.t} style={{ background: C.surface, borderRadius: 12, padding: 12, marginBottom: 8 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#F2B457" }}>{fmt(m.t)} — {m.reason}</div>
              <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                <input value={answers[m.t] || ""} onChange={(e) => setAnswers((a) => ({ ...a, [m.t]: e.target.value }))}
                  placeholder={tx("np. podbieg, korek, zmęczenie…")} style={inp} />
                <button onClick={() => dictate(m.t)} style={{ padding: "0 14px", borderRadius: 10, border: "none", background: recId === m.t ? C.warn : C.surface2, color: recId === m.t ? C.bg : C.accent, fontWeight: 800, cursor: "pointer" }}>
                  {recId === m.t ? "●" : "🎤"}
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {!analiza && (
        <div style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 12, color: C.sub, fontWeight: 700, letterSpacing: 1, marginBottom: 8 }}>{tx("JAK TRUDNY BYŁ TEN TRENING?")}</div>
          <div style={{ display: "flex", gap: 8 }}>
            {[[tx("za łatwy"), tx("😎 Za łatwy")], ["w sam raz", "👍 W sam raz"], ["za trudny", "🥵 Za trudny"]].map(([v, l]) => (
              <button key={v} onClick={() => setTrudnosc(v)}
                style={{ flex: 1, padding: "10px 6px", borderRadius: 10, fontSize: 12, fontWeight: 700, cursor: "pointer",
                  border: `1px solid ${trudnosc === v ? C.accent : C.line}`, background: trudnosc === v ? C.accent + "18" : C.surface, color: C.ink }}>
                {l}
              </button>
            ))}
          </div>
        </div>
      )}

      {!analiza ? (
        <button onClick={analizuj} disabled={busy} style={primary}>{busy ? tx("Analizuję…") : tx("Poproś trenera o podsumowanie i korektę")}</button>
      ) : (
        <div style={{ background: C.surface2, border: `1px solid ${C.accent}`, borderRadius: 14, padding: 16, marginBottom: 12 }}>
          <div style={{ fontSize: 11, color: C.accent, fontWeight: 700, letterSpacing: 1, marginBottom: 6 }}>{tx("TRENER")}</div>
          <p style={{ fontSize: 14, lineHeight: 1.6, margin: 0, whiteSpace: "pre-wrap" }}>{analiza}</p>
        </div>
      )}

      {/* PROPOZYCJA ZMIANY PLANU — tylko za potwierdzeniem */}
      {propozycja && !planZmieniony && (
        <div style={{ background: C.surface, border: `1px solid ${C.purple}`, borderRadius: 14, padding: 16, marginBottom: 12 }}>
          <div style={{ fontSize: 11, color: C.purple, fontWeight: 800, letterSpacing: 1, marginBottom: 6 }}>{tx("⚡ PROPOZYCJA ZMIANY PLANU")}</div>
          {propozycja.opis && <p style={{ fontSize: 13, color: C.sub, margin: "0 0 8px", lineHeight: 1.5 }}>{tx("Wykryta słabość:")} {propozycja.opis}</p>}
          <p style={{ fontSize: 14, lineHeight: 1.6, margin: "0 0 14px", color: C.ink }}>{propozycja.zmiana}</p>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => { if (propozycja.plan && applyPlanChange) applyPlanChange({ ...propozycja.plan, termin: profile?.plan?.termin || null }); setPlanZmieniony(true); }} style={{ flex: 1, padding: 12, borderRadius: 10, border: "none", background: C.purple, color: C.bg, fontWeight: 800, fontSize: 13, cursor: "pointer" }}>
              {tx("✓ Zastosuj zmianę")}
            </button>
            <button onClick={() => setPropozycja(null)} style={{ flex: 1, padding: 12, borderRadius: 10, border: `1px solid ${C.line}`, background: "transparent", color: C.sub, fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
              {tx("Zostaw plan")}
            </button>
          </div>
          <p style={{ fontSize: 11, color: C.sub, marginTop: 10, lineHeight: 1.4 }}>{tx("Zmienia się tylko to, co trzeba — reszta planu zostaje bez zmian.")}</p>
        </div>
      )}
      {planZmieniony && (
        <div style={{ background: "#4FD6A618", border: `1px solid #4FD6A6`, borderRadius: 14, padding: 14, marginBottom: 12, fontSize: 13, color: "#4FD6A6", fontWeight: 700 }}>
          {tx("✓ Plan zaktualizowany. Trener uwzględni to w kolejnych treningach.")}
        </div>
      )}

      <button onClick={() => onDone({ kcal, zmianaPlanu: planZmieniony ? propozycja?.zmiana : null })} style={{ ...primary, background: "#4FD6A6" }}>{tx("Zapisz trening i zakończ")}</button>
    </div>
  );
}

/* ── Mini wykres liniowy z osiami i skalą (bez bibliotek) ──── */
function MiniChart({ values, color, labels, unit, baseline }) {
  const nums = values.map(Number).filter((n) => !isNaN(n));
  if (nums.length < 2) return null;
  const W = 320, H = 130, padL = 34, padR = 8, padT = 12, padB = 20;
  const realMin = Math.min(...nums), realMax = Math.max(...nums);
  let lo = Math.floor(realMin), hi = Math.ceil(realMax);
  if (baseline != null && baseline < lo) lo = baseline;
  const span = (hi - lo) || 1;
  const px = (i) => padL + (i / (nums.length - 1)) * (W - padL - padR);
  const py = (v) => padT + (1 - (v - lo) / span) * (H - padT - padB);
  const pts = nums.map((v, i) => `${px(i).toFixed(1)},${py(v).toFixed(1)}`).join(" ");
  const area = `${padL},${(H - padB).toFixed(1)} ${pts} ${(W - padR).toFixed(1)},${(H - padB).toFixed(1)}`;
  const yticks = [lo, Math.round(lo + span / 2), hi];
  const xs = [0, Math.floor((nums.length - 1) / 2), nums.length - 1];
  const xlab = (i) => labels && labels[i] != null ? labels[i] : `${i}`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{ background: C.surface2, borderRadius: 10 }}>
      {yticks.map((v, k) => {
        const y = py(v);
        return (
          <g key={k}>
            <line x1={padL} y1={y} x2={W - padR} y2={y} stroke={C.line} strokeWidth="1" strokeDasharray="3 3" />
            <text x={padL - 5} y={y + 3} textAnchor="end" fill={C.sub} fontSize="9" fontVariantNumeric="tabular-nums">{v}</text>
          </g>
        );
      })}
      <polygon points={area} fill={color} opacity="0.12" />
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
      {xs.map((i, k) => (
        <text key={k} x={px(i)} y={H - 6} textAnchor={k === 0 ? "start" : k === xs.length - 1 ? "end" : "middle"} fill={C.sub} fontSize="9">{xlab(i)}</text>
      ))}
      {unit ? <text x={padL - 5} y={padT - 3} textAnchor="end" fill={C.sub} fontSize="8">{unit}</text> : null}
    </svg>
  );
}

/* ── SYLWETKA I POMIARY ───────────────────────────────────── */
function Profil({ profile, setProfile, history, go }) {
  const p = profile || {};
  const meas = p.measurements || [];
  const [sel, setSel] = useState("waga");
  const [val, setVal] = useState("");
  const [editPB, setEditPB] = useState(false);

  // ── edycja danych: zwinięta domyślnie, zapis dopiero po wciśnięciu „Zapisz dane" ──
  const [edytujOtwarte, setEdytujOtwarte] = useState(false);
  const [draft, setDraft] = useState({ name: p.name || "", height: p.height || "", weight: p.weight || "", age: p.age || "", sex: p.sex || "" });
  const [zapisano, setZapisano] = useState(false);
  // przy otwarciu formularza wczytaj aktualne wartości do bufora
  const otworzEdycje = () => {
    setDraft({ name: p.name || "", height: p.height || "", weight: p.weight || "", age: p.age || "", sex: p.sex || "" });
    setZapisano(false);
    setEdytujOtwarte(true);
  };
  const draftUpd = (patch) => { setDraft((d) => ({ ...d, ...patch })); setZapisano(false); };
  // „Zapisz dane": zatwierdza cały bufor naraz; waga dopisuje punkt pomiaru z dziś (podmiana, bez duplikatu)
  const zapiszDane = () => {
    const h = parseInt(String(draft.height).replace(/\D/g, "")) || null;
    const w = parseFloat(String(draft.weight).replace(",", ".")) || null;
    const a = parseInt(String(draft.age).replace(/\D/g, "")) || null;
    let nowe = { ...p, name: draft.name || null, height: h, weight: w, age: a, sex: draft.sex || null };
    if (w && w !== p.weight) {
      const dzisDay = new Date().toDateString();
      const bez = meas.filter((m) => !(m.key === "waga" && new Date(m.date).toDateString() === dzisDay));
      nowe.measurements = [...bez, { date: new Date().toISOString(), key: "waga", value: w }];
    }
    setProfile(nowe);
    setZapisano(true);
  };

  // ── ręczne dodanie pomiaru (waga/talia/tłuszcz/HR) ──
  const addMeasure = () => {
    const v = parseFloat(String(val).replace(",", "."));
    if (!v) return;
    const m = [...meas, { date: new Date().toISOString(), key: sel, value: v }];
    setProfile({ ...p, measurements: m, ...(sel === "waga" ? { weight: v } : {}), ...(sel === "restHR" ? { restHR: v } : {}) });
    setVal("");
  };
  const lastByKey = (k) => {
    const arr = meas.filter((m) => m.key === k).sort((a, b) => new Date(b.date) - new Date(a.date));
    return arr[0]?.value;
  };

  // ── obliczenia ──
  const b = bmi(p.weight, p.height);
  const rek = useMemo(() => liczRekordy(history || []), [history]);
  const fo = useMemo(() => liczForma(profile, history || []), [profile, history]);
  const series = meas.filter((m) => m.key === sel).sort((a, b) => new Date(a.date) - new Date(b.date));
  const def = METRICS.find((m) => m.key === sel) || METRICS[0];

  // najniższe tętno spoczynkowe (z pomiarów albo z profilu)
  const restPom = meas.filter((m) => m.key === "restHR");
  const minRest = restPom.length ? Math.min(...restPom.map((m) => m.value)) : (p.restHR || null);

  const totalKm = (history || []).reduce((a, h) => a + (h.dystans || 0), 0);
  const totalRuns = (history || []).filter((h) => h.dystans != null || /Trening/i.test(h.typ || "")).length;

  // ręczne życiówki (jeśli ktoś chce wpisać, nadpisują szacowane)
  const pb = p.pb || {};
  const updPB = (k, raw) => {
    const v = raw.trim();
    setProfile({ ...p, pb: { ...pb, [k]: v || undefined } });
  };

  const stazLabel = p.assessment?.staz || p.assessment?.poziom || "";
  const celLabel = p.assessment?.cel || p.plan?.tytul || "";

  // karty rekordów: ręczna wartość > szacowana z historii
  const pbCards = [
    { k: "5km", ikona: "5️⃣", label: tx("Życiówka 5 km"), c: C.cool },
    { k: "10km", ikona: "🔟", label: tx("Życiówka 10 km"), c: C.purple },
    { k: "polmaraton", ikona: "🏅", label: tx("Półmaraton"), c: "#FF97AC" },
    { k: "1km", ikona: "🥇", label: tx("Życiówka 1 km"), c: "#F2B457" },
    { k: "tempo", ikona: "⚡", label: "Najszybsze tempo", c: C.accent },
    { k: "dystans", ikona: "📏", label: tx("Najdłuższy bieg"), c: "#4FD6A6" },
  ];

  const SekHdr = ({ children }) => (
    <div style={{ fontSize: 12, color: C.sub, fontWeight: 700, letterSpacing: 1, margin: "20px 0 8px" }}>{children}</div>
  );

  return (
    <div>
      {/* ── NAGŁÓWEK PROFILU ── */}
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 6 }}>
        <div style={{ width: 56, height: 56, borderRadius: 28, background: C.accent, color: C.bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, fontWeight: 800, flexShrink: 0 }}>
          {(p.name || "R").trim().charAt(0).toUpperCase()}
        </div>
        <div style={{ minWidth: 0 }}>
          <h2 style={{ fontSize: 20, fontWeight: 800, margin: 0 }}>{p.name || tx("Twój profil")}</h2>
          <div style={{ fontSize: 12, color: C.sub, marginTop: 2 }}>
            {[stazLabel, celLabel].filter(Boolean).join(" · ") || tx("Uzupełnij swoje dane poniżej")}
          </div>
        </div>
      </div>

      {/* ── PASEK STATYSTYK ── */}
      <div style={{ display: "flex", gap: 8, margin: "12px 0" }}>
        {[
          { v: fo.score != null ? fo.score : "—", l: tx("Forma"), c: C.accent },
          { v: totalKm ? Math.round(totalKm) : "—", l: tx("km łącznie"), c: "#F2B457" },
          { v: totalRuns || "—", l: tx("treningów"), c: C.cool },
          { v: minRest || "—", l: tx("najniższe HR"), c: C.warn },
        ].map((s, i) => (
          <div key={i} style={{ flex: 1, background: C.surface, borderRadius: 12, padding: "12px 6px", textAlign: "center" }}>
            <div style={{ fontSize: 20, fontWeight: 800, color: s.c }}>{s.v}</div>
            <div style={{ fontSize: 10, color: C.sub, marginTop: 2 }}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* ── DANE PODSTAWOWE (tylko do wyświetlenia — edycja niżej) ── */}
      <SekHdr>{tx("DANE PODSTAWOWE")}</SekHdr>
      <div style={{ background: C.surface, borderRadius: 14, padding: 16 }}>
        {[
          { l: tx("Wzrost (cm)"), v: p.height ? `${p.height} cm` : "—" },
          { l: tx("Waga (kg)"), v: p.weight ? `${p.weight} kg` : "—" },
          { l: tx("Wiek"), v: p.age || "—" },
          { l: tx("Płeć (do kalorii)"), v: p.sex === "k" ? "K" : p.sex === "m" ? "M" : "—" },
        ].map((r, i) => (
          <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 0", borderBottom: i < 3 ? `1px solid ${C.line}` : "none" }}>
            <span style={{ fontSize: 13, color: C.sub }}>{r.l}</span>
            <span style={{ fontSize: 15, fontWeight: 800, color: C.ink, fontVariantNumeric: "tabular-nums" }}>{r.v}</span>
          </div>
        ))}
        {b && (
          <div style={{ marginTop: 12, padding: 12, background: C.surface2, borderRadius: 10, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 13, color: C.sub }}>{tx("BMI")}</span>
            <span style={{ fontSize: 16, fontWeight: 800, color: C.accent }}>{b} <span style={{ fontSize: 12, color: C.sub, fontWeight: 500 }}>· {bmiKat(b)}</span></span>
          </div>
        )}
      </div>

      {/* ── AKTUALIZUJ DANE (zwijane; zapis dopiero po wciśnięciu) ── */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "20px 0 8px" }}>
        <span style={{ fontSize: 12, color: C.sub, fontWeight: 700, letterSpacing: 1 }}>{tx("AKTUALIZUJ DANE")}</span>
        <button onClick={() => edytujOtwarte ? setEdytujOtwarte(false) : otworzEdycje()}
          style={{ fontSize: 12, fontWeight: 700, color: C.cool, background: "transparent", border: "none", cursor: "pointer" }}>
          {edytujOtwarte ? tx("Zamknij") : tx("✎ Edytuj")}
        </button>
      </div>
      {edytujOtwarte && (
        <div style={{ background: C.surface, borderRadius: 14, padding: 16 }}>
          <Row label={tx("Imię (opcjonalnie)")}>
            <input value={draft.name} onChange={(e) => draftUpd({ name: e.target.value })} placeholder="Rikipo" style={{ ...smallInp, width: 140, textAlign: "left" }} />
          </Row>
          <Row label={tx("Wzrost (cm)")}>
            <input value={draft.height} onChange={(e) => draftUpd({ height: e.target.value.replace(/\D/g, "") })} inputMode="numeric" placeholder={tx("np. 178")} style={smallInp} />
          </Row>
          <Row label={tx("Waga (kg)")}>
            <input value={draft.weight} onChange={(e) => draftUpd({ weight: e.target.value.replace(/[^\d.,]/g, "") })} inputMode="decimal" placeholder={tx("np. 76")} style={smallInp} />
          </Row>
          <Row label={tx("Wiek")}>
            <input value={draft.age} onChange={(e) => draftUpd({ age: e.target.value.replace(/\D/g, "") })} inputMode="numeric" placeholder={tx("np. 30")} style={smallInp} />
          </Row>
          <Row label={tx("Płeć (do kalorii)")}>
            <div style={{ display: "flex", gap: 6 }}>
              {[["m", "M"], ["k", "K"]].map(([k, l]) => (
                <button key={k} onClick={() => draftUpd({ sex: k })}
                  style={{ width: 44, padding: 8, borderRadius: 8, fontWeight: 800, cursor: "pointer", border: `1px solid ${draft.sex === k ? C.accent : C.line}`, background: draft.sex === k ? C.accent : "transparent", color: draft.sex === k ? C.bg : C.sub }}>{l}</button>
              ))}
            </div>
          </Row>
          <button onClick={zapiszDane}
            style={{ width: "100%", marginTop: 14, padding: "12px 0", borderRadius: 10, border: "none", background: zapisano ? "#4FD6A6" : C.accent, color: C.bg, fontWeight: 800, fontSize: 15, cursor: "pointer" }}>
            {zapisano ? tx("✓ Zapisano") : tx("Zapisz dane")}
          </button>
          <p style={{ fontSize: 11, color: C.sub, margin: "8px 2px 0", lineHeight: 1.5 }}>{tx("Zmiana wagi tutaj aktualizuje też wykres w Pomiarach ciała.")}</p>
        </div>
      )}

      {/* ── POMIARY CIAŁA (edytowalne + wykres) ── */}
      <SekHdr>{tx("POMIARY CIAŁA")}</SekHdr>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>
        {METRICS.map((m) => (
          <button key={m.key} onClick={() => setSel(m.key)}
            style={{ padding: "8px 12px", borderRadius: 20, fontSize: 12, fontWeight: 700, cursor: "pointer",
              border: `1px solid ${sel === m.key ? m.c : C.line}`, background: sel === m.key ? m.c + "22" : "transparent", color: sel === m.key ? m.c : C.sub }}>
            {m.label}{lastByKey(m.key) ? ` · ${lastByKey(m.key)}${m.unit}` : ""}
          </button>
        ))}
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        <input value={val} onChange={(e) => setVal(e.target.value)} inputMode="decimal" placeholder={`${def.label} (${def.unit})`} style={inp} />
        <button onClick={addMeasure} style={{ padding: "0 18px", borderRadius: 10, border: "none", background: def.c, color: C.bg, fontWeight: 800, cursor: "pointer" }}>{tx("Zapisz")}</button>
      </div>
      <p style={{ fontSize: 11, color: C.sub, margin: "6px 2px 0", lineHeight: 1.5 }}>{def.hint}</p>
      <div style={{ background: C.surface, borderRadius: 14, padding: 14, marginTop: 10 }}>
        {series.length > 1 ? (
          <>
            <MiniChart values={series.map((s) => String(s.value))} color={def.c} labels={series.map((s) => new Date(s.date).toLocaleDateString("pl-PL", { day: "numeric", month: "short" }))} />
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.sub, marginTop: 6 }}>
              <span>{new Date(series[0].date).toLocaleDateString("pl-PL", { day: "numeric", month: "short" })}: {series[0].value}{def.unit}</span>
              <span style={{ color: def.c, fontWeight: 700 }}>
                {series[series.length - 1].value - series[0].value > 0 ? "+" : ""}{+(series[series.length - 1].value - series[0].value).toFixed(1)}{def.unit}
              </span>
              <span>{tx("teraz:")} {series[series.length - 1].value}{def.unit}</span>
            </div>
          </>
        ) : series.length === 1 ? (
          <div style={{ textAlign: "center", padding: "8px 0" }}>
            <div style={{ fontSize: 28, fontWeight: 800, color: def.c }}>{series[0].value}<span style={{ fontSize: 14, color: C.sub, fontWeight: 600 }}>{def.unit}</span></div>
            <div style={{ fontSize: 12, color: C.sub, marginTop: 2 }}>{new Date(series[0].date).toLocaleDateString("pl-PL", { day: "numeric", month: "short" })} · {tx("Dodaj drugi pomiar, by zobaczyć wykres.")}</div>
          </div>
        ) : (
          <p style={{ fontSize: 13, color: C.sub, margin: 0 }}>{tx("Zapisz co najmniej 2 pomiary, żeby zobaczyć wykres postępu.")}</p>
        )}
      </div>

      {/* ── PROFIL ŻYWIENIOWY (z ankiety dietetycznej, tylko do wglądu + skrót do edycji) ── */}
      <SekHdr>{tx("Profil żywieniowy")}</SekHdr>
      <div style={{ background: C.card, borderRadius: 14, padding: 14, marginBottom: 4 }}>
        {(() => {
          const dp = p.dietPrefs || {};
          const wiersze = [];
          if (dp.unikam?.length) wiersze.push([tx("Alergie / nie jadasz"), dp.unikam.join(", ")]);
          if (dp.kuchnia?.length) wiersze.push([tx("Ulubiona kuchnia"), dp.kuchnia.join(", ")]);
          if (p.wakeTime || p.sleepTime) wiersze.push([tx("Twój dzień"), `${p.wakeTime || "?"} – ${p.sleepTime || "?"}`]);
          if (dp.celWagowy) {
            const cw = { schudnac: tx("Schudnąć"), utrzymac: tx("Utrzymać wagę"), przytyc: tx("Przytyć / masa") }[dp.celWagowy];
            wiersze.push([tx("Cel wagowy"), cw + (dp.tempoZmiany?.trim() ? ` (${dp.tempoZmiany.trim()})` : "")]);
          }
          if (dp.zdrowie?.trim()) wiersze.push([tx("Schorzenia / leki (wpływ na dietę)"), dp.zdrowie.trim()]);
          if (dp.uwagi?.trim()) wiersze.push([tx("Uwagi dla dietetyka"), dp.uwagi.trim()]);
          return wiersze.length ? wiersze.map(([k, v], i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", gap: 10, padding: "5px 0", borderBottom: i < wiersze.length - 1 ? `1px solid ${C.line}` : "none" }}>
              <span style={{ fontSize: 12, color: C.sub, flexShrink: 0 }}>{k}</span>
              <span style={{ fontSize: 13, fontWeight: 600, textAlign: "right" }}>{v}</span>
            </div>
          )) : <p style={{ fontSize: 13, color: C.sub, margin: 0 }}>{tx("Nie wypełniono jeszcze ankiety dietetycznej.")}</p>;
        })()}
        <button onClick={() => go("dieta")} style={{ ...ghost, marginTop: 10, width: "100%" }}>{tx("Edytuj w Asystencie diety →")}</button>
      </div>

      {/* ── REKORDY / ŻYCIÓWKI (auto z historii + ręczna edycja) ── */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "20px 0 8px" }}>
        <span style={{ fontSize: 12, color: C.sub, fontWeight: 700, letterSpacing: 1 }}>{tx("REKORDY / ŻYCIÓWKI")}</span>
        <button onClick={() => setEditPB((s) => !s)} style={{ fontSize: 12, fontWeight: 700, color: C.cool, background: "transparent", border: "none", cursor: "pointer" }}>
          {editPB ? tx("Gotowe") : tx("Edytuj ręcznie")}
        </button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
        {pbCards.map((c) => {
          const reczne = pb[c.k];
          const auto = rek[c.k];
          const wartosc = reczne || (auto ? auto.val : null);
          return (
            <div key={c.k} style={{ background: C.surface, borderRadius: 12, padding: 12 }}>
              <div style={{ fontSize: 11, color: C.sub, display: "flex", alignItems: "center", gap: 5 }}>
                <span>{c.ikona}</span>{c.label}
              </div>
              {editPB ? (
                <input value={reczne || ""} onChange={(e) => updPB(c.k, e.target.value)} placeholder={auto ? auto.val : tx("wpisz")} 
                  style={{ width: "100%", marginTop: 6, padding: "6px 8px", borderRadius: 8, border: `1px solid ${C.line}`, background: C.surface2, color: C.ink, fontSize: 14, fontWeight: 800, outline: "none", boxSizing: "border-box" }} />
              ) : (
                <div style={{ fontSize: 17, fontWeight: 800, color: wartosc ? c.c : C.line, marginTop: 4 }}>
                  {wartosc || "—"}{reczne ? <span style={{ fontSize: 10, color: C.sub, fontWeight: 500 }}> · ręcznie</span> : (auto && auto.sub ? <span style={{ fontSize: 10, color: C.sub, fontWeight: 500 }}> · {auto.sub}</span> : null)}
                </div>
              )}
            </div>
          );
        })}
      </div>
      <p style={{ fontSize: 11, color: C.sub, margin: "8px 2px 0", lineHeight: 1.5 }}>
        {tx("Rekordy liczą się automatycznie z Twoich biegów z GPS. Możesz też wpisać własne wyniki ręcznie — np. z zawodów.")}

// próbuje policzyć posiłek lokalnie. Zwraca {meal, opis} albo null jeśli się nie da.
function liczLokalnie(tekst) {
  if (!tekst) return null;
  const t = tekst.toLowerCase();
  // podziel po przecinkach / "i" / "oraz"
  const czesci = t.split(/,| i | oraz |\+/).map((s) => s.trim()).filter(Boolean);
  let total = { kcal: 0, b: 0, t: 0, w: 0 };
  const nazwy = [];
  let rozpoznaneWszystko = czesci.length > 0;

  for (const cz of czesci) {
    const liczba = cz.match(/(\d+)/);
    const mult = liczba ? Math.min(20, parseInt(liczba[1], 10)) : 1;
    const food = FOOD_DB.find((f) => f.k.some((kw) => cz.includes(kw)));
    if (!food) { rozpoznaneWszystko = false; continue; }
    total.kcal += food.kcal * mult;
    total.b += food.b * mult; total.t += food.t * mult; total.w += food.w * mult;
    nazwy.push(mult > 1 ? `${mult}× ${food.n}` : food.n);
  }

  // licz lokalnie tylko jeśli rozpoznaliśmy wszystkie składniki (inaczej AI)
  if (!rozpoznaneWszystko || nazwy.length === 0) return null;
  return {
    meal: { date: new Date().toISOString(), nazwa: nazwy.join(" + "), kcal: Math.round(total.kcal), protein: Math.round(total.b), fat: Math.round(total.t), carbs: Math.round(total.w) },
    opis: `Policzone z bazy (szacunek): ${nazwy.join(", ")}. Razem ~${Math.round(total.kcal)} kcal. Bez użycia AI.`,
  };
}
