<script>
/* ── Mostek natywny (Capacitor) ─────────────────────────────────────────
   Gdy apka działa jako natywna aplikacja Android, bridge.js wystawia
   window.RikipoNative i GPS idzie przez plugin background-geolocation
   (usługa w tle — ekran może być zgaszony). W zwykłej przeglądarce
   bridge.js nie istnieje i wszystko działa po staremu przez API webowe. */
window.gpsWatch = function (cb, errCb, opts) {
  var N = window.RikipoNative;
  if (N && N.Capacitor && N.Capacitor.isNativePlatform && N.Capacitor.isNativePlatform()) {
    var token = { native: true, id: null, dead: false };
    N.BackgroundGeolocation.addWatcher(
      {
        backgroundTitle: "Trening w toku",
        backgroundMessage: "Rikipo Run zapisuje tras\u0119 w tle",
        requestPermissions: true,
        stale: false,
        distanceFilter: 0
      },
      function (loc, err) {
        if (err) {
          if (err.code === "NOT_AUTHORIZED") alert("Zezw\u00f3l na lokalizacj\u0119 \u201eZawsze\u201d w ustawieniach aplikacji \u2014 bez tego GPS nie dzia\u0142a w tle.");
          if (errCb) errCb(err);
          return;
        }
        cb({
          coords: {
            latitude: loc.latitude, longitude: loc.longitude,
            accuracy: loc.accuracy, altitude: loc.altitude == null ? null : loc.altitude,
            speed: loc.speed == null ? null : loc.speed
          },
          timestamp: loc.time || Date.now()
        });
      }
    ).then(function (id) {
      token.id = id;
      if (token.dead) N.BackgroundGeolocation.removeWatcher({ id: id });
    });
    return token;
  }
  return gpsWatch(cb, errCb, opts);
};
window.gpsClearWatch = function (h) {
  var N = window.RikipoNative;
  if (h && h.native) {
    h.dead = true;
    if (h.id && N) N.BackgroundGeolocation.removeWatcher({ id: h.id });
    return;
  }
  if (h != null && navigator.geolocation) navigator.geolocation.clearWatch(h);
};
/* Pas t\u0119tna w natywnej apce: WebView nie ma Web Bluetooth,
   wi\u0119c ��czymy przez plugin bluetooth-le. */
window.hrNative = {
  ok: function () {
    var N = window.RikipoNative;
    return !!(N && N.Capacitor && N.Capacitor.isNativePlatform && N.Capacitor.isNativePlatform());
  },
  connect: async function (onBpm, onDisc) {
    var N = window.RikipoNative;
    await N.BleClient.initialize({ androidNeverForLocation: true });
    var dev = await N.BleClient.requestDevice({ services: [N.HR.service] });
    await N.BleClient.connect(dev.deviceId, function () { if (onDisc) onDisc(); });
    await N.BleClient.startNotifications(dev.deviceId, N.HR.service, N.HR.char, function (v) {
      var f = v.getUint8(0);
      onBpm(f & 0x01 ? v.getUint16(1, true) : v.getUint8(1));
    });
    return dev;
  },
  reconnect: async function (dev, onBpm) {
    var N = window.RikipoNative;
    await N.BleClient.connect(dev.deviceId);
    await N.BleClient.startNotifications(dev.deviceId, N.HR.service, N.HR.char, function (v) {
      var f = v.getUint8(0);
      onBpm(f & 0x01 ? v.getUint16(1, true) : v.getUint8(1));
    });
  },
  disconnect: function (dev) {
    try { window.RikipoNative.BleClient.disconnect(dev.deviceId); } catch (e) { /* ignore */ }
  }
};
</script>

// Trwały zapis: w Chrome używamy localStorage zamiast window.storage z Claude.
(function(){
  var P='rr_';
  window.storage = {
    get:   function(k){ try{var v=localStorage.getItem(P+k); return Promise.resolve(v==null?null:{key:k,value:v,shared:false});}catch(e){return Promise.resolve(null);} },
    set:   function(k,v){ try{localStorage.setItem(P+k,v);}catch(e){} return Promise.resolve({key:k,value:v,shared:false}); },
    delete:function(k){ try{localStorage.removeItem(P+k);}catch(e){} return Promise.resolve({key:k,deleted:true,shared:false}); },
    list:  function(prefix){ var ks=[]; try{for(var i=0;i<localStorage.length;i++){var kk=localStorage.key(i); if(kk&&kk.indexOf(P)===0){var b=kk.slice(P.length); if(!prefix||b.indexOf(prefix)===0)ks.push(b);}}}catch(e){} return Promise.resolve({keys:ks}); }
  };
})();
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;


/* ════════════════════════════════════════════════════════════
   RIKIPO · RUN — asystent treningowy
   Paleta: nocny asfalt + neon limonka
════════════════════════════════════════════════════════════ */
const C = {
  // ── „Bałtycki świt” (Rügen): morze przed wschodem, kreda klifów, koral horyzontu ──
  bg: "#08202E", surface: "#0E2C3C", surface2: "#14384B", line: "#2A5063",
  ink: "#F1F7F4", sub: "#96B2BD", accent: "#FF8A70", warn: "#FF5D6E",
  cool: "#5FC9EA", purple: "#A48FEE",
  // nowe tokeny (dawniej luźne hexy): szkło morskie / piasek wydm / dzika róża / mgła
  ok: "#4FD6A6", sand: "#F2B457", rose: "#FF97AC", off: "#5C7583",
  // głębia: gradient tła kart + cienie — używane w stylach kafelków
  cardGrad: "linear-gradient(150deg, #123545 0%, #0C2836 100%)",
  shadow: "0 6px 18px rgba(2,14,22,0.5)",
  glow: "0 4px 14px rgba(255,138,112,0.28)",
  // sygnatura: łuna świtu nad horyzontem — tło głównych ekranów (użycie: background: C.dawn)
  dawn: "radial-gradient(1100px 560px at 50% -120px, rgba(255,138,112,0.30), rgba(255,138,112,0) 62%), radial-gradient(1700px 850px at 50% -260px, rgba(95,201,234,0.12), rgba(95,201,234,0) 55%), linear-gradient(180deg, #0E2C3D 0%, #08202E 380px)",
};
const STORE = "rikipo_assist_v1";

const fmt = (s) => `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;

/* ── Bezpieczne wywołanie API Claude ──────────────────────────
   Sprawdza status HTTP i obecność content. Rzuca błędem z czytelnym
   komunikatem zamiast wywalać się na data.content === undefined.
   Zwraca sklejony tekst z bloków typu "text".
─────────────────────────────────────────────────────────────*/
/* ── Klucz API: zapisywany lokalnie na urządzeniu, NIE w kodzie ──
   Dzięki temu plik HTML nie zawiera klucza. Apka prosi o klucz raz
   (w Ustawieniach), trzyma go w localStorage tego telefonu i dokleja
   do każdego zapytania. Plik bez klucza jest bezpieczny do trzymania. */
const API_KEY_LS = "rr_anthropic_api_key";   // klucz Claude (sk-ant-...)
const GEMINI_KEY_LS = "rr_gemini_api_key";    // klucz Gemini (AIza...)
const PROVIDER_LS = "rr_ai_provider";         // "claude" | "gemini"

function getProvider() {
  try { return localStorage.getItem(PROVIDER_LS) === "gemini" ? "gemini" : "claude"; } catch { return "claude"; }
}
function setProvider(p) {
  try { localStorage.setItem(PROVIDER_LS, p === "gemini" ? "gemini" : "claude"); } catch {}
}
// Klucz aktywnego dostawcy (do wywołań). 
function getApiKey() {
  try { return (localStorage.getItem(getProvider() === "gemini" ? GEMINI_KEY_LS : API_KEY_LS) || "").trim(); } catch { return ""; }
}
// Zapis klucza dla KONKRETNEGO dostawcy (do pól w Ustawieniach).
function getKeyFor(p) {
  try { return (localStorage.getItem(p === "gemini" ? GEMINI_KEY_LS : API_KEY_LS) || "").trim(); } catch { return ""; }
}
function setKeyFor(p, v) {
  const ls = p === "gemini" ? GEMINI_KEY_LS : API_KEY_LS;
  try { if (v && v.trim()) localStorage.setItem(ls, v.trim()); else localStorage.removeItem(ls); } catch {}
}
// Zgodność wstecz: setApiKey/hasApiKey działają na aktywnym dostawcy.
function setApiKey(v) { setKeyFor(getProvider(), v); }
function hasApiKey() { return !!getApiKey(); }

/* ── GPS: ręczny włącznik + jednorazowy pomiar pozycji ─────────
   Użytkownik może wyłączyć GPS w Ustawieniach (np. trening na bieżni
   albo gdy Brave/Chrome blokuje lokalizację). Gdy wyłączony, aplikacja
   nie próbuje czytać pozycji i od razu prosi o ręczny dystans.
   Domyślnie włączony. */
const GPS_LS = "rr_gps_enabled";
function gpsEnabled() {
  try { return localStorage.getItem(GPS_LS) !== "0"; } catch { return true; }
}
function setGpsEnabled(on) {
  try { localStorage.setItem(GPS_LS, on ? "1" : "0"); } catch {}
}
// Jednorazowy odczyt pozycji z czytelnym kodem błędu (do testu w Ustawieniach).
// Zwraca Promise<{ok:true,coords} | {ok:false,code}>; code: "off"|"denied"|"unavailable"|"timeout"|"nosupport".
function locateOnce(highAccuracy) {
  return new Promise((resolve) => {
    if (!gpsEnabled()) return resolve({ ok: false, code: "off" });
    if (typeof navigator === "undefined" || !navigator.geolocation) return resolve({ ok: false, code: "nosupport" });
    navigator.geolocation.getCurrentPosition(
      (p) => resolve({ ok: true, coords: { lat: p.coords.latitude, lng: p.coords.longitude, acc: p.coords.accuracy } }),
      (err) => {
        const c = err && err.code;
        resolve({ ok: false, code: c === 1 ? "denied" : c === 2 ? "unavailable" : "timeout" });
      },
      { enableHighAccuracy: highAccuracy !== false, timeout: 15000, maximumAge: 0 }
    );
  });
}

async function callClaude(body) {
  const provider = getProvider();
  const key = getApiKey();
  if (!key) throw new Error("nokey");
  return provider === "gemini" ? callGemini(body, key) : callAnthropic(body, key);
}

/* ── Dostawca: Anthropic (Claude) ───────────────────────────── */
async function callAnthropic(body, key) {
  let res;
  try {
    res = await fetch("https://api.anthropic.com/v1/messages", {

/* ── Persistencja: window.storage (artefakt) → localStorage → pamięć ── */
const hasStore = typeof window !== "undefined" && window.storage && typeof window.storage.get === "function";
const hasLS = (() => { try { return typeof localStorage !== "undefined" && !!localStorage; } catch { return false; } })();
let memStore = {};
async function loadState() {
  if (hasStore) {
    try { const r = await window.storage.get(STORE); if (r) return JSON.parse(r.value); } catch { /* ignore */ }
  }
  if (hasLS) {
    try { const v = localStorage.getItem(STORE); if (v) return JSON.parse(v); } catch { /* ignore */ }
  }
  if (memStore[STORE]) return memStore[STORE];
  return null;
}
async function saveState(s) {
  memStore[STORE] = s;
  if (hasStore) {
    try { await window.storage.set(STORE, JSON.stringify(s)); } catch (e) { console.error(e); }
  }
  if (hasLS) {
    try { localStorage.setItem(STORE, JSON.stringify(s)); } catch (e) { /* quota */ }
  }
}

/* ── Reset wszystkiego do zera ─────────────────────────────────
   Czyści cały zapisany stan (profil, historia, plan, trasy, pomiary,
   dema, konto) oraz wszystkie klucze rr_ w localStorage. ŚWIADOMIE
   zachowuje klucz API i ustawienie GPS — to konfiguracja urządzenia,
   nie dane treningowe. Po wyczyszczeniu przeładowuje aplikację. */
async function resetEverything() {
  try { delete memStore[STORE]; } catch {}
  try { if (hasStore && window.storage?.delete) await window.storage.delete(STORE); } catch {}
  try {
    if (hasLS) {
      const keep = new Set([API_KEY_LS, GEMINI_KEY_LS, PROVIDER_LS, GPS_LS]);
      const toRemove = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.indexOf("rr_") === 0 && !keep.has(k)) toRemove.push(k);
      }
      toRemove.forEach((k) => localStorage.removeItem(k));
      localStorage.removeItem(STORE);
    }
  } catch {}
  try { location.reload(); } catch {}
}

/* ── Wczytanie kopii zapasowej (.json) ─────────────────────────
   Nadpisuje WSZYSTKO danymi z pliku backupu: profil, historię i
   rozmowy z trenerem. Zachowuje zalogowane konto/użytkownika z
   bieżącego stanu (to nie jest częścią backupu) oraz klucz API i
   ustawienie GPS (urządzenie). Po zapisie przeładowuje aplikację,
   żeby świeży stan wczytał się przez loadState. */
async function restoreBackup(obj) {
  if (!obj || typeof obj !== "object") throw new Error("bad");
  // Zachowaj bieżące konto/użytkownika, jeśli są w pamięci sesji.
  let cur = {};
  try { cur = memStore[STORE] || {}; } catch {}
  if (hasLS && (!cur || !Object.keys(cur).length)) {
    try { const v = localStorage.getItem(STORE); if (v) cur = JSON.parse(v) || {}; } catch {}
  }
  const nowy = {
    profile: obj.profile || null,
    history: Array.isArray(obj.history) ? obj.history : [],
    coachMsgs: Array.isArray(obj.coachMsgs) ? obj.coachMsgs : [],
    account: cur.account || null,
    user: cur.user || null,
  };
  await saveState(nowy);
  try { location.reload(); } catch {}
}

/* ── Strefy tętna (Karvonen uproszczony, HRmax=220-wiek) ──── */
// Jeden spójny wzór maksymalnego tętna w całej aplikacji (Tanaka 2001 — dokładniejszy niż 220−wiek).
function hrMaxTanaka(age) { return Math.round(208 - 0.7 * (age || 30)); }
// Strefy tętna. Gdy znane jest tętno spoczynkowe (rest), liczymy metodą Karvonena
// (rezerwa tętna: %HRR·(HRmax−HRrest)+HRrest) — dokładniejszą i spójną z liczeniem
// kalorii (ACSM/HRR). Bez restHR — fallback do %HRmax (jak dotychczas).
function hrZones(age, rest) {
  const max = hrMaxTanaka(age);
  const r = (typeof rest === "number" && rest >= 30 && rest < max) ? rest : null;
  const at = (frac) => r != null ? Math.round(frac * (max - r) + r) : Math.round(max * frac);
  const granice = [at(0.50), at(0.60), at(0.70), at(0.80), at(0.90), max];
  const def = [
    { name: "Z1 Regeneracja",        c: C.cool },
    { name: "Z2 Spokojny / tlenowy", c: "#4FD6A6" },
    { name: "Z3 Tempo",              c: C.accent },
    { name: tx("Z4 Próg"),           c: "#F2B457" },
    { name: "Z5 Maks",               c: C.warn },
  ];
  return def.map((z, i) => ({
    ...z,
    lo: i === 0 ? granice[0] : granice[i] + 1,
    hi: granice[i + 1],
  }));
}

/* ── Bieżąca strefa tętna + wspólna plakietka pulsu ───────────
   strefaHR: dla danego bpm zwraca {name, c, lo, hi, z} albo null
   (gdy brak wieku w profilu). PulsBadge: ❤ bpm + chip Z1–Z5
   w kolorze strefy — jedno źródło prawdy dla wszystkich ekranów. */
function strefaHR(bpmVal, profile) {
  if (!bpmVal || !profile?.age) return null;
  const zs = hrZones(profile.age, profile.restHR);
  for (let i = zs.length - 1; i >= 0; i--) if (bpmVal >= zs[i].lo) return { ...zs[i], z: i + 1 };
  return { ...zs[0], z: 1 };
}
function PulsBadge({ bpm, profile, style }) {
  if (!bpm) return null;
  const s = strefaHR(bpm, profile);
  const c = s?.c || "#FF6E86";
  return (
    <div style={{ fontSize: 14, fontWeight: 700, color: c, textAlign: "center", ...style }}>
      ❤ {bpm} {tx("bpm")}{s ? <span style={{ marginLeft: 7, fontSize: 11, fontWeight: 800, padding: "1px 7px", borderRadius: 999, background: `${c}22`, border: `1px solid ${c}55` }}>Z{s.z}</span> : null}
    </div>
  );
}

/* ── Kalorie ──────────────────────────────────────────────────
   Najdokładniej: z tętna, wagi, wieku i czasu (wzór Keytel).
   Zapas: z dystansu i wagi (~0.9 kcal/kg/km biegu).
─────────────────────────────────────────────────────────────*/
function kcalFromHR({ avgHR, weight, age, sex, minutes }) {
  if (!avgHR || !weight || !age || !minutes) return null;
  // sex: 'm' lub 'k'; wzór Keytel 2005
  const perMin = sex === "k"
    ? (-20.4022 + 0.4472 * avgHR - 0.1263 * weight + 0.074 * age) / 4.184
    : (-55.0969 + 0.6309 * avgHR + 0.1988 * weight + 0.2017 * age) / 4.184;
  return Math.max(0, Math.round(perMin * minutes));
}
/* Najdokładniejsza dostępna metoda kalorii:
   1) VO2max + rezerwa tętna (ACSM): %HRR → %VO2max → ml/kg/min → kcal.
      Uwzględnia wiek (HRmax), tętno spoczynkowe (HRrest), realne VO2max z testu.
   2) Keytel (z avgHR) — gdy brak VO2max/HRrest.
   3) Z dystansu (MET biegu wg tempa) — gdy brak danych HR.
   Zwraca {kcal, metoda}. */
function kcalDokladnie({ avgHR, weight, age, sex, minutes, vo2max, restHR, km }) {
  if (avgHR && weight && minutes && vo2max && restHR && age) {
    const hrMax = hrMaxTanaka(age);            // Tanaka (helper) — spójne z hrZones
    const hrr = Math.max(0, Math.min(1, (avgHR - restHR) / Math.max(1, hrMax - restHR)));
    const vo2 = 3.5 + hrr * (vo2max - 3.5);   // ml/kg/min w czasie wysiłku
    const lO2 = (vo2 * weight) / 1000;        // litry O2 / min
    const kcal = Math.round(lO2 * 5 * minutes); // ~5 kcal / l O2
    return { kcal: Math.max(0, kcal), metoda: tx("VO₂max + rezerwa tętna (ACSM)") };
  }
  if (avgHR && weight && age && minutes) {
    return { kcal: kcalFromHR({ avgHR, weight, age, sex, minutes }), metoda: tx("Keytel (tętno)") };
  }
  if (km && weight && minutes) {
    const tempoMinKm = minutes / km;
    // MET biegu z tempa (przybliżenie ACSM): szybciej = więcej MET
    const met = tempoMinKm > 0 ? Math.max(6, Math.min(16, 0.2 * (km * 1000 / minutes) * 60 / 1000 * 3.5 + 3.5)) : 9;
    const kcal = Math.round((met * 3.5 * weight / 200) * minutes);
    return { kcal: Math.max(0, kcal), metoda: "tempo i dystans (MET)" };
  }
  if (km && weight) return { kcal: kcalFromDist({ km, weight }), metoda: "dystans (szacunek)" };
  return { kcal: null, metoda: null };
}
function kcalFromDist({ km, weight }) {
  if (!km || !weight) return null;
  return Math.round(0.9 * weight * km);
}
function bmi(weight, heightCm) {
  if (!weight || !heightCm) return null;
  const h = heightCm / 100;
  return +(weight / (h * h)).toFixed(1);
}
const bmiKat = (b) => b == null ? "" : b < 18.5 ? "niedowaga" : b < 25 ? "norma" : b < 30 ? "nadwaga" : tx("otyłość");

/* ── Zapotrzebowanie i cele diety ─────────────────────────────
   BMR (Mifflin-St Jeor) → TDEE (mnożnik aktywności) → cel wg trybu.
─────────────────────────────────────────────────────────────*/
function bmr({ weight, height, age, sex }) {
  if (!weight || !height || !age) return null;
  const base = 10 * weight + 6.25 * height - 5 * age;
  return Math.round(sex === "k" ? base - 161 : base + 5);
}
// mnożnik aktywności bazowej (bez samego treningu — ten dodajemy osobno z aplikacji)
const ACT = { 1: 1.2, 2: 1.375, 3: 1.55, 4: 1.725 };
function tdee(profile, burnedToday = 0) {
  const b = bmr(profile);
  if (!b) return null;
  const mult = ACT[profile?.activity || 2];
  return Math.round(b * mult + (burnedToday || 0));
}
// cel kaloryczny wg trybu diety
function calorieGoal(profile, burnedToday = 0) {
  const t = tdee(profile, burnedToday);
  if (!t) return null;
  const mode = profile?.dietMode || "utrzymanie";
  if (mode === "redukcja") return Math.round(t - 400);
  if (mode === "masa") return Math.round(t + 300);
  return t; // utrzymanie / pod bieg
}
// cele makro w gramach (białko wg masy ciała, reszta z kcal)
function macroGoal(profile, kcalGoal) {
  if (!kcalGoal || !profile?.weight) return null;
  const mode = profile?.dietMode || "utrzymanie";
  const proteinPerKg = mode === "masa" ? 1.8 : mode === "redukcja" ? 2.0 : 1.6;
  const protein = Math.round(profile.weight * proteinPerKg);
  const fat = Math.round((kcalGoal * 0.27) / 9);
  const carbs = Math.round((kcalGoal - protein * 4 - fat * 9) / 4);
  return { protein, fat, carbs: Math.max(0, carbs) };
}
// cel nawodnienia (ml): 35 ml/kg + 500 ml za trening
function waterGoal(profile, trainedToday) {
  if (!profile?.weight) return 2000;
  return Math.round(profile.weight * 35 + (trainedToday ? 500 : 0));
}

/* ── Error boundary: zamiast bia\u0142ego ekranu poka\u017c komunikat ── */
class Boundary extends React.Component {
  constructor(p) { super(p); this.state = { err: null }; }

          <pre style={{ background: C.surface, padding: 12, borderRadius: 10, fontSize: 12, color: C.cool, whiteSpace: "pre-wrap", overflowX: "auto" }}>
            {String(this.state.err?.message || this.state.err)}
          </pre>
        </div>
      );
    }
    return this.props.children;
  }
}

function App() {
  const [screen, setScreen] = useState("home");
  const [profile, setProfile] = useState(null); // {age, plan, assessment, restHR, progress, ytUrl, spotifyUrl}
  const [history, setHistory] = useState([]);
  const [coachMsgs, setCoachMsgs] = useState([]); // pamięć rozmowy z trenerem
  const [guidedIdx, setGuidedIdx] = useState(null); // który trening prowadzimy
  const [loaded, setLoaded] = useState(false);
  const [account, setAccount] = useState(null); // null = pokaż wybór trybu
  const [user, setUser] = useState(null); // {email, name, picture} — logowanie w trybie product
  const [changingMode, setChangingMode] = useState(false); // ekran zmiany trybu (z możliwością anulowania)
  const hr = useHeartRate(); // globalne połączenie z opaską — działa we wszystkich ekranach

  // status internetu (navigator.onLine + zdarzenia online/offline)
  const [online, setOnline] = useState(typeof navigator !== "undefined" ? navigator.onLine !== false : true);
  useEffect(() => {
    const up = () => setOnline(true), down = () => setOnline(false);
    window.addEventListener("online", up);
    window.addEventListener("offline", down);
    return () => { window.removeEventListener("online", up); window.removeEventListener("offline", down); };
  }, []);

  // status GPS: "ok" gdy zgoda i odczyt pozycji, "off" gdy odmowa/brak, null gdy nieznany
  const [gps, setGps] = useState(null);
  useEffect(() => {
    if (!gpsEnabled()) { setGps("off"); return; }
    if (typeof navigator === "undefined" || !navigator.geolocation) { setGps("off"); return; }
    let alive = true;
    const sprawdz = () => navigator.geolocation.getCurrentPosition(
      () => alive && setGps("ok"),
      () => alive && setGps("off"),
      { timeout: 15000, maximumAge: 600000 }
    );
    if (navigator.permissions?.query) {
      navigator.permissions.query({ name: "geolocation" }).then((st) => {
        if (!alive) return;
        const apply = () => { if (st.state === "granted") sprawdz(); else if (st.state === "denied") setGps("off"); else setGps(null); };
        apply();
        st.onchange = apply;
      }).catch(sprawdz);
    } else sprawdz();
    return () => { alive = false; };
  }, []);

  useEffect(() => {
    loadState().then((s) => {
      if (s) {
        setProfile(s.profile || null);
        setHistory(s.history || []);
        setCoachMsgs(s.coachMsgs || []);
        setAccount(s.account || null);
        setUser(s.user || null);
      }
      setLoaded(true);
    });
  }, []);

  const persist = (p, h, c, a, u) => saveState({
    profile: p ?? profile, history: h ?? history, coachMsgs: c ?? coachMsgs, account: a ?? account, user: u ?? user,
  });

  // Auto-zapis: po załadowaniu, przy każdej zmianie kluczowego stanu — gwarancja trwałości
  useEffect(() => {
    if (!loaded) return;
    saveState({ profile, history, coachMsgs, account, user });
  }, [loaded, profile, history, coachMsgs, account, user]);

  const saveAccount = (a) => { setAccount(a); persist(profile, history, coachMsgs, a); };

  // ── LOGOWANIE (symulowane "Zaloguj przez Google") + baza klientów ──
  // Prawdziwy OAuth wymaga backendu — tu zapisujemy klienta lokalnie.
  const zalogujGoogle = async (email, name) => {
    const u = { email, name, picture: null, od: new Date().toISOString() };
    setUser(u);
    if (hasStore) {
      try {
        const r = await window.storage.get("rikipo_clients").catch(() => null);
        const lista = r ? JSON.parse(r.value) : [];
        if (!lista.find((c) => c.email === email)) lista.push(u);
        await window.storage.set("rikipo_clients", JSON.stringify(lista));
      } catch { /* ignore */ }
    }
    persist(profile, history, coachMsgs, account, u);
    setScreen("home");
  };
  const wyloguj = () => { setUser(null); persist(profile, history, coachMsgs, account, null); };

  // zużycie kredytu: rodzaj 'rozmowa' | 'zdjecie'. W personal — zawsze wolne.
  // Zwraca true gdy można działać (i zdejmuje kredyt), false gdy brak kredytów.
  const useCredit = (rodzaj = "rozmowa") => {
    if (!account || account.tryb === "personal") return true; // darmowe AI dla Rikipo
    const pole = rodzaj === "zdjecie" ? "zdjeciaLeft" : "rozmowyLeft";
    if ((account[pole] || 0) <= 0) return false;
    const na = { ...account, [pole]: account[pole] - 1 };
    saveAccount(na);
    return true;
  };

  // Zwrot kredytu, gdy wywołanie AI się nie powiedzie (tryb produktowy).
  const refundCredit = (rodzaj = "rozmowa") => {
    if (!account || account.tryb === "personal") return;
    const pole = rodzaj === "zdjecie" ? "zdjeciaLeft" : "rozmowyLeft";
    if (account[pole] === Infinity) return;
    saveAccount({ ...account, [pole]: (account[pole] || 0) + 1 });
  };

  // p to PEŁNY profil z polem plan. keepProgress=true przy KOREKCIE (check-in) —
  // wtedy nie zerujemy ukończonych treningów; przy zupełnie nowym planie zerujemy.
  const setPlan = (p, keepProgress = false) => {
    let plan = p.plan || p;
    // jeśli plan przyszedł jako CYKL wielotygodniowy — aktywuj pierwszy tydzień
    if (plan?.cykl?.length && !plan.treningi) {
      plan = { ...plan, tydzienIdx: 0, treningi: plan.cykl[0].treningi || [] };
    }
    const baza = p.plan ? { ...p, plan } : { ...(profile || {}), plan, termin: p.termin };
    const np = keepProgress
      ? { ...baza, plan, progress: p.progress || profile?.progress || [] }
      : { ...baza, plan, progress: [] };
    setProfile(np); persist(np, history, coachMsgs); setScreen("home");
  };
  // przejście do kolejnego tygodnia cyklu: zeruje postęp, pokazuje notatkę trenera
  const nastepnyTydzien = () => {
    const plan = profile?.plan; if (!plan?.cykl?.length) return;
    const next = Math.min(plan.cykl.length - 1, (plan.tydzienIdx || 0) + 1);
    const tydz = plan.cykl[next];
    const np = { ...(profile || {}), plan: { ...plan, tydzienIdx: next, treningi: tydz.treningi || [] }, progress: [] };
    setProfile(np); persist(np, history, coachMsgs); setScreen("home");
  };
  // zostań przy planie: powtórz ten sam plan/cykl od początku (zeruj postęp)
  const zostanPrzyPlanie = () => {
    if (!profile?.plan) return;
    let plan = profile.plan;
    if (plan.cykl?.length) plan = { ...plan, tydzienIdx: 0, treningi: plan.cykl[0].treningi || [] };
    const np = { ...(profile || {}), plan, progress: [] };
    setProfile(np); persist(np, history, coachMsgs); setScreen("home");
  };
  const saveProfile = (p) => { setProfile(p); persist(p, history, coachMsgs); };
  const saveCoachMsgs = (c) => { setCoachMsgs(c); persist(profile, history, c); };
  // przejście do trenera z opcjonalną wiadomością startową (np. raport z check-inu)
  const [coachAutoSend, setCoachAutoSend] = useState(null);
  const startCoach = (wiadomosc) => {
    if (wiadomosc && wiadomosc.trim()) setCoachAutoSend(wiadomosc.trim());
    setScreen("asystent");
  };
  const addHistory = (entry) => {
    const h = [{ ...entry, id: Date.now(), data: new Date().toISOString() }, ...history];
    setHistory(h); persist(profile, h, coachMsgs);
  };
  // usuwa jeden wpis z historii (np. błędny/nieprawidłowy bieg), żeby trener AI
  // nie brał go pod uwagę przy ocenie formy i korekcie planu
  const removeHistory = (id) => {
    const h = history.filter((x) => x.id !== id);
    setHistory(h); persist(profile, h, coachMsgs);
  };
  const startGuided = (i) => { setGuidedIdx(i); setScreen("guided"); };
  const finishGuided = (i, wynik) => {
    const prog = [...(profile?.progress || [])];
    if (!prog.find((x) => x.i === i)) prog.push({ i, data: new Date().toISOString(), wynik: wynik || null });
    const np = { ...(profile || {}), progress: prog };
    setProfile(np);
    addHistory({ typ: `Trening: ${profile?.plan?.treningi?.[i]?.nazwa || tx("ukończony")}`, ...(wynik || {}) });
    persist(np, null, coachMsgs);
    setGuidedIdx(null);
    setScreen("home");
  };

  // wybór trybu (start lub zmiana)
  const wybierzTryb = (tryb) => { saveAccount(defaultAccount(tryb)); setChangingMode(false); setScreen("home"); };
  const zaladujDemo = () => {
    const a = defaultAccount("personal");
    setProfile(DEMO_PROFILE); setAccount(a);
    persist(DEMO_PROFILE, history, coachMsgs, a);
    setChangingMode(false); setScreen("home");
  };
  // zmiana planu w trybie product (reset kredytów do puli nowego planu)
  const zmienPlan = (planKey) => {
    const pl = PLANS[planKey] || PLANS.free;
    saveAccount({ tryb: "product", plan: pl.key, rozmowyLeft: pl.rozmowy, zdjeciaLeft: pl.zdjecia });
  };

  // Ustaw bieżący język UI na każdym renderze (dzieci renderują się po App).
  CURRENT_LANG = langOf(profile);
  const wybierzJezyk = (code) => {
    const np = { ...(profile || {}), lang: code };
    setProfile(np); persist(np, history, coachMsgs);
  };

  // EKRAN WYBORU JĘZYKA — pierwsze uruchomienie (domyślnie podświetlony język systemu).
  if (loaded && !(profile && profile.lang)) {
    return <WyborJezyka domyslny={DEFAULT_LANG} onWybor={wybierzJezyk} />;
  }

  // EKRAN WYBORU TRYBU — przy pierwszym uruchomieniu (brak konta)
  // albo gdy użytkownik świadomie wybrał "Zmień tryb" (wtedy można anulować).
  if (loaded && (!account || changingMode)) {
    return <WyborTrybu onWybor={wybierzTryb} onDemo={zaladujDemo}
      onAnuluj={account ? () => { setChangingMode(false); setScreen("home"); } : null} />;
  }

  // LOGOWANIE — wymagane w trybie product (wersja dla użytkowników)
  if (loaded && account?.tryb === "product" && !user) {
    return <Logowanie onLogin={zalogujGoogle} />;
  }

  return (
    <div style={{ minHeight: "100vh", background: C.dawn, color: C.ink, fontFamily: "'Space Grotesk','Segoe UI',system-ui,sans-serif" }}>
      <style>{`*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
        @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7%)}}
        @keyframes swing{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
        @keyframes step{0%,100%{transform:translateX(-3%) scaleY(1)}50%{transform:translateX(3%) scaleY(.97)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        @keyframes rise{from{opacity:0;transform:translateY(14px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes popIn{0%{opacity:0;transform:scale(.92)}60%{opacity:1;transform:scale(1.02)}100%{transform:scale(1)}}
        body{margin:0}
        button{font-family:inherit;transition:transform .12s ease, opacity .15s ease, background .15s ease, box-shadow .15s ease}
        button:active{transform:scale(.96)}
        input,textarea{font-family:inherit}
        main>div{animation:fadeIn .28s ease}
        /* kaskadowe wejście bezpośrednich sekcji ekranu */
        main>div>*{animation:rise .42s cubic-bezier(.22,.9,.32,1) both}
        main>div>*:nth-child(1){animation-delay:.02s}
        main>div>*:nth-child(2){animation-delay:.07s}
        main>div>*:nth-child(3){animation-delay:.12s}
        main>div>*:nth-child(4){animation-delay:.17s}
        main>div>*:nth-child(5){animation-delay:.22s}
        main>div>*:nth-child(n+6){animation-delay:.26s}
        /* klikalne kafelki (div z onClick / role) reagują na dotyk jak przyciski */
        [data-press]{transition:transform .12s ease, box-shadow .15s ease, filter .15s ease}
        [data-press]:active{transform:scale(.97);filter:brightness(1.08)}
        ::-webkit-scrollbar{display:none}
        @media (prefers-reduced-motion: reduce){
          *,main>div,main>div>*{animation:none!important;transition:none!important}
        }`}</style>

      <header style={{ padding: "18px 18px 14px", borderBottom: `1px solid ${C.line}`, display: "flex", alignItems: "center", gap: 12 }}>
        {screen !== "home" && (
          <button onClick={() => setScreen("home")} style={{ background: "none", border: "none", color: C.accent, fontSize: 26, cursor: "pointer", lineHeight: 1 }}>‹</button>
        )}
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, letterSpacing: 3, color: C.accent, fontWeight: 700 }}>{tx("RIKIPO · RUN")}</div>
          <div style={{ fontSize: 20, fontWeight: 800 }}>{tx("Asystent treningowy")}</div>
        </div>
        <StatusBar online={online} gps={gps} hr={hr} />
        <PanelKredytow account={account} go={setScreen} />
      </header>

      <main style={{ padding: "16px 14px 30px", maxWidth: 560, margin: "0 auto" }}>
        {!loaded && <div style={{ color: C.sub, padding: 20 }}>{tx("Wczytuję…")}</div>}
        {loaded && screen === "home" && <Home profile={profile} history={history} go={setScreen} startGuided={startGuided} account={account} nastepnyTydzien={nastepnyTydzien} zostanPrzyPlanie={zostanPrzyPlanie} />}
        {loaded && screen === "asystent" && <Asystent profile={profile} history={history} coachMsgs={coachMsgs} saveCoachMsgs={saveCoachMsgs} saveProfile={saveProfile} onPlan={setPlan} mode="setup" useCredit={useCredit} refundCredit={refundCredit} account={account} go={setScreen} autoSend={coachAutoSend} clearAutoSend={() => setCoachAutoSend(null)} />}
        {loaded && screen === "checkin" && <CheckinReport profile={profile} go={setScreen} startCoach={startCoach} />}
        {loaded && screen === "diagnostyka" && <Diagnostyka profile={profile} setProfile={saveProfile} history={history} addHistory={addHistory} go={setScreen} startCoach={startCoach} hr={hr} />}
        {loaded && screen === "kalendarz" && <Kalendarz profile={profile} setProfile={saveProfile} startGuided={startGuided} go={setScreen} />}
        {loaded && screen === "pogoda" && <Pogoda profile={profile} startGuided={startGuided} go={setScreen} />}
        {loaded && screen === "trasy" && <Trasy profile={profile} setProfile={saveProfile} go={setScreen} />}
        {loaded && screen === "analiza" && <AnalizaBiegu profile={profile} useCredit={useCredit} refundCredit={refundCredit} account={account} go={setScreen} />}
        {loaded && screen === "rozgrzewka" && <Sekwencja list={null} mode="warmup" onDone={addHistory} go={setScreen} profile={profile} hr={hr} />}
        {loaded && screen === "rozciaganie" && <Sekwencja list={STRETCH} mode="stretch" onDone={addHistory} go={setScreen} profile={profile} hr={hr} />}
        {loaded && screen === "test" && <TestBiegowy hr={hr} profile={profile} onDone={(e) => { addHistory(e); if (e.vo2max) saveProfile({ ...(profile || {}), vo2max: e.vo2max }); }} go={setScreen} />}
        {loaded && screen === "testy" && <BateriaTestow hr={hr} profile={profile} go={setScreen} onDone={(w) => {
          const patch = { testyWyniki: { ...w, data: new Date().toISOString() } };
          if (w.restHR?.wartosc) patch.restHR = w.restHR.wartosc;
          // szacunkowe VO2max z marszobiegu 6 min (ekstrapolacja do 12 min ~ Cooper)
          // 6 min → ekwiwalent 12 min: NIE ×2 (tempo na 12 min spada). Współczynnik ~1.87
          if (w.marsz6?.wartosc) { patch.vo2max = +Math.max(0, ((w.marsz6.wartosc * 1.87 - 504.9) / 44.73)).toFixed(1); patch.vo2maxOrient = true; }
          const wrocDoDiag = !!(profile?.diag?.wrocDoDiag || profile?.diag?.zTestow);
          if (wrocDoDiag) patch.diag = { ...profile.diag, wrocDoDiag: false, zTestow: false };
          const np = { ...(profile || {}), ...patch };
          setProfile(np); persist(np, history, coachMsgs); setScreen(wrocDoDiag ? "diagnostyka" : "asystent");
        }} />}
        {loaded && screen === "tetno" && <Tetno profile={profile} setProfile={saveProfile} hr={hr} />}
        {loaded && screen === "ustawienia" && <Ustawienia profile={profile} setProfile={saveProfile} account={account} go={setScreen} resetTryb={() => setChangingMode(true)} user={user} wyloguj={wyloguj} hr={hr} history={history} coachMsgs={coachMsgs} />}
        {loaded && screen === "klienci" && <KlienciBaza onBack={() => setScreen("ustawienia")} />}
        {loaded && screen === "pomiary" && <Profil profile={profile} setProfile={saveProfile} history={history} go={setScreen} />}
        {loaded && screen === "dieta" && <Dieta profile={profile} setProfile={saveProfile} history={history} useCredit={useCredit} refundCredit={refundCredit} account={account} go={setScreen} />}
        {loaded && screen === "subskrypcja" && <Subskrypcja account={account} zmienPlan={zmienPlan} go={setScreen} />}
        {loaded && screen === "guided" && guidedIdx != null &&
          <Guided trening={profile?.plan?.treningi?.[guidedIdx]} profile={profile} hr={hr}
            onFinish={(wynik) => finishGuided(guidedIdx, wynik)} go={setScreen}
            applyPlanChange={(nowyPlan) => { const np = { ...(profile || {}), plan: nowyPlan, progress: profile?.progress || [] }; setProfile(np); persist(np, history, coachMsgs); }}
            onSaveDemo={(d) => { const np = { ...(profile || {}), demoLog: [{ id: Date.now(), ...d }, ...((profile?.demoLog) || [])].slice(0, 30) }; setProfile(np); persist(np, history, coachMsgs); }} />}
        {loaded && screen === "historia" && <Historia history={history} removeHistory={removeHistory} />}
        {loaded && screen === "rekordy" && <Rekordy history={history} profile={profile} />}
        {loaded && screen === "demolog" && <DemoLog profile={profile} setProfile={saveProfile} />}
      </main>
    </div>
  );
}

/* ── KALENDARZ TRENINGÓW + PRZYPOMNIENIA ──────────────────────
   Rozkłada treningi z planu na dni tygodnia (wg dniWTyg), pokazuje
   miesiąc, oznacza dni treningowe, ukończone i przypomnienia o pomiarach.
─────────────────────────────────────────────────────────────*/
const DNI_PL = ["Pon", "Wt", tx("Śr"), "Czw", "Pt", "Sob", "Ndz"];
// domyślny rozkład dni treningowych wg liczby dni/tydzień (0=pon..6=ndz)
const ROZKLAD = { 2: [1, 4], 3: [1, 3, 5], 4: [1, 2, 4, 6], 5: [1, 2, 3, 5, 6], 6: [0, 1, 2, 3, 4, 5] };

/* ── POGODA: kalendarz warunków do biegania ───────────────────
   Bez backendu nie ma realnego API pogody w Artefakcie. Generujemy
   spójną, sezonowo dopasowaną prognozę z lokalizacji i daty, a trener-
   logika ocenia, kiedy najlepiej biegać (temperatura, deszcz, wiatr,
   wilgotność, UV). Wynik jest poglądowy — wyraźnie to zaznaczamy.
─────────────────────────────────────────────────────────────*/
function ocenBieg({ temp, deszcz, wiatr, wilg }) {
  let pkt = 100;
  if (temp < -5) pkt -= 45; else if (temp < 2) pkt -= 25; else if (temp < 8) pkt -= 8;
  if (temp > 28) pkt -= 40; else if (temp > 24) pkt -= 22; else if (temp > 20) pkt -= 8;
  pkt -= Math.min(45, deszcz * 0.6);       // mm/h
  pkt -= Math.min(30, Math.max(0, wiatr - 15) * 1.2); // km/h powyżej 15
  if (wilg > 85) pkt -= 12;
  pkt = Math.max(0, Math.min(100, Math.round(pkt)));
  const ocena = pkt >= 80 ? "Idealne" : pkt >= 60 ? "Dobre" : pkt >= 40 ? tx("Średnie") : pkt >= 20 ? "Trudne" : "Odradzam";
  const kolor = pkt >= 80 ? "#4FD6A6" : pkt >= 60 ? C.accent : pkt >= 40 ? "#F2B457" : C.warn;
  return { pkt, ocena, kolor };
}
function ikonaPogody(deszcz, temp) {
  if (deszcz > 4) return "🌧️"; if (deszcz > 0.5) return "🌦️"; if (temp < 1) return "❄️"; if (temp > 24) return "☀️"; return "⛅";
}
function prognoza7({ lat = 54.5, baseTemp }) {
  // FALLBACK offline: gdy nie ma internetu/lokalizacji. Sezonowa baza temperatury.
  // Wyraźnie oznaczana w UI jako szacunek, nie prawdziwe dane meteo.
  const mies = new Date().getMonth();
  const sezon = [2, 3, 7, 12, 17, 21, 23, 22, 18, 12, 6, 3][mies]; // śr. temp PL/Rügen
  const dni = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() + i);
    const seed = (d.getDate() * 7 + i * 13 + Math.round(lat)) % 100;
    const temp = Math.round(sezon + (seed % 9) - 4);
    const deszcz = seed > 70 ? +(((seed - 70) / 30) * 7).toFixed(1) : seed > 55 ? 0.4 : 0;
    const wiatr = 6 + (seed % 22);
    const wilg = 55 + (seed % 35);
    const ranoTemp = temp - 4, wieczorTemp = temp - 1;
    dni.push({ d, temp, ranoTemp, wieczorTemp, deszcz, wiatr, wilg, real: false });
  }
  return dni;
}

/* ── Realna prognoza z Open-Meteo (darmowe, bez klucza API, CORS-friendly) ──
   Pobiera 7 dni dla lokalizacji użytkownika i wyciąga osobne wartości dla rana,
   południa i wieczora z danych godzinowych. Gdy fetch zawiedzie, wołający
   używa prognoza7() jako fallbacku offline. */
async function pobierzPogode(lat, lng) {
  const url = "https://api.open-meteo.com/v1/forecast"
    + `?latitude=${lat.toFixed(3)}&longitude=${lng.toFixed(3)}`
    + "&hourly=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m"
    + "&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max"
    + "&forecast_days=7&timezone=auto";
  const res = await fetch(url);
  if (!res.ok) throw new Error("weather-http");
  const j = await res.json();
  const H = j.hourly, D = j.daily;
  if (!H || !D || !Array.isArray(D.time)) throw new Error("weather-empty");
  const hourIdx = {};
  H.time.forEach((tt, i) => { hourIdx[tt] = i; });
  const idxAt = (dateStr, hh) => hourIdx[`${dateStr}T${String(hh).padStart(2, "0")}:00`];
  return D.time.map((dateStr, di) => {
    const d = new Date(dateStr + "T12:00:00");
    const grab = (hh) => {
      const i = idxAt(dateStr, hh);
      if (i == null) return null;
      return { t: H.temperature_2m[i], d: H.precipitation[i] ?? 0, w: H.wind_speed_10m[i] ?? 0, h: H.relative_humidity_2m[i] ?? 60 };
    };
    const rano = grab(7), poludnie = grab(13), wieczor = grab(19);
    const tMax = D.temperature_2m_max[di], tMin = D.temperature_2m_min[di];
    const temp = poludnie ? Math.round(poludnie.t) : Math.round((tMax + tMin) / 2);
    return {
      d, real: true, temp,
      ranoTemp: rano ? Math.round(rano.t) : Math.round(tMin),
      wieczorTemp: wieczor ? Math.round(wieczor.t) : temp - 1,
      deszcz: poludnie ? +(poludnie.d).toFixed(1) : +(D.precipitation_sum[di] / 24).toFixed(1),
      deszczRano: rano ? +(rano.d).toFixed(1) : null,
      deszczWieczor: wieczor ? +(wieczor.d).toFixed(1) : null,
      wiatr: poludnie ? Math.round(poludnie.w) : Math.round(D.wind_speed_10m_max[di]),
      wiatrRano: rano ? Math.round(rano.w) : null,
      wiatrWieczor: wieczor ? Math.round(wieczor.w) : null,
      wilg: poludnie ? Math.round(poludnie.h) : 60,
    };
  });
}
function Pogoda({ profile, startGuided, go }) {
  const [loc, setLoc] = useState(null);
  const [denied, setDenied] = useState(false);
  const [sel, setSel] = useState(0);
  const [dni, setDni] = useState(null);     // null = ładowanie; tablica = gotowe
  const [zrodlo, setZrodlo] = useState("");  // "real" | "offline"
  // 1) lokalizacja
  useEffect(() => {
    if (gpsEnabled() && navigator.geolocation) navigator.geolocation.getCurrentPosition(
      (p) => setLoc({ lat: p.coords.latitude, lng: p.coords.longitude }),
      () => setDenied(true), { maximumAge: 600000, timeout: 15000 });
    else setDenied(true);
  }, []);
  // 2) pobierz realną pogodę dla lokalizacji; offline → fallback generator
  useEffect(() => {
    let anulowane = false;
    const lat = loc?.lat ?? 54.5, lng = loc?.lng ?? 13.4;
    if (!loc && !denied) return; // czekaj na decyzję o lokalizacji
    pobierzPogode(lat, lng)
      .then((d) => { if (!anulowane) { setDni(d); setZrodlo("real"); } })
      .catch(() => { if (!anulowane) { setDni(prognoza7({ lat })); setZrodlo("offline"); } });
    return () => { anulowane = true; };
  }, [loc, denied]);

  if (!dni) return (
    <div>
      <h2 style={{ fontSize: 22, fontWeight: 800 }}>{tx("Pogoda do biegania")}</h2>
      <p style={{ fontSize: 13, color: C.sub, marginTop: 14 }}>{tx("Pobieram lokalizację…")}</p>
    </div>
  );

  const dzien = dni[Math.min(sel, dni.length - 1)];
  const pory = [
    { nazwa: tx("Rano 6–9"),  t: dzien.ranoTemp,    d: dzien.deszczRano    != null ? dzien.deszczRano    : dzien.deszcz * 0.6, w: dzien.wiatrRano    != null ? dzien.wiatrRano    : dzien.wiatr * 0.8 },
    { nazwa: tx("Południe 12–15"), t: dzien.temp,   d: dzien.deszcz, w: dzien.wiatr },
    { nazwa: tx("Wieczór 18–21"), t: dzien.wieczorTemp, d: dzien.deszczWieczor != null ? dzien.deszczWieczor : dzien.deszcz * 0.8, w: dzien.wiatrWieczor != null ? dzien.wiatrWieczor : dzien.wiatr * 0.9 },
  ].map((p) => ({ ...p, ...ocenBieg({ temp: p.t, deszcz: p.d, wiatr: p.w, wilg: dzien.wilg }) }));
  const najlepsza = [...pory].sort((a, b) => b.pkt - a.pkt)[0];

  return (
    <div>
      <h2 style={{ fontSize: 22, fontWeight: 800 }}>{tx("Pogoda do biegania")}</h2>
      <p style={{ fontSize: 12, color: C.sub, marginTop: 2 }}>
        {loc ? `Lokalizacja ~${loc.lat.toFixed(2)}, ${loc.lng.toFixed(2)}` : denied ? tx("Bez lokalizacji — prognoza dla rejonu Rügen/PL") : tx("Pobieram lokalizację…")}
        {" · "}{zrodlo === "real" ? tx("dane meteo na żywo") : tx("prognoza poglądowa")}
      </p>

      {/* pasek 7 dni */}
      <div style={{ display: "flex", gap: 6, overflowX: "auto", margin: "14px 0" }}>
        {dni.map((dd, i) => {
          const o = ocenBieg({ temp: dd.temp, deszcz: dd.deszcz, wiatr: dd.wiatr, wilg: dd.wilg });
          return (
            <button key={i} onClick={() => setSel(i)} style={{ flex: "0 0 auto", minWidth: 62, padding: "10px 6px", borderRadius: 12, cursor: "pointer",
              border: `1px solid ${i === sel ? o.kolor : C.line}`, background: i === sel ? o.kolor + "22" : C.surface, color: C.ink, textAlign: "center" }}>
              <div style={{ fontSize: 11, color: C.sub }}>{i === 0 ? tx("Dziś") : dd.d.toLocaleDateString("pl-PL", { weekday: "short" })}</div>
              <div style={{ fontSize: 20 }}>{ikonaPogody(dd.deszcz, dd.temp)}</div>
              <div style={{ fontSize: 14, fontWeight: 800 }}>{dd.temp}°</div>
              <div style={{ width: 26, height: 4, borderRadius: 2, background: o.kolor, margin: "5px auto 0" }} />
            </button>
          );
        })}
      </div>

      {/* najlepsza pora */}
      <div style={{ background: najlepsza.kolor + "18", border: `1px solid ${najlepsza.kolor}`, borderRadius: 14, padding: 14, marginBottom: 12 }}>
        <div style={{ fontSize: 11, color: najlepsza.kolor, fontWeight: 800, letterSpacing: 1 }}>{tx("NAJLEPSZA PORA NA BIEG")}</div>
        <div style={{ fontSize: 17, fontWeight: 800, marginTop: 3 }}>{najlepsza.nazwa} · {najlepsza.ocena}</div>
        <div style={{ fontSize: 12, color: C.sub, marginTop: 2 }}>{Math.round(najlepsza.t)}{tx("°C, deszcz")} {najlepsza.d.toFixed(1)} {tx("mm/h, wiatr")} {Math.round(najlepsza.w)} {tx("km/h")}</div>
        <button onClick={() => {
          const godz = najlepsza.nazwa.includes("Rano") ? 7 : najlepsza.nazwa.includes("Wiecz") ? 19 : 13;
          const start = new Date(dzien.d); start.setHours(godz, 0, 0, 0);
          const nazwaTr = profile?.plan?.treningi?.find?.((_, i) => !new Set((profile.progress || []).map((p) => p.i)).has(i))?.nazwa || "Trening biegowy";
          pobierzICS({ tytul: `Bieg: ${nazwaTr}`, opis: `Najlepsza pora wg pogody. ${Math.round(najlepsza.t)}°C, wiatr ${Math.round(najlepsza.w)} km/h.`, start });
        }} style={{ width: "100%", marginTop: 10, padding: 11, background: "transparent", border: `1px solid ${najlepsza.kolor}`, color: najlepsza.kolor, borderRadius: 10, fontWeight: 800, fontSize: 13, cursor: "pointer" }}>
          {tx("🔔 Dodaj przypomnienie do kalendarza")}
        </button>
      </div>

      {/* pory dnia */}
      {pory.map((p, i) => (
        <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: C.surface, border: `1px solid ${C.line}`, borderRadius: 12, padding: "12px 14px", marginBottom: 8 }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700 }}>{p.nazwa}</div>
            <div style={{ fontSize: 12, color: C.sub }}>{Math.round(p.t)}{tx("°C · deszcz")} {p.d.toFixed(1)} {tx("mm · wiatr")} {Math.round(p.w)} {tx("km/h · wilg.")} {dzien.wilg}%</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 15, fontWeight: 800, color: p.kolor }}>{p.ocena}</div>
            <div style={{ fontSize: 11, color: C.sub }}>{p.pkt}/100</div>
          </div>
        </div>
      ))}

      <div style={{ background: C.surface2, borderRadius: 12, padding: 14, marginTop: 12, fontSize: 12, color: C.sub, lineHeight: 1.6 }}>
        <b style={{ color: C.ink }}>{tx("Wskazówki na dziś:")}</b><br />
        {dzien.temp > 22 && tx("Ciepło — biegnij rano/wieczorem, pij więcej, lżejsze tempo. ")}
        {dzien.temp < 3 && tx("Zimno — warstwy, rozgrzej się dłużej, uważaj na oblodzenie. ")}
        {dzien.deszcz > 2 && tx("Deszcz — czapka z daszkiem, uważaj na śliskie podłoże. ")}
        {dzien.wiatr > 25 && "Silny wiatr — zacznij pod wiatr, wracaj z wiatrem. "}
        {dzien.temp >= 3 && dzien.temp <= 22 && dzien.deszcz <= 2 && dzien.wiatr <= 25 && tx("Warunki sprzyjające — wykorzystaj je na mocniejszy akcent. ")}
      </div>

      {profile?.plan?.treningi && (
        <button onClick={() => { const done = new Set((profile.progress || []).map((p) => p.i)); const ni = profile.plan.treningi.findIndex((_, i) => !done.has(i)); if (ni >= 0) startGuided(ni); }}
          style={{ ...primary }}>{tx("Zaplanuj najbliższy trening na najlepszą porę →")}</button>
      )}
      {zrodlo === "offline" && <p style={{ fontSize: 11, color: C.sub, marginTop: 10, lineHeight: 1.5 }}>{tx("Brak połączenia z serwisem pogodowym — pokazuję orientacyjny szacunek sezonowy zamiast realnych danych.")}</p>}
      {zrodlo === "real" && <p style={{ fontSize: 11, color: C.sub, marginTop: 10, lineHeight: 1.5 }}>{tx("Dane pogodowe: Open-Meteo (na żywo dla Twojej lokalizacji).")}</p>}
    </div>
  );
}

function Kalendarz({ profile, setProfile, startGuided, go }) {
  const [refDate, setRefDate] = useState(new Date());
  const plan = profile?.plan;
  const dni = profile?.assessment?.dniWTyg || 3;
  const dniTren = ROZKLAD[dni] || ROZKLAD[3];
  const progress = profile?.progress || [];
  const doneIdx = new Set(progress.map((p) => p.i));

  // przypomnienia o pomiarach (interwał w dniach)
  const przypomnienia = profile?.przypomnienia || [
    { typ: "Ważenie", coIle: 7, ostatni: null },
    { typ: "Pomiary ciała (talia, biodra)", coIle: 14, ostatni: null },
    { typ: "Tętno spoczynkowe rano", coIle: 7, ostatni: null },
  ];

  const rok = refDate.getFullYear(), mies = refDate.getMonth();
  const pierwszy = new Date(rok, mies, 1);
  const ile = new Date(rok, mies + 1, 0).getDate();
  const startDow = (pierwszy.getDay() + 6) % 7; // pon=0
  const dzisStr = new Date().toDateString();

  // które dni miesiąca są treningowe
  const treningowy = (d) => dniTren.includes((new Date(rok, mies, d).getDay() + 6) % 7);

  const komorki = [];
  for (let i = 0; i < startDow; i++) komorki.push(null);
  for (let d = 1; d <= ile; d++) komorki.push(d);

  const oznaczPomiar = (idx) => {
    const np = [...przypomnienia];
    np[idx] = { ...np[idx], ostatni: new Date().toISOString() };
    setProfile({ ...(profile || {}), przypomnienia: np });
  };

  // czy pomiar zaległy?
  const zalegly = (p) => {
    if (!p.ostatni) return true;
    const dni = (Date.now() - new Date(p.ostatni)) / 86400000;
    return dni >= p.coIle;
  };

  return (
    <div>
      <h2 style={{ fontSize: 22, fontWeight: 800 }}>{tx("Kalendarz")}</h2>

      {/* nawigacja miesiąca */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "14px 0 10px" }}>
        <button onClick={() => setRefDate(new Date(rok, mies - 1, 1))} style={{ background: C.surface, border: `1px solid ${C.line}`, color: C.ink, borderRadius: 10, padding: "6px 12px", cursor: "pointer", fontWeight: 800 }}>‹</button>
        <div style={{ fontSize: 16, fontWeight: 800 }}>{pierwszy.toLocaleDateString("pl-PL", { month: "long", year: "numeric" })}</div>
        <button onClick={() => setRefDate(new Date(rok, mies + 1, 1))} style={{ background: C.surface, border: `1px solid ${C.line}`, color: C.ink, borderRadius: 10, padding: "6px 12px", cursor: "pointer", fontWeight: 800 }}>›</button>
      </div>

      {/* siatka */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4, marginBottom: 6 }}>
        {DNI_PL.map((d) => <div key={d} style={{ textAlign: "center", fontSize: 11, color: C.sub, fontWeight: 700 }}>{d}</div>)}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4 }}>
        {komorki.map((d, idx) => {
          if (d == null) return <div key={idx} />;
          const dt = new Date(rok, mies, d);
          const dzis = dt.toDateString() === dzisStr;
          const tren = treningowy(d);
          const celDzien = plan?.termin && new Date(plan.termin).toDateString() === dt.toDateString();
          return (
            <div key={idx} style={{ aspectRatio: "1", borderRadius: 10, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
              background: celDzien ? C.warn + "33" : tren ? C.accent + "18" : C.surface,
              border: `1px solid ${dzis ? C.accent : celDzien ? C.warn : tren ? C.accent + "55" : C.line}`, fontSize: 13, position: "relative" }}>
              <span style={{ fontWeight: dzis ? 800 : 600, color: dzis ? C.accent : C.ink }}>{d}</span>
              {tren && !celDzien && <span style={{ width: 5, height: 5, borderRadius: 3, background: C.accent, marginTop: 2 }} />}
              {celDzien && <span style={{ fontSize: 9, color: C.warn, fontWeight: 800 }}>{tx("CEL")}</span>}
            </div>
          );
        })}
      </div>

      <div style={{ display: "flex", gap: 14, margin: "12px 2px", fontSize: 11, color: C.sub }}>
        <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 4, background: C.accent, marginRight: 4 }} />{tx("trening")}</span>
        {plan?.termin && <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 4, background: C.warn, marginRight: 4 }} />cel</span>}
      </div>

      {/* najbliższy trening */}
      {plan?.treningi && (() => {
        const nextIdx = plan.treningi.findIndex((_, i) => !doneIdx.has(i));
        if (nextIdx < 0) return <div style={{ background: "#4FD6A618", borderRadius: 12, padding: 14, fontSize: 13, color: "#4FD6A6", fontWeight: 700, marginBottom: 14 }}>{tx("Blok ukończony — czas na nowy w Trenerze AI.")}</div>;
        return (
          <button onClick={() => startGuided(nextIdx)} style={{ width: "100%", textAlign: "left", background: C.accent + "18", border: `1px solid ${C.accent}`, borderRadius: 14, padding: 14, marginBottom: 14, cursor: "pointer", color: C.ink }}>
            <div style={{ fontSize: 11, color: C.accent, fontWeight: 800, letterSpacing: 1 }}>{tx("NAJBLIŻSZY TRENING")}</div>
            <div style={{ fontSize: 15, fontWeight: 800, marginTop: 3 }}>{plan.treningi[nextIdx].nazwa}</div>
            <div style={{ fontSize: 12, color: C.sub }}>{plan.treningi[nextIdx].cel || ""} {tx("· kliknij, by rozpocząć")}</div>
          </button>
        );
      })()}

      {/* przypomnienia o pomiarach */}
      <div style={{ fontSize: 12, color: C.sub, fontWeight: 700, letterSpacing: 1, margin: "4px 0 8px" }}>{tx("PRZYPOMNIENIA O POMIARACH")}</div>
      {przypomnienia.map((p, idx) => (
        <div key={idx} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: C.surface, border: `1px solid ${zalegly(p) ? C.warn : C.line}`, borderRadius: 12, padding: "10px 14px", marginBottom: 8 }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700 }}>{p.typ}</div>
            <div style={{ fontSize: 11, color: zalegly(p) ? C.warn : C.sub }}>
              {p.ostatni ? `ostatnio ${new Date(p.ostatni).toLocaleDateString("pl-PL", { day: "numeric", month: "short" })}` : "jeszcze nie zapisano"} {tx("· co")} {p.coIle} {tx("dni")}
            </div>
          </div>
          <button onClick={() => { oznaczPomiar(idx); if (idx === 0 || idx === 1) go("pomiary"); }}
            style={{ padding: "8px 12px", borderRadius: 10, border: "none", background: zalegly(p) ? C.warn : C.surface2, color: zalegly(p) ? C.bg : C.sub, fontWeight: 800, fontSize: 12, cursor: "pointer" }}>
            {zalegly(p) ? tx("Zrób teraz") : tx("Zapisz")}
          </button>
        </div>
      ))}
      <p style={{ fontSize: 11, color: C.sub, lineHeight: 1.5, marginTop: 6 }}>
        {tx("Dni treningowe rozłożone wg Twojego planu (")}{dni}{tx("× w tygodniu). Trener bierze wszystkie zapisane pomiary pod uwagę przy korekcie planu.")}
      </p>
    </div>
  );
}

function Home({ profile, history, go, startGuided, nastepnyTydzien, zostanPrzyPlanie }) {
  // zwijane sekcje ekranu głównego (mniej ściany danych na starcie)
  const [obciazenieOtw, setObciazenieOtw] = useState(false);
  const [odznakiOtw, setOdznakiOtw] = useState(false);
  const [przygotOtw, setPrzygotOtw] = useState(false);
  const [kontoOtw, setKontoOtw] = useState(false);

  const treningi = profile?.plan?.treningi || null;
  const progress = profile?.progress || [];
  const doneIdx = new Set(progress.map((p) => p.i));
  const nextIdx = treningi ? treningi.findIndex((_, i) => !doneIdx.has(i)) : -1;
  const nextTr = nextIdx >= 0 ? treningi[nextIdx] : null;

  // ── WSKAŹNIKI ──
  // dystans z 7 dni
  const teraz = Date.now();
  const ost7 = history.filter((h) => h.data && (teraz - new Date(h.data)) < 7 * 86400000);
  const km7 = ost7.reduce((a, h) => a + (h.dystans || 0), 0);
  const kcal7 = ost7.reduce((a, h) => a + (h.kcal || 0), 0);
  // seria dni z treningiem (streak)
  const dniZTreningiem = new Set(history.filter((h) => h.dystans != null || /Trening/i.test(h.typ || "")).map((h) => new Date(h.data).toDateString()));
  let streak = 0; for (let i = 0; i < 60; i++) { const d = new Date(); d.setDate(d.getDate() - i); if (dniZTreningiem.has(d.toDateString())) streak++; else if (i > 0) break; }
  // najlepsze okno pogodowe dziś
  const dzis = prognoza7({ lat: 54.5 })[0];
  const okna = [["Rano", dzis.ranoTemp, dzis.deszcz * 0.6, dzis.wiatr * 0.8], [tx("Południe"), dzis.temp, dzis.deszcz, dzis.wiatr], [tx("Wieczór"), dzis.wieczorTemp, dzis.deszcz * 0.8, dzis.wiatr * 0.9]]
    .map(([n, t, d, w]) => ({ n, ...ocenBieg({ temp: t, deszcz: d, wiatr: w, wilg: dzis.wilg }) }))
    .sort((a, b) => b.pkt - a.pkt)[0];
  const procent = treningi ? Math.round((doneIdx.size / treningi.length) * 100) : 0;
  // ostatni dystans z historii dla mini-trendu
  const trend = history.filter((h) => h.dystans).slice(0, 6).reverse().map((h) => h.dystans);

  // skrót rekordu na kafelek
  const rek = useMemo(() => liczRekordy(history), [history]);
  const rekordSub = rek.tempo ? `Najlepsze tempo ${rek.tempo.val}` : rek.dystans ? `Najdłużej ${rek.dystans.val}` : tx("Twoje życiówki");

  // ── WYNIK FORMY 0–100 + wykrywanie przemęczenia ──
  const fo = useMemo(() => liczForma(profile, history), [profile, history]);
  const odznaki = useMemo(() => liczOdznaki(history, profile), [history, profile]);
  const zdobyte = odznaki.filter((o) => o.zdobyta).length;
  // 4 najważniejsze odznaki na skróconą siatkę: najpierw zdobyte, potem te najbliżej zdobycia
  const odznakiTop = useMemo(() => {
    const got = odznaki.filter((o) => o.zdobyta);
    const left = odznaki.filter((o) => !o.zdobyta);
    return [...got, ...left].slice(0, 4);
  }, [odznaki]);
  const formaC = fo.score >= 70 ? "#4FD6A6" : fo.score >= 45 ? "#F2B457" : C.warn;
  const formaLabel = fo.score >= 70 ? tx("Wysoka") : fo.score >= 45 ? tx("Średnia") : tx("Niska");

  const Wsk = ({ ikona, val, label, c }) => {
    const dec = typeof val === "string" && val.includes(".") ? (val.split(".")[1] || "").length : 0;
    const shown = useCountUp(val, { decimals: dec });
    return (
    <div style={{ flex: 1, background: C.cardGrad, border: `1px solid ${C.line}`, borderRadius: 16, padding: "14px 8px 12px", textAlign: "center", boxShadow: C.shadow, position: "relative", overflow: "hidden" }}>
      <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: c, opacity: 0.85 }} />
      <div style={{ fontSize: 18 }}>{ikona}</div>
      <div style={{ fontSize: 23, fontWeight: 800, color: c, fontVariantNumeric: "tabular-nums", marginTop: 4, letterSpacing: "-0.5px" }}>{shown}</div>
      <div style={{ fontSize: 10, color: C.sub, marginTop: 3 }}>{label}</div>
    </div>
    );
  };

  // pierścień postępu (SVG)
  const R = 30, CIRC = 2 * Math.PI * R;
  const Ring = () => {
    const [shown, setShown] = useState(0);
    const animProc = useCountUp(shown, { dur: 850 });
    useEffect(() => {
      const reduce = typeof matchMedia === "function" && matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (reduce) { setShown(procent); return; }
      const id = requestAnimationFrame(() => setShown(procent));
      return () => cancelAnimationFrame(id);
    }, [procent]);
    return (
    <svg width="76" height="76" viewBox="0 0 76 76" style={{ flexShrink: 0 }}>
      <circle cx="38" cy="38" r={R} fill="none" stroke={C.line} strokeWidth="7" />
      <circle cx="38" cy="38" r={R} fill="none" stroke={C.accent} strokeWidth="7" strokeLinecap="round"
        strokeDasharray={CIRC} strokeDashoffset={CIRC * (1 - shown / 100)} transform="rotate(-90 38 38)" style={{ transition: "stroke-dashoffset .85s cubic-bezier(.22,.9,.32,1)" }} />
      <text x="38" y="43" textAnchor="middle" fontSize="18" fontWeight="800" fill={C.ink}>{animProc}%</text>
    </svg>
    );
  };

  const sekcje = [
    { tytul: tx("Codzienność"), tiles: [
      { k: "pomiary", t: tx("Profil"), d: tx("Dane, pomiary, rekordy, forma"), c: C.purple },
      { k: "pogoda", t: tx("Pogoda do biegania"), d: `Dziś najlepiej: ${okna.n.toLowerCase()}`, c: C.cool },
      { k: "kalendarz", t: tx("Kalendarz"), d: tx("Dni treningów i pomiary"), c: "#4FD6A6" },
      { k: "trasy", t: "Moje trasy GPS", d: "Nagraj i biegnij wg trasy", c: C.purple },
    ] },
    { tytul: tx("Przygotowanie"), tiles: [
      { k: "rozgrzewka", t: tx("Rozgrzewka"), d: tx("Dom / dwór / w biegu"), c: C.accent },
      { k: "rozciaganie", t: tx("Rozciąganie"), d: tx("Po treningu, 5 ćwiczeń"), c: C.cool },
      { k: "testy", t: tx("Testy sprawności"), d: tx("Pełna bateria + puls"), c: "#F2B457" },
      { k: "test", t: "Test Coopera", d: "12 min + GPS", c: "#F2B457" },
      { k: "demolog", t: tx("Dziennik demo"), d: `${(profile?.demoLog || []).length} symulacji`, c: C.purple },
    ] },
    { tytul: tx("Ja i postęp"), tiles: [
      { k: "rekordy", t: "Rekordy 🏆", d: rekordSub, c: "#F2B457" },
      { k: "tetno", t: tx("Tętno i strefy"), d: tx("Pas HR lub ręcznie"), c: C.warn },
      { k: "analiza", t: "Analiza techniki", d: tx("Oceń bieg z filmiku"), c: C.accent },
      { k: "historia", t: "Historia", d: `${history.length} zapisów`, c: C.sub },
    ] },
    { tytul: tx("Konto"), tiles: [
      { k: "ustawienia", t: tx("Ustawienia"), d: tx("Muzyka, głos, konto"), c: C.sub },
      { k: "subskrypcja", t: "Plan i kredyty", d: "Free / Premium / Pro", c: C.accent },
    ] },
  ];

  return (
    <div>
      {/* PASEK WSKAŹNIKÓW */}
      <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
        <Wsk ikona="🔥" val={streak} label={tx("dni z rzędu")} c={C.warn} />
        <Wsk ikona="🏃" val={km7.toFixed(1)} label={tx("km / 7 dni")} c={C.accent} />
        <Wsk ikona="⚡" val={kcal7 || "—"} label={tx("kcal / 7 dni")} c="#F2B457" />
        <Wsk ikona={ikonaPogody(dzis.deszcz, dzis.temp)} val={`${dzis.temp}°`} label={okna.ocena} c={okna.kolor} />
      </div>

      {/* ALARM PRZEMĘCZENIA */}
      {fo.przemeczenie && (
        <div style={{ background: "rgba(255,93,93,0.08)", border: `1px solid ${C.warn}`, borderRadius: 14, padding: 14, marginBottom: 14 }}>
          <div style={{ fontSize: 11, color: C.warn, fontWeight: 800, letterSpacing: 1 }}>⚠ {tx("MOŻLIWE PRZEMĘCZENIE")}</div>
          <p style={{ fontSize: 13, color: C.ink, margin: "6px 0 4px", lineHeight: 1.5 }}>
            {tx("Wykryto możliwe przemęczenie. Rozważ tydzień regeneracyjny — więcej snu, mniejsza objętość lub lżejszy trening.")}
          </p>
          <div style={{ fontSize: 11, color: C.sub, marginBottom: 10 }}>
            {fo.restJumpPct != null && fo.restJumpPct > 8 ? `${tx("Tętno spoczynkowe")} +${fo.restJumpPct}%` : ""}
            {fo.restJumpPct != null && fo.restJumpPct > 8 && fo.volJumpPct != null && fo.volJumpPct > 15 ? " · " : ""}
            {fo.volJumpPct != null && fo.volJumpPct > 15 ? `${tx("Objętość")} +${fo.volJumpPct}%` : ""}
          </div>
          <button onClick={() => go("asystent")} style={{ padding: "9px 14px", background: C.warn, color: C.bg, border: "none", borderRadius: 10, fontWeight: 800, fontSize: 13, cursor: "pointer" }}>
            {tx("Pogadaj z trenerem")} →
          </button>
        </div>
      )}

      {/* DASHBOARD FORMY — wynik 0–100 */}
      {fo.hasData && (
        <div style={{ background: `linear-gradient(150deg, ${C.surface2}, ${C.bg})`, border: `1px solid ${formaC}55`, borderRadius: 16, padding: 16, marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <div style={{ textAlign: "center", flexShrink: 0 }}>
              <div style={{ fontSize: 38, fontWeight: 800, color: formaC, lineHeight: 1, fontVariantNumeric: "tabular-nums" }}>{fo.score}</div>
              <div style={{ fontSize: 10, color: C.sub, letterSpacing: 1 }}>/ 100</div>
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 10, color: formaC, fontWeight: 800, letterSpacing: 1 }}>{tx("FORMA")} · {formaLabel.toUpperCase()} {fo.trend}</div>
              <div style={{ height: 8, borderRadius: 4, background: C.line, marginTop: 6, overflow: "hidden" }}>
                <div style={{ width: `${fo.score}%`, height: "100%", background: formaC, transition: "width .5s" }} />
              </div>
              <div style={{ fontSize: 11, color: C.sub, marginTop: 6 }}>
                {fo.kmDelta >= 0 ? "+" : ""}{fo.kmDelta.toFixed(1)} {tx("km")} {tx("vs poprz. tydz.")}{fo.rest ? ` · ${tx("tętno spocz.")} ${fo.rest}` : ""}

          </div>
        </div>

      {/* KARTA PLANU + następny trening z podglądem */}

            <div style={{ flex: 1, minWidth: 0 }}>

              <div style={{ fontSize: 16, fontWeight: 800, lineHeight: 1.2, margin: "2px 0" }}>{profile.plan.tytul}</div>
              <div style={{ fontSize: 11, color: C.sub }}>{doneIdx.size}/{treningi.length} {tx("ukończone")}{profile.plan.termin ? ` · cel ${new Date(profile.plan.termin).toLocaleDateString("pl-PL", { day: "numeric", month: "short" })}` : ""}</div>
            </div>
          </div>
          {/* fokus / na co uważać w tym tygodniu (z cyklu) */}
          {profile.plan.cykl?.[profile.plan.tydzienIdx || 0]?.uwaga && (
            <div style={{ marginTop: 12, padding: 12, background: C.purple + "14", border: `1px solid ${C.purple}55`, borderRadius: 12 }}>
              <div style={{ fontSize: 10, color: C.purple, fontWeight: 800, letterSpacing: 1 }}>{tx("NA CO UWAŻAĆ W TYM TYGODNIU")}</div>
              <div style={{ fontSize: 13, color: C.ink, marginTop: 3, lineHeight: 1.45 }}>{profile.plan.cykl[profile.plan.tydzienIdx || 0].uwaga}</div>
            </div>
          )}
          {profile.plan.opis && <p style={{ fontSize: 12, color: C.sub, margin: "12px 0 0", lineHeight: 1.55, borderTop: `1px solid ${C.line}`, paddingTop: 12 }}>{profile.plan.opis}</p>}

          {nextTr ? (
            <button onClick={() => startGuided(nextIdx)} style={{ width: "100%", textAlign: "left", display: "flex", alignItems: "center", gap: 12, marginTop: 12, background: C.accent + "18", border: `1px solid ${C.accent}`, borderRadius: 14, padding: 12, cursor: "pointer", color: C.ink }}>
              <div style={{ width: 52, height: 52, borderRadius: 12, background: C.surface, flexShrink: 0, padding: 4 }}>
                <Figure kind={nextTr.kroki?.find((s) => ["silowy", "bieg", "interwaly"].includes(s.typ))?.typ === "silowy" ? "squat" : "run"} color={C.accent} />
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 10, color: C.accent, fontWeight: 800, letterSpacing: 1 }}>{tx("NASTĘPNY TRENING")}</div>
                <div style={{ fontSize: 15, fontWeight: 800 }}>{nextTr.nazwa}</div>
                <div style={{ fontSize: 11, color: C.sub }}>{nextTr.cel || ""}</div>
              </div>
              <span style={{ fontSize: 22, color: C.accent }}>›</span>
            </button>
          ) : profile.plan.cykl && (profile.plan.tydzienIdx || 0) < profile.plan.cykl.length - 1 ? (
            <button onClick={nastepnyTydzien} style={{ width: "100%", marginTop: 12, padding: 14, background: C.accent, color: C.bg, border: "none", borderRadius: 12, fontWeight: 800, fontSize: 15, cursor: "pointer" }}>
              {tx("✓ Tydzień zrobiony — przejdź do tygodnia")} {(profile.plan.tydzienIdx || 0) + 2} →
            </button>
          ) : (
            <div style={{ marginTop: 12 }}>
              <div style={{ padding: 12, background: "#4FD6A618", borderRadius: 12, fontSize: 13, color: "#4FD6A6", fontWeight: 700, textAlign: "center", marginBottom: 10 }}>
                🎉 {profile.plan.cykl ? tx("Cały cykl ukończony! Co dalej?") : tx("Plan ukończony! Co robimy dalej?")}
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={() => zostanPrzyPlanie && zostanPrzyPlanie()} style={{ flex: 1, padding: 13, background: C.surface2, color: C.ink, border: `1px solid ${C.line}`, borderRadius: 12, fontWeight: 800, fontSize: 13, cursor: "pointer", lineHeight: 1.3 }}>
                  {tx("Zostań przy planie")}<br /><span style={{ fontSize: 11, color: C.sub, fontWeight: 600 }}>{tx("powtórz od nowa")}</span>
                </button>
                <button onClick={() => go("checkin")} style={{ flex: 1, padding: 13, background: C.accent, color: C.bg, border: "none", borderRadius: 12, fontWeight: 800, fontSize: 13, cursor: "pointer", lineHeight: 1.3 }}>
                  {tx("Przeanalizujmy")}<br /><span style={{ fontSize: 11, fontWeight: 600, opacity: .8 }}>{tx("trener oceni i zmieni")}</span>
                </button>
              </div>
              <p style={{ fontSize: 11, color: C.sub, marginTop: 8, lineHeight: 1.5, textAlign: "center" }}>{tx("„Przeanalizujmy\" — trener spojrzy na Twoje ostatnie biegi i samopoczucie i zaproponuje korektę, którą zatwierdzasz Ty.")}</p>
            </div>
          )}

          {/* lista pozostałych skrótowo */}
          <div style={{ display: "flex", gap: 5, marginTop: 12 }}>
            {treningi.map((w, i) => (
              <div key={i} title={w.nazwa} style={{ flex: 1, height: 6, borderRadius: 3, background: doneIdx.has(i) ? "#4FD6A6" : i === nextIdx ? C.accent : C.line }} />
            ))}
          </div>
        </div>
      ) : (

      {/* SEKCJE KAFELKÓW */}
      {sekcje.map((sek) => {
        const zwijana = sek.tytul === tx("Przygotowanie") || sek.tytul === tx("Konto");
        const otwarta = !zwijana || (sek.tytul === tx("Przygotowanie") ? przygotOtw : kontoOtw);

        return (
        <div key={sek.tytul} style={{ marginBottom: 18 }}>
          {zwijana ? (
            <button onClick={toggle} style={{ width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", background: "transparent", border: "none", padding: 0, cursor: "pointer", marginBottom: 10 }}>
              <span style={{ fontSize: 11, color: C.sub, fontWeight: 800, letterSpacing: 2 }}>{sek.tytul.toUpperCase()}</span>
              <span style={{ fontSize: 12, color: C.sub, fontWeight: 700 }}>{otwarta ? tx("Zwiń") : tx("Rozwiń")}</span>
            </button>
          ) : (
            <div style={{ fontSize: 11, color: C.sub, fontWeight: 800, letterSpacing: 2, marginBottom: 10 }}>{sek.tytul.toUpperCase()}</div>
          )}
          {otwarta && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {sek.tiles.map((t) => (
              <button key={t.k} onClick={() => go(t.k)} style={{ textAlign: "left", background: C.surface, border: `1px solid ${t.c}33`, borderRadius: 16, padding: 14, cursor: "pointer", color: C.ink }}>

                <div style={{ fontSize: 14, fontWeight: 800 }}>{t.t}</div>

              </button>
            ))}
          </div>
          )}
        </div>
        );
      })}
    </div>
  );
}

function AnkietaWstepna({ profile, onGotowe, onPominTest, hasTest }) {
  const [i, setI] = useState(0);
  const [odp, setOdp] = useState({});       // { key: "val" lub ["v1","v2"] }
  const [customTekst, setCustomTekst] = useState(""); // pole własnej odpowiedzi
  const [nums, setNums] = useState({         // dane liczbowe (wstępnie z profilu)
    weight: profile?.weight || "", height: profile?.height || "",
    age: profile?.age || "", restHR: profile?.restHR || "",
  });
  const [dataCelu, setDataCelu] = useState(""); // termin celu (YYYY-MM-DD)
  const total = ANKIETA.length;
  const pyt = ANKIETA[i];

  // bieżąca odpowiedź dla pytania (string albo tablica gdy multi)
  const cur = odp[pyt.key];
  const wybrane = pyt.multi ? (Array.isArray(cur) ? cur : []) : cur;
  const isSel = (val) => pyt.multi ? wybrane.includes(val) : wybrane === val;

  const idzDalej = (nowaOdp) => {
    setCustomTekst("");
    if (i + 1 < total) setI(i + 1);
    else onGotowe(nowaOdp);
  };

  // klik w opcję
  const klik = (val) => {
    if (pyt.multi) {
      // "brak"/"nic" czyści resztę; inne odznaczają "brak"
      let lista = [...wybrane];
      if (val === "brak" || val === "nic") lista = isSel(val) ? [] : [val];
      else {
        lista = lista.filter((x) => x !== "brak" && x !== "nic");
        lista = isSel(val) ? lista.filter((x) => x !== val) : [...lista, val];
      }
      setOdp({ ...odp, [pyt.key]: lista });
    } else {
      // pojedynczy wybór = od razu dalej
      idzDalej({ ...odp, [pyt.key]: val });
    }
  };

  // dodaj własną odpowiedź
  const dodajCustom = () => {
    const t = customTekst.trim();
    if (!t) return;
    if (pyt.multi) {
      const lista = [...wybrane.filter((x) => x !== "brak" && x !== "nic"), `własne: ${t}`];
      setOdp({ ...odp, [pyt.key]: lista });
      setCustomTekst("");
    } else {
      idzDalej({ ...odp, [pyt.key]: t });
    }
  };

  // zatwierdź pytanie multi / opcjonalne
  const dalej = () => {
    let wynik = wybrane;
    if (pyt.multi && (!Array.isArray(wynik) || wynik.length === 0)) {
      if (customTekst.trim()) { dodajCustom(); return; }
      if (!pyt.optional) return; // wymagane — nie idź dalej bez wyboru
      wynik = [];
    }
    idzDalej({ ...odp, [pyt.key]: wynik });
  };

  const mozeDalej = pyt.optional || (pyt.multi && wybrane.length > 0) || customTekst.trim();

  // krok z polami liczbowymi (waga/wzrost/wiek/HR)
  const numKomplet = pyt.numfields ? pyt.numfields.every((f) => f.optional || (nums[f.k] && +nums[f.k] >= f.min && +nums[f.k] <= f.max)) : true;
  const dalejNums = () => {
    if (!numKomplet) return;
    const dane = {};
    pyt.numfields.forEach((f) => { if (nums[f.k] !== "" && nums[f.k] != null) dane[f.k] = +nums[f.k]; });
    idzDalej({ ...odp, [pyt.key]: dane });
  };

  // krok z datą celu
  const dalejData = (wartosc) => idzDalej({ ...odp, [pyt.key]: wartosc });

  return (
    <div style={{ display: "flex", flexDirection: "column", minHeight: 420 }}>
      <div style={{ marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
          <span style={{ fontSize: 12, color: C.sub, fontWeight: 700, letterSpacing: 1 }}>{tx("OCENA WSTĘPNA")}</span>
          <span style={{ fontSize: 12, color: C.sub }}>{i + 1} / {total}</span>
        </div>
